<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANIEL KENO ROYAL - FULL ADMIN CONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #0a0a0a; --card: #161616; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { background-color: var(--dark); color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }
        
        .header { background: #1a1a1a; padding: 15px; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .balance-box { border: 2px solid var(--gold); padding: 8px 15px; border-radius: 50px; font-size: 20px; color: var(--gold); font-weight: bold; background: #000; box-shadow: 0 0 10px var(--gold); }

        .user-panel { background: #222; padding: 12px; font-size: 0.9rem; border-bottom: 1px solid #333; display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; gap: 10px; }
        .admin-add-btn { background: var(--green); color: white; border: none; padding: 5px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.8rem; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        .jackpot { background: linear-gradient(90deg, #b2944d, var(--gold), #b2944d); color: black; font-weight: bold; padding: 6px; font-size: 0.85rem; }
        .ticker { background: #111; color: var(--green); padding: 5px; font-size: 0.75rem; border-bottom: 1px solid #333; }

        .timer { font-size: 4rem; font-weight: bold; color: var(--red); margin: 15px 0; text-shadow: 0 0 15px var(--red); font-family: monospace; }

        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; padding: 10px; max-width: 480px; margin: auto; background: #111; border-radius: 12px; }
        .num { background: #333; border: 1px solid #444; padding: 15px 0; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .selected { background: var(--blue) !important; transform: scale(0.9); }
        .hit { background: var(--gold) !important; color: black; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }

        .bet-area { background: var(--card); margin: 15px; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        .ctrl { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 10px 0; }
        .b-btn { background: #222; color: var(--gold); border: 1px solid var(--gold); width: 45px; height: 45px; border-radius: 50%; font-size: 22px; cursor: pointer; }
        .main-btn { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.3rem; cursor: pointer; background: var(--green); color: white; }

        .support-btn { position: fixed; bottom: 25px; right: 25px; background: #0088cc; color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); }
        .modal-content { background: var(--card); margin: 15% auto; padding: 25px; width: 85%; border-radius: 20px; border: 1px solid var(--gold); }
        .input { width: 100%; background: #000; color: var(--gold); border: 1px solid #444; padding: 12px; border-radius: 8px; margin-top: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="jackpot">💰 ROYAL JACKPOT: <span id="jackVal">54,230.00</span> ETB</div>
<div class="ticker"><marquee>እንኳን ወደ DANIEL ROYAL በደህና መጡ! | አስተማማኝ ክፍያ | ደረሰኝ በ @Godis1256 ይላኩ!</marquee></div>

<div class="header">
    <div style="text-align:left"><h3 style="margin:0; color:var(--gold);">DANIEL ROYAL</h3></div>
    <div class="balance-box">💰 <span id="bal">0.00</span></div>
</div>

<div class="user-panel">
    <span>ID: <b id="uID">---</b></span>
    <span>User: <b id="uName">Guest</b></span>
    <button class="admin-add-btn" onclick="adminTopUp()">+ ADD BR</button>
</div>

<div class="timer" id="timer">01:00</div>
<div class="grid" id="grid"></div>

<div class="bet-area">
    <div style="color:#888; font-size:0.8rem;">Min Bet: 15 ETB</div>
    <div class="ctrl">
        <button class="b-btn" onclick="adjBet(-5)">-</button>
        <input type="number" id="bet" value="15" min="15" readonly style="width:80px; text-align:center; background:#000; color:var(--gold); border:2px solid var(--gold); padding:10px; border-radius:10px; font-weight:bold; font-size:1.3rem;">
        <button class="b-btn" onclick="adjBet(5)">+</button>
    </div>
    <button onclick="buy()" class="main-btn">ትኬት ቁረጥ (BUY)</button>
</div>

<div id="results" style="color:var(--gold); font-weight:bold; font-size:1.3rem; padding:10px;">Waiting...</div>

<div style="display:flex; justify-content:center; gap:10px; padding:0 15px 30px;">
    <button onclick="openM('dep')" style="flex:1; background:var(--blue); color:white; border:none; padding:15px; border-radius:12px; font-weight:bold;">DEPOSIT (Min 100)</button>
    <button onclick="openM('wit')" style="flex:1; background:var(--red); color:white; border:none; padding:15px; border-radius:12px; font-weight:bold;">WITHDRAW (Min 300)</button>
</div>

<a href="https://t.me/Godis1256" target="_blank" class="support-btn">💬</a>

<div id="dep" class="modal"><div class="modal-content">
    <h3 style="color:var(--blue)">Deposit 📥</h3>
    <p style="font-size:0.8rem;">Telebirr: 0986980130 | ቢያንስ 100 ብር</p>
    <input type="file" id="file" class="input">
    <button onclick="up()" style="background:var(--green); color:white; border:none; width:100%; padding:15px; border-radius:10px; margin-top:15px;">SEND RECEIPT</button>
    <button onclick="closeM('dep')" style="background:none; border:none; color:#666; margin-top:10px;">Close</button>
</div></div>

<div id="wit" class="modal"><div class="modal-content">
    <h3 style="color:var(--red)">Withdraw 📤</h3>
    <input type="number" id="wAmt" class="input" placeholder="Amount (Min 300)">
    <input type="text" id="wBank" class="input" placeholder="Bank Name & User Name">
    <input type="text" id="wAcc" class="input" placeholder="Account Number">
    <button onclick="reqW()" style="background:var(--green); color:white; border:none; width:100%; padding:15px; border-radius:10px; margin-top:15px;">REQUEST</button>
    <button onclick="closeM('wit')" style="background:none; border:none; color:#666; margin-top:10px;">Cancel</button>
</div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA", authDomain: "chickenkeno-c41fa.firebaseapp.com", projectId: "chickenkeno-c41fa", databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com", storageBucket: "chickenkeno-c41fa.appspot.com", messagingSenderId: "423384148862", appId: "1:423384148862:web:99e9faebe83982f95be12f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const TOKEN = "8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw";
    const CHAT = "7313437942";

    let uID = localStorage.getItem('dk_id') || "DK-" + Math.floor(1000 + Math.random() * 9000);
    let uName = localStorage.getItem('dk_name') || "Player_" + uID.split('-')[1];
    localStorage.setItem('dk_id', uID);
    document.getElementById('uID').innerText = uID; document.getElementById('uName').innerText = uName;

    db.ref('users/' + uID + '/balance').on('value', s => document.getElementById('bal').innerText = (s.val() || 0).toFixed(2));

    let selected = [], active = [];
    for(let i=1; i<=80; i++) {
        let n = document.createElement('div'); n.className='num'; n.innerText=i; n.id='n'+i;
        n.onclick=()=>{ if(n.classList.contains('selected')){ n.classList.remove('selected'); selected=selected.filter(x=>x!=i); } else if(selected.length<10){ n.classList.add('selected'); selected.push(i); } };
        document.getElementById('grid').appendChild(n);
    }

    function adjBet(v) { let b=document.getElementById('bet'); let val=parseInt(b.value)+v; if(val>=15) b.value=val; }

    function buy() {
        let amt=parseInt(document.getElementById('bet').value);
        if(selected.length<2) return alert("Select numbers!");
        db.ref('users/'+uID+'/balance').once('value', s => {
            let curr = s.val()||0;
            if(curr<amt) return alert("Low balance!");
            db.ref('users/'+uID).update({balance: curr-amt});
            active.push({nums:[...selected], bet:amt});
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT}&text=${encodeURIComponent("🎟 Ticket: "+uID+"\nAmt: "+amt+"\nNums: "+selected.join(','))}`);
            selected=[]; document.querySelectorAll('.selected').forEach(x=>x.classList.remove('selected'));
        });
    }

    let t=60, draw=false;
    setInterval(()=>{
        if(draw) return;
        t--; let m=Math.floor(t/60), s=t%60;
        document.getElementById('timer').innerText=`${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
        if(t<=0) run();
    }, 1000);

    async function run() {
        draw=true; let drawn=[]; while(drawn.length<20){ let r=Math.floor(Math.random()*80)+1; if(!drawn.includes(r)) drawn.push(r); }
        let disp=[];
        for(let n of drawn) {
            await new Promise(r=>setTimeout(r,400));
            document.getElementById('n'+n).classList.add('hit'); disp.push(n);
            document.getElementById('results').innerText=disp.sort((a,b)=>a-b).join(' ');
        }
        active.forEach(tk=>{
            let hits=tk.nums.filter(x=>drawn.includes(x)).length;
            if(hits>=2){
                let win=tk.bet*(hits*1.5);
                db.ref('users/'+uID+'/balance').once('value', s=>db.ref('users/'+uID).update({balance:(s.val()||0)+win}));
                confetti({particleCount:150, spread:70, origin:{y:0.6}});
            }
        });
        setTimeout(()=>{ document.querySelectorAll('.hit').forEach(x=>x.classList.remove('hit')); document.getElementById('results').innerText="Waiting..."; active=[]; draw=false; t=60; }, 6000);
    }

    async function up() {
        let f=document.getElementById('file').files[0]; if(!f) return alert("Select file!");
        let fd=new FormData(); fd.append('chat_id', CHAT); fd.append('photo', f); fd.append('caption', "📥 Deposit: "+uName+" ("+uID+")");
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {method:'POST', body:fd});
        alert("Sent!"); closeM('dep');
    }

    function reqW() {
        let amt=document.getElementById('wAmt').value, bank=document.getElementById('wBank').value, acc=document.getElementById('wAcc').value;
        if(amt<300) return alert("Min 300!");
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT}&text=${encodeURIComponent("📤 Withdraw\nID: "+uID+"\nAmt: "+amt+"\nBank: "+bank+"\nAcc: "+acc)}`);
        alert("Sent!"); closeM('wit');
    }

    // Admin Function to add balance directly
    function adminTopUp() {
        let pass = prompt("Admin Password:");
        if(pass === "1234") {
            let amount = parseFloat(prompt("How much balance to add to this user?"));
            if(!isNaN(amount)) {
                db.ref('users/' + uID + '/balance').once('value', s => {
                    db.ref('users/' + uID).update({ balance: (s.val() || 0) + amount });
                    alert("Added " + amount + " ETB to User: " + uID);
                });
            }
        } else { alert("Wrong Password!"); }
    }

    function openM(id){ document.getElementById(id).style.display='block'; }
    function closeM(id){ document.getElementById(id).style.display='none'; }
</script>
</body>
</html>
