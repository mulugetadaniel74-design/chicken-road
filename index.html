<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANIEL KENO ROYAL - OFFICIAL RULES</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #0a0a0a; --card: #161616; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { background-color: var(--dark); color: white; text-align: center; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        .header { background: var(--card); padding: 15px; border-bottom: 3px solid var(--gold); }
        .balance-box { border: 2px solid var(--gold); display: inline-block; padding: 8px 20px; border-radius: 12px; font-size: 20px; color: var(--gold); font-weight: bold; background: #000; }
        .timer-display { font-size: 2.5rem; font-weight: bold; color: var(--red); margin: 10px; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-width: 400px; margin: 10px auto; padding: 5px; }
        .num { background: #333; border: 1px solid #444; padding: 10px 0; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .selected { background: var(--blue) !important; color: white; transform: scale(0.9); }
        .hit { background: var(--gold) !important; color: black; box-shadow: 0 0 15px var(--gold); animation: pop 0.4s ease-out; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        
        /* Odds Display Style */
        .odds-container { background: #222; margin: 10px auto; padding: 12px; border-radius: 10px; max-width: 380px; text-align: left; border-left: 5px solid var(--gold); }
        .odds-title { color: var(--gold); font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
        .odds-list { font-size: 0.85rem; color: #bbb; display: flex; flex-wrap: wrap; gap: 8px; }
        .odds-item { background: #333; padding: 3px 8px; border-radius: 4px; }
        
        .result-panel { background: #1a1a1a; margin: 15px auto; padding: 15px; max-width: 380px; border-radius: 10px; border: 1px solid #333; }
        .btn-main { width: 85%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; background: var(--green); color: white; margin: 10px 0; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); }
        .modal-content { background: var(--card); margin: 15% auto; padding: 25px; width: 85%; border-radius: 15px; border: 1px solid var(--gold); text-align: left; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0; color:var(--gold);">🎰 DANIEL KENO ROYAL</h3>
    <div class="balance-box">💰 <span id="balance">0.00</span> ETB</div>
    <p style="font-size:11px; margin-top:5px;">ID: <span id="myID" style="color:var(--gold);">...</span></p>
</div>

<div class="timer-display" id="timerDisplay">01:00</div>

<div class="odds-container" id="oddsBox">
    <div class="odds-title">🎯 የክፍያ መመሪያ (Payout Table)</div>
    <div id="oddsInfo" class="odds-list">ቁጥር ሲመርጡ እዚህ ጋር ዝርዝር ይታያል...</div>
</div>

<div class="grid" id="grid"></div>

<div style="margin:10px;">
    ወራጅ: <input type="number" id="betAmount" value="15" min="15" style="width:60px; background:#000; color:var(--gold); border:1px solid var(--gold); text-align:center; padding:5px; border-radius:5px;">
    <button onclick="buyTicket()" class="btn-main">ትኬት ቁረጥ (BUY)</button>
</div>

<div class="result-panel">
    <div style="color:#666; font-size:0.8rem; border-bottom:1px solid #333; padding-bottom:5px;">የቀጥታ ውጤት</div>
    <div id="drawnNumbersList" style="color:var(--gold); font-weight:bold; font-size:1.1rem; margin-top:5px;">...</div>
</div>

<div style="display:flex; justify-content:center; gap:10px;">
    <button onclick="showModal('depModal')" style="background:var(--blue); color:white; border:none; padding:12px; border-radius:8px; width:45%; font-weight:bold;">Deposit 📥</button>
    <button onclick="showModal('witModal')" style="background:var(--red); color:white; border:none; padding:12px; border-radius:8px; width:45%; font-weight:bold;">Withdraw 📤</button>
</div>

<div id="depModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--blue);">📥 ብር ለማስገባት</h3>
    <p>ስም: <b>Daniel Mulugeta</b><br>Telebirr: <b>0986980130</b><br>አቢሲኒያ: <b>153682704</b></p>
    <p style="color:var(--red);">* Min Deposit: 100 ETB</p>
    <button onclick="closeModal('depModal')" style="background:#444; color:white; width:100%; padding:10px; border:none; border-radius:5px;">ዝጋ</button>
</div></div>

<script>
    // Firebase Config (Keep your existing one)
    const firebaseConfig = {
        apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA",
        authDomain: "chickenkeno-c41fa.firebaseapp.com",
        projectId: "chickenkeno-c41fa",
        databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com",
        storageBucket: "chickenkeno-c41fa.appspot.com",
        messagingSenderId: "423384148862",
        appId: "1:423384148862:web:99e9faebe83982f95be12f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const BOT_TOKEN = "8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw";
    const CHAT_ID = "7313437942";

    let uID = localStorage.getItem('keno_user_id') || "USER-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('keno_user_id', uID);
    document.getElementById('myID').innerText = uID;
    db.ref('users/' + uID + '/balance').on('value', s => document.getElementById('balance').innerText = (s.val() || 0).toFixed(2));

    // የኬኖ ኦፊሴላዊ የክፍያ ህጎች (ለአንተ ትርፋማ እንዲሆን ተደርጎ የተዘጋጀ)
    const kenoRules = {
        2: { 2: 10 },
        3: { 2: 1, 3: 20 },
        4: { 2: 0.5, 3: 4, 4: 40 },
        5: { 3: 3, 4: 15, 5: 100 },
        6: { 3: 1, 4: 8, 5: 50, 6: 250 },
        7: { 4: 3, 5: 20, 6: 150, 7: 1000 },
        8: { 4: 1, 5: 10, 6: 50, 7: 500, 8: 2000 },
        9: { 5: 5, 6: 25, 7: 150, 8: 1000, 9: 4000 },
        10: { 5: 2, 6: 15, 7: 100, 8: 500, 9: 2500, 10: 10000 }
    };

    const grid = document.getElementById('grid');
    let selectedNums = [];
    let activeBets = [];

    for(let i=1; i<=80; i++) {
        let d = document.createElement('div');
        d.className='num'; d.id='n'+i; d.innerText=i;
        d.onclick=()=>{ 
            if(d.classList.contains('selected')){
                d.classList.remove('selected');
                selectedNums = selectedNums.filter(x => x !== i);
            } else if(selectedNums.length < 10){
                d.classList.add('selected');
                selectedNums.push(i);
            }
            showOdds();
        };
        grid.appendChild(d);
    }

    function showOdds() {
        let count = selectedNums.length;
        let info = document.getElementById('oddsInfo');
        if (count < 2) { info.innerHTML = "ቢያንስ 2 ቁጥር ይምረጡ..."; return; }
        
        let rule = kenoRules[count];
        let html = `<b>ለ ${count} ቁጥር፡</b> `;
        for (let hit in rule) {
            if (rule[hit] > 0) {
                html += `<span class="odds-item">${hit} ከገቡ፡ x${rule[hit]}</span>`;
            }
        }
        info.innerHTML = html;
    }

    function buyTicket() {
        let amt = parseFloat(document.getElementById('betAmount').value);
        if(amt < 15) return alert("ዝቅተኛ ወራጅ 15 ብር ነው!");
        if(selectedNums.length < 2) return alert("ቢያንስ 2 ቁጥር ይምረጡ!");
        db.ref('users/' + uID + '/balance').once('value', s => {
            let bal = s.val() || 0;
            if(bal < amt) return alert("በቂ ብር የለም!");
            db.ref('users/' + uID).update({balance: bal - amt});
            activeBets.push({nums: [...selectedNums], bet: amt, count: selectedNums.length});
            selectedNums = [];
            document.querySelectorAll('.num').forEach(n => n.classList.remove('selected'));
            document.getElementById('oddsInfo').innerHTML = "ትኬት ተቆርጧል! ሌላ መቁረጥ ይችላሉ።";
        });
    }

    let timeLeft = 60;
    let isDrawing = false;
    setInterval(() => {
        if(isDrawing) return;
        timeLeft--;
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById('timerDisplay').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        
        if(timeLeft === 59) { 
            document.querySelectorAll('.num').forEach(n => n.classList.remove('hit'));
            document.getElementById('drawnNumbersList').innerText = "...";
        }
        if(timeLeft <= 0) { runDraw(); }
    }, 1000);

    async function runDraw() {
        isDrawing = true;
        let drawn = [];
        while(drawn.length < 20) {
            let r = Math.floor(Math.random()*80)+1;
            if(!drawn.includes(r)) drawn.push(r);
        }
        
        let displayDrawn = [];
        for(let n of drawn) {
            await new Promise(res => setTimeout(res, 400)); // 0.4 ሰከንድ ልዩነት
            document.getElementById('n'+n).classList.add('hit');
            displayDrawn.push(n);
            document.getElementById('drawnNumbersList').innerText = displayDrawn.sort((a,b)=>a-b).join('  ');
        }

        activeBets.forEach(t => {
            let hits = t.nums.filter(n => drawn.includes(n)).length;
            let multiplier = (kenoRules[t.count] && kenoRules[t.count][hits]) || 0;
            let win = t.bet * multiplier;
            
            if(win > 0) {
                db.ref('users/' + uID + '/balance').once('value', s => db.ref('users/' + uID).update({balance: (s.val()||0) + win}));
                alert(`አሸንፈዋል! ${win} ብር ወደ አካውንትዎ ገብቷል።`);
            }
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=ID:${uID} Bet:${t.bet} Win:${win} Hits:${hits}/${t.count}`);
        });
        
        activeBets = [];
        isDrawing = false;
        timeLeft = 60;
    }

    function showModal(id) { document.getElementById(id).style.display = "block"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }
</script>
</body>
</html>
