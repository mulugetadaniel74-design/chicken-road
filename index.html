<!DOCTYPE html>
<html>
<head>
  <title>Keno Game</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 5px;
      max-width: 400px;
      margin: auto;
    }

    button {
      padding: 10px;
      border: none;
      background: #333;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .selected {
      background: orange;
    }

    .win {
      background: green;
    }
  </style>
</head>

<body>

<h1>🎰 KENO GAME</h1>

<h3>Balance: <span id="balance">1000</span> ETB</h3>

<input type="number" id="bet" placeholder="Bet amount">
<button onclick="startGame()">PLAY</button>

<h3 id="timer">Next draw: 10s</h3>

<div class="grid" id="board"></div>

<h3 id="selected">Selected: []</h3>
<h3 id="result">Result: []</h3>

<script>
let selected = [];
let balance = 1000;
let timer = 10;

// create board 1–80
const board = document.getElementById("board");
for(let i=1;i<=80;i++){
  let btn = document.createElement("button");
  btn.innerText = i;
  btn.onclick = () => selectNumber(i, btn);
  board.appendChild(btn);
}

function selectNumber(num, btn){
  if(selected.includes(num)){
    selected = selected.filter(n => n !== num);
    btn.classList.remove("selected");
  } else {
    if(selected.length >= 10){
      alert("Max 10 numbers!");
      return;
    }
    selected.push(num);
    btn.classList.add("selected");
  }

  document.getElementById("selected").innerText =
    "Selected: " + selected.join(", ");
}

function startGame(){
  let bet = Number(document.getElementById("bet").value);

  if(bet <= 0){
    alert("Enter bet!");
    return;
  }

  if(bet > balance){
    alert("Not enough balance!");
    return;
  }

  balance -= bet;
  document.getElementById("balance").innerText = balance;
}

// auto draw every 10s
setInterval(() => {
  timer--;
  document.getElementById("timer").innerText =
    "Next draw: " + timer + "s";

  if(timer === 0){
    draw();
    timer = 10;
  }
}, 1000);

function draw(){
  let result = [];

  while(result.length < 20){
    let n = Math.floor(Math.random()*80)+1;
    if(!result.includes(n)) result.push(n);
  }

  document.getElementById("result").innerText =
    "Result: " + result.join(", ");

  checkWin(result);
  highlight(result);
}

function checkWin(result){
  let matches = selected.filter(n => result.includes(n));

  let win = matches.length * 10; // simple payout
  balance += win;

  document.getElementById("balance").innerText = balance;

  alert("Matched: " + matches.length + " | Win: " + win + " ETB");
}

function highlight(result){
  let buttons = document.querySelectorAll(".grid button");

  buttons.forEach(btn => {
    let num = Number(btn.innerText);

    btn.classList.remove("win");

    if(result.includes(num)){
      btn.classList.add("win");
    }
  });
}
</script>

</body>
</html>
