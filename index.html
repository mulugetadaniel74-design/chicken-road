<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENO ROYAL PRO - FINAL FIX</title>
    <style>
        :root { --gold: #f1c40f; --dark: #121212; --card: #1e1e1e; --green: #27ae60; --white: #ffffff; }
        body { background-color: var(--dark); color: var(--white); text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .header { background: var(--card); padding: 15px; border-radius: 15px; border-bottom: 4px solid var(--gold); margin-bottom: 15px; }
        .balance-display { font-size: 24px; font-weight: bold; color: var(--gold); border: 2px solid var(--gold); display: inline-block; padding: 8px 25px; border-radius: 50px; background: rgba(241,196,15,0.1); margin: 10px 0; }
        .timer-box { background: #c0392b; color: white; padding: 5px 15px; border-radius: 5px; font-weight: bold; font-size: 18px; display: inline-block; }
        .bet-input-box { background: var(--card); padding: 15px; border-radius: 10px; margin: 10px auto; width: 90%; border: 1px solid #444; }
        input[type="number"] { background: #000; color: var(--gold); border: 1px solid var(--gold); padding: 10px; width: 100px; text-align: center; font-size: 18px; border-radius: 5px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-width: 450px; margin: 15px auto; padding: 10px; background: #000; border-radius: 12px; }
        .num { background: #333; border: 1px solid #444; padding: 14px 0; cursor: pointer; font-weight: bold; color: #ccc; border-radius: 5px; }
        .selected { background: #3498db !important; color: white !important; border: 1px solid white; }
        .winner { background: var(--gold) !important; color: black !important; transform: scale(1.1); box-shadow: 0 0 15px var(--gold); }
        .action-btn { width: 95%; padding: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px auto; display: block; font-size: 18px; text-decoration: none; text-align: center; text-transform: uppercase; color: white; }
        .dep-btn { background: linear-gradient(to right, #2ecc71, #27ae60); }
        .with-btn { background: #c0392b; border: 1px solid white; }
        .withdraw-section { background: var(--card); border: 2px dashed #444; padding: 20px; margin: 25px auto; width: 90%; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; color:var(--gold);">🎰 KENO ROYAL PRO 🎰</h2>
        <div class="balance-display">💰 <span id="balance">0.00</span></div>
        <br>
        <div class="timer-box">DRAW: <span id="timer">60</span>s</div>
    </div>

    <div style="margin-bottom: 20px;">
        <p style="font-size:13px; color:#aaa;">በቴሌብር (telebirr) ብር ካስገቡ በኋላ Screenshot ይላኩ!</p>
        <button onclick="tgLink('deposit')" class="action-btn dep-btn">📲 ብር አስገባ (DEPOSIT)</button>
    </div>

    <div class="bet-input-box">
        መቆራጫ (ሚኒመም 15): <input type="number" id="betAmount" value="15" min="15">
    </div>

    <div class="grid" id="grid"></div>

    <div class="withdraw-section">
        <h3>💸 ብር አውጣ (WITHDRAW)</h3>
        <p style="font-size:14px; color:#aaa;">ከ 300 - 1000 ብር ብቻ</p>
        <input type="number" id="withAmount" placeholder="መጠን..." value="300" style="width:180px; margin-bottom:15px; background: #000; color: #fff; border: 1px solid var(--gold); padding: 10px;">
        <button class="action-btn with-btn" onclick="tgLink('withdraw')">ብር አውጣ</button>
    </div>

    <script>
        // ቴሌግራምን ለመክፈት የመጨረሻው አስተማማኝ መንገድ
        function tgLink(type) {
            let msg = "";
            if(type === 'deposit') {
                msg = "ሰላም ዳንኤል፣ በቴሌብር ብር ማስገባት እፈልጋለሁ። Screenshot አሁን እልክልሃለሁ።";
            } else {
                let amt = document.getElementById('withAmount').value;
                if(amt < 300 || amt > 1000) { alert("እባክዎ ከ 300 እስከ 1000 ብር ያስገቡ!"); return; }
                msg = "ሰላም ዳንኤል፣ እኔ ከኬኖ ሮያል " + amt + " ብር ማውጣት እፈልጋለሁ።";
            }

            let encodedMsg = encodeURIComponent(msg);
            
            // ዘዴ 1: Direct tg:// protocol (ለአፕሊኬሽን ቀጥታ መላኪያ)
            let method1 = "tg://resolve?domain=Godis1256&text=" + encodedMsg;
            // ዘዴ 2: t.me link
            let method2 = "https://t.me/Godis1256?text=" + encodedMsg;

            // መጀመሪያ ዘዴ 1ን ይሞክራል፣ ካልሰራ ዘዴ 2
            window.location.href = method1;
            
            setTimeout(function() {
                window.location.href = method2;
            }, 500);
        }

        // --- የተቀረው የጌም ኮድ ---
        let currentBalance = 0.00;
        let selected = [];
        const grid = document.getElementById('grid');
        for(let i=1; i<=80; i++) {
            let d = document.createElement('div');
            d.className = 'num'; d.id = 'n'+i; d.innerText = i;
            d.onclick = function() {
                if(this.classList.contains('selected')) {
                    this.classList.remove('selected');
                    selected = selected.filter(n => n !== i);
                } else if(selected.length < 5) {
                    this.classList.add('selected');
                    selected.push(i);
                }
            };
            grid.appendChild(d);
        }

        let time = 60;
        setInterval(() => {
            time--;
            document.getElementById('timer').innerText = time;
            if(time <= 0) { draw(); time = 60; }
        }, 1000);

        function draw() {
            let bet = parseFloat(document.getElementById('betAmount').value);
            if(selected.length > 0) {
                 if(currentBalance < bet) { alert("በቂ ካፒታል የለዎትም!"); return; }
                 currentBalance -= bet;
                 document.getElementById('balance').innerText = currentBalance.toFixed(2);
            }
            document.querySelectorAll('.num').forEach(n => n.classList.remove('winner'));
            let winners = [];
            while(winners.length < 20) {
                let r = Math.floor(Math.random()*80)+1;
                if(!winners.includes(r)) winners.push(r);
            }
            winners.forEach((n, i) => {
                setTimeout(() => { document.getElementById('n'+n).classList.add('winner'); }, i * 100);
            });
        }
    </script>
</body>
</html>
