<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chicken Road Pro</title>
    <style>
        body { margin: 0; background: #1a1d21; color: white; font-family: sans-serif; overflow: hidden; }
        .header { background: #2c313a; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .balance { color: #2ecc71; font-weight: bold; font-size: 18px; }
        
        #game-box { width: 100%; height: 50vh; background: #333; position: relative; border-bottom: 5px solid #222; }
        .road-line { position: absolute; width: 100%; height: 2px; background: rgba(255,255,255,0.2); }
        
        .multiplier-tag { position: absolute; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 10px; font-size: 12px; transform: translateX(-50%); border: 1px solid #555; }
        
        #chicken { width: 50px; position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 100; transition: bottom 0.2s; }
        .car { width: 55px; height: 30px; position: absolute; border-radius: 4px; z-index: 50; }
        
        .ui-area { padding: 15px; background: #252930; height: 45vh; display: flex; flex-direction: column; align-items: center; }
        .bet-input { background: #1a1d21; border: 1px solid #444; color: white; padding: 10px; width: 80%; text-align: center; font-size: 20px; border-radius: 8px; margin-bottom: 15px; }
        
        .btn-row { display: flex; width: 100%; gap: 10px; }
        .action-btn { flex: 1; padding: 20px; border: none; border-radius: 12px; font-size: 22px; font-weight: bold; cursor: pointer; }
        #go-btn { background: #2ecc71; color: white; box-shadow: 0 5px #27ae60; }
        #cashout-btn { background: #f1c40f; color: black; box-shadow: 0 5px #f39c12; display: none; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold;">CHICKEN ROAD 2</div>
    <div class="balance" id="bal-display">1,000.00 ETB</div>
</div>

<div id="game-box">
    <div class="multiplier-tag" style="bottom: 20%; left: 50%;">1.44x</div>
    <div class="multiplier-tag" style="bottom: 40%; left: 50%;">2.21x</div>
    <div class="multiplier-tag" style="bottom: 60%; left: 50%;">3.45x</div>
    <div class="multiplier-tag" style="bottom: 80%; left: 50%;">5.53x</div>
    
    <img id="chicken" src="https://img.icons8.com/emoji/96/000000/chicken-emoji.png">
</div>

<div class="ui-area">
    <input type="number" class="bet-input" id="bet-amt" value="10">
    <div class="btn-row">
        <button id="cashout-btn" onclick="cashOut()">CASH OUT</button>
        <button id="go-btn" onclick="moveNext()">PLAY / GO</button>
    </div>
</div>

<script>
    let balance = 1000;
    let currentStep = 0;
    let isLive = false;
    let currentMult = 1;
    const multipliers = [1.44, 2.21, 3.45, 5.53, 9.09];
    
    const chicken = document.getElementById('chicken');
    const goBtn = document.getElementById('go-btn');
    const cashBtn = document.getElementById('cashout-btn');

    function moveNext() {
        let bet = parseFloat(document.getElementById('bet-amt').value);
        if (!isLive) {
            if (balance < bet) return alert("ብር የለህም!");
            balance -= bet;
            isLive = true;
            goBtn.innerText = "GO";
            cashBtn.style.display = "block";
            startCars();
        }

        currentStep++;
        currentMult = multipliers[currentStep - 1];
        chicken.style.bottom = (currentStep * 20) + "%";
        
        if (currentStep >= 5) {
            alert("ማዶ ደርሰሃል! አሸነፍክ!");
            cashOut();
        }
        updateUI();
    }

    function startCars() {
        setInterval(() => {
            if (!isLive) return;
            createCar();
        }, 800);
    }

    function createCar() {
        const car = document.createElement('div');
        car.className = 'car';
        car.style.background = ["#e74c3c", "#3498db", "#f1c40f"][Math.floor(Math.random()*3)];
        const lanes = [20, 40, 60, 80];
        car.style.bottom = lanes[Math.floor(Math.random()*4)] + "%";
        car.style.left = "-60px";
        document.getElementById('game-box').appendChild(car);

        let speed = 5 + Math.random() * 7;
        let drive = setInterval(() => {
            let x = parseInt(car.style.left);
            if (x > window.innerWidth || !isLive) {
                clearInterval(drive); car.remove();
            } else {
                car.style.left = (x + speed) + "px";
                checkCrash(car);
            }
        }, 20);
    }

    function checkCrash(car) {
        let c = chicken.getBoundingClientRect();
        let r = car.getBoundingClientRect();
        if (!(r.left > c.right || r.right < c.left || r.top > c.bottom || r.bottom < c.top)) {
            isLive = false;
            chicken.src = "https://img.icons8.com/emoji/96/000000/feather-emoji.png"; // ላባ ሆነች
            setTimeout(() => {
                alert("ተበላህ! ብርህ ሄዷል።");
                location.reload();
            }, 500);
        }
    }

    function cashOut() {
        let bet = parseFloat(document.getElementById('bet-amt').value);
        balance += (bet * currentMult);
        alert( (bet * currentMult).toFixed(2) + " ብር ወስደሃል!");
        location.reload();
    }

    function updateUI() {
        document.getElementById('bal-display').innerText = balance.toFixed(2) + " ETB";
    }
</script>

</body>
</html>
