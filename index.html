<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANIEL KENO ROYAL - PRO EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #0a0a0a; --card: #1a1a1a; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { background-color: var(--dark); color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .header { background: #111; padding: 15px; border-bottom: 2px solid var(--gold); }
        .balance-box { border: 2px solid var(--gold); display: inline-block; padding: 5px 25px; border-radius: 50px; font-size: 24px; color: var(--gold); font-weight: bold; background: #000; box-shadow: 0 0 15px rgba(255,196,15,0.3); }
        .timer { font-size: 3rem; font-weight: bold; color: var(--red); margin: 10px; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: #111; padding: 10px; border-radius: 12px; max-width: 450px; margin: auto; border: 1px solid #333; }
        .num { background: #2a2a2a; border: 1px solid #333; padding: 12px 0; font-weight: bold; border-radius: 6px; cursor: pointer; color: #ccc; font-size: 0.9rem; transition: 0.2s; }
        .selected { background: var(--blue) !important; color: white; transform: scale(1.05); }
        .hit { background: var(--gold) !important; color: black; animation: pop 0.4s; }
        @keyframes pop { 0% {transform: scale(1);} 50% {transform: scale(1.2);} 100% {transform: scale(1);} }
        
        .bet-controls { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; }
        .bet-btn { background: #333; color: white; border: 1px solid var(--gold); width: 45px; height: 45px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-bet-main { width: 90%; max-width: 400px; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 1.3rem; cursor: pointer; background: var(--green); color: white; box-shadow: 0 4px 0 #1e8449; }
        
        /* Ticket View Styles */
        .ticket-card { background: #222; margin: 10px auto; padding: 15px; border-radius: 12px; border-left: 5px solid var(--gold); max-width: 400px; text-align: left; }
        .ticket-nums { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
        .t-num { background: #444; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }
        .t-num.matched { background: var(--green) !important; color: white; font-weight: bold; position: relative; }
        .t-num.matched::after { content: ' ✓'; font-size: 0.7rem; }

        .panel { background: var(--card); margin: 10px; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); }
        .modal-content { background: var(--card); margin: 10% auto; padding: 25px; width: 85%; max-width: 380px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; }
        .input-field { width: 100%; background: #000; color: white; border: 1px solid #444; padding: 12px; border-radius: 10px; margin-top: 10px; box-sizing: border-box; }
        
        #winMsg { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--green); color: white; padding: 30px; border-radius: 20px; z-index: 2000; font-weight: bold; border: 3px solid white; box-shadow: 0 0 50px rgba(46, 204, 113, 0.5); }
    </style>
</head>
<body>

<div id="winMsg">🎉 እንኳን ደስ አለዎት! <br><span id="winAmtText">0</span> ETB አሸንፈዋል!</div>

<div class="header">
    <h3 style="margin:0; color:var(--gold);">DANIEL KENO ROYAL</h3>
    <div class="balance-box">💰 <span id="balance">0.00</span> ETB</div>
    <div style="font-size:11px; color:#555; margin-top:5px;">ID: <span id="myID" style="color:var(--gold)">...</span></div>
</div>

<div class="timer" id="timerDisplay">01:00</div>

<div class="grid" id="grid"></div>

<div class="bet-controls">
    <button class="bet-btn" onclick="adjustBet(-5)">-</button>
    <div style="font-size: 1.4rem; font-weight: bold; color: var(--gold); min-width: 80px;"><span id="betValue">15</span> ETB</div>
    <button class="bet-btn" onclick="adjustBet(5)">+</button>
</div>

<div id="oddsDisplay" style="color:var(--green); font-weight:bold; margin-bottom:10px; font-size:1.1rem; height:24px;"></div>

<button onclick="buyTicket()" class="btn-bet-main">ትኬት ቁረጥ (PLACE BET)</button>

<div style="display:flex; justify-content:center; gap:10px; margin: 15px;">
    <button onclick="showModal('depModal')" style="background:var(--blue); border:none; padding:12px; border-radius:10px; width:45%; color:white; font-weight:bold; cursor:pointer;">Deposit 📥</button>
    <button onclick="showModal('witModal')" style="background:var(--red); border:none; padding:12px; border-radius:10px; width:45%; color:white; font-weight:bold; cursor:pointer;">Withdraw 📤</button>
</div>

<div class="panel">
    <div style="color:var(--gold); margin-bottom:8px; font-weight:bold; text-align:left;">🎟 የእርስዎ ትኬቶች (MY TICKETS)</div>
    <div id="ticketList"></div>
</div>

<button id="adminBtn" onclick="adminAction()" style="display:none; margin: 20px auto; background:#222; color:var(--gold); border:1px solid var(--gold); padding:10px; border-radius:8px; cursor:pointer;">Admin Panel ⚙️</button>

<div id="depModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--blue);">📥 ብር ለማስገባት</h3>
    <div style="text-align:left; background:#111; padding:12px; border-radius:10px; font-size:0.85rem; border:1px solid #333;">
        📱 Telebirr: <b>0986980130</b><br>
        🏦 Abyssinia: <b>153682704</b><br>
        👤 ስም: <b>ዳንኤል ሙሉጌታ ኩምሳ</b>
    </div>
    <input type="file" id="receiptFile" accept="image/*" class="input-field">
    <button onclick="sendDeposit()" style="background:var(--green); color:white; border:none; padding:15px; border-radius:12px; width:100%; font-weight:bold; margin-top:15px; cursor:pointer;">ደረሰኝ ላክ</button>
    <button onclick="closeModal('depModal')" style="background:#444; color:white; width:100%; padding:10px; border:none; border-radius:10px; margin-top:10px;">ተመለስ</button>
</div></div>

<div id="witModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--red);">📤 ብር ለማውጣት</h3>
    <input type="number" id="witAmt" class="input-field" placeholder="የብር መጠን">
    <input type="text" id="witBank" class="input-field" placeholder="ባንክ / ቴሌብር">
    <input type="text" id="witAcc" class="input-field" placeholder="አካውንት ቁጥር">
    <button onclick="sendWithdraw()" style="background:var(--red); color:white; border:none; padding:15px; border-radius:12px; width:100%; font-weight:bold; margin-top:15px;">ጥያቄ ላክ</button>
    <button onclick="closeModal('witModal')" style="background:#444; color:white; width:100%; padding:10px; border:none; border-radius:10px; margin-top:10px;">ተመለስ</button>
</div></div>

<script>
    const BOT_TOKEN = "8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw";
    const CHAT_ID = "7313437942";
    const ADMIN_ID = "USER-4173";
    
    const kenoOdds = {
        2: { 2: 10 },
        3: { 2: 2, 3: 25 },
        4: { 2: 1, 3: 5, 4: 80 },
        5: { 3: 2, 4: 15, 5: 350 },
        10: { 5: 2, 6: 10, 7: 50, 8: 300, 9: 1500, 10: 10000 }
    };

    const firebaseConfig = {
        apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA",
        authDomain: "chickenkeno-c41fa.firebaseapp.com",
        projectId: "chickenkeno-c41fa",
        databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com",
        appId: "1:423384148862:web:99e9faebe83982f95be12f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let uID = localStorage.getItem('keno_user_id') || "USER-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('keno_user_id', uID);
    document.getElementById('myID').innerText = uID;
    if(uID === ADMIN_ID) document.getElementById('adminBtn').style.display = "block";

    let selectedNums = [], timeLeft = 60, isDrawing = false, currentBet = 15, activeTickets = [];

    // Grid Setup
    for(let i=1; i<=80; i++) {
        let d = document.createElement('div'); d.className='num'; d.id='n'+i; d.innerText=i;
        d.onclick=()=> {
            if(isDrawing) return;
            if(d.classList.contains('selected')) { d.classList.remove('selected'); selectedNums = selectedNums.filter(x=>x!==i); }
            else if(selectedNums.length < 10) { d.classList.add('selected'); selectedNums.push(i); }
            updateOddsText();
        };
        document.getElementById('grid').appendChild(d);
    }

    function updateOddsText() {
        let c = selectedNums.length;
        let d = document.getElementById('oddsDisplay');
        if(c < 2) { d.innerText = ""; return; }
        let max = kenoOdds[c] ? kenoOdds[c][Math.max(...Object.keys(kenoOdds[c]))] : 0;
        d.innerText = max > 0 ? `${c} ቁጥሮች (እስከ x${max} ያሸንፉ!)` : `${c} ቁጥሮች ተመርጠዋል`;
    }

    function adjustBet(v) { currentBet = Math.max(15, currentBet + v); document.getElementById('betValue').innerText = currentBet; }

    setInterval(() => {
        if(isDrawing) return;
        timeLeft--;
        document.getElementById('timerDisplay').innerText = `00:${timeLeft < 10 ? '0' + timeLeft : timeLeft}`;
        if(timeLeft <= 0) runDraw();
    }, 1000);

    async function runDraw() {
        isDrawing = true;
        let drawn = [];
        while(drawn.length < 20) { let r = Math.floor(Math.random()*80)+1; if(!drawn.includes(r)) drawn.push(r); }
        
        for(let n of drawn) {
            await new Promise(r => setTimeout(r, 400));
            document.getElementById('n'+n).classList.add('hit');
            // Update Ticket UI with matching ticks
            updateTicketUI(n); 
        }

        checkFinalWins();
        setTimeout(() => {
            document.querySelectorAll('.num').forEach(el => el.classList.remove('hit', 'selected'));
            activeTickets = []; updateTicketUI();
            selectedNums = []; isDrawing = false; timeLeft = 60;
            document.getElementById('winMsg').style.display = "none";
            document.getElementById('oddsDisplay').innerText = "";
        }, 6000);
    }

    function buyTicket() {
        if(selectedNums.length < 2) return alert("ቢያንስ 2 ቁጥሮች ይምረጡ!");
        db.ref('users/'+uID+'/balance').once('value', s => {
            let bal = s.val() || 0;
            if(bal < currentBet) return alert("በቂ ብር የለም!");
            db.ref('users/'+uID).update({balance: bal - currentBet});
            activeTickets.push({ bet: currentBet, nums: [...selectedNums], matches: [] });
            updateTicketUI();
            clearSelection();
            alert("ትኬት ተቆርጧል!");
        });
    }

    function updateTicketUI(ball = null) {
        let html = "";
        activeTickets.forEach(t => {
            if(ball && t.nums.includes(ball)) t.matches.push(ball);
            html += `
                <div class="ticket-card">
                    <div style="display:flex; justify-content:space-between; font-weight:bold;">
                        <span>💰 ${t.bet} ETB</span>
                        <span style="color:var(--green)">Hits: ${t.matches.length}/${t.nums.length}</span>
                    </div>
                    <div class="ticket-nums">
                        ${t.nums.map(n => `<span class="t-num ${t.matches.includes(n) ? 'matched' : ''}">${n}</span>`).join('')}
                    </div>
                </div>
            `;
        });
        document.getElementById('ticketList').innerHTML = html;
    }

    function checkFinalWins() {
        activeTickets.forEach(t => {
            let h = t.matches.length;
            let mult = (kenoOdds[t.nums.length] && kenoOdds[t.nums.length][h]) ? kenoOdds[t.nums.length][h] : 0;
            if(mult > 0) {
                let win = t.bet * mult;
                db.ref('users/'+uID+'/balance').once('value', s => db.ref('users/'+uID).update({balance: (s.val()||0) + win}));
                document.getElementById('winAmtText').innerText = win;
                document.getElementById('winMsg').style.display = "block";
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ chat_id: CHAT_ID, text: `💰 WINNER! 🎉\nID: ${uID}\nBet: ${t.bet} | Won: ${win} ETB` }) });
            }
        });
    }

    function sendDeposit() { /* Receipt Logic */ alert("ተልኳል!"); closeModal('depModal'); }
    function sendWithdraw() { /* Withdraw Logic */ alert("ጥያቄ ተልኳል!"); closeModal('witModal'); }
    function adminAction() {
        let p = prompt("Password:");
        if(p === "9801") {
            let id = prompt("User ID:");
            let amt = parseFloat(prompt("Amount (+/-):"));
            if(id && !isNaN(amt)) {
                db.ref('users/'+id+'/balance').once('value', s => {
                    db.ref('users/'+id).update({balance: (s.val()||0) + amt});
                    alert("ተሳክቷል!");
                });
            }
        }
    }

    function showModal(id) { document.getElementById(id).style.display = "block"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }
    function clearSelection() { document.querySelectorAll('.num').forEach(n=>n.classList.remove('selected')); selectedNums=[]; updateOddsText(); }
    db.ref('users/'+uID+'/balance').on('value', s => { document.getElementById('balance').innerText = (s.val()||0).toFixed(2); });
</script>
</body>
</html>
