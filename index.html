<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keno Live - Full System</title>
    <style>
        body { margin: 0; background: #121417; color: white; font-family: sans-serif; text-align: center; }
        .header { background: #1c1f24; padding: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid #2ecc71; position: sticky; top: 0; z-index: 100; }
        .wallet-btns { display: flex; gap: 10px; padding: 10px; background: #1c1f24; justify-content: center; }
        .w-btn { flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .dep-btn { background: #2ecc71; }
        .wit-btn { background: #e67e22; }

        .timer-panel { background: #1c1f24; margin: 10px; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .draw-panel { background: #1c1f24; margin: 0 10px 10px 10px; padding: 15px; border-radius: 10px; min-height: 50px; border: 1px solid #333; }
        .drawn-numbers { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }
        .drawn-box { background: #f1c40f; color: black; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; animation: pop 0.2s; }

        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; padding: 10px; max-width: 450px; margin: 0 auto; }
        .num { background: #24292e; padding: 12px 0; border-radius: 4px; font-size: 13px; font-weight: bold; color: #666; border: 1px solid #333; }
        .num.selected { background: #2ecc71 !important; color: white !important; }
        .num.hit { background: #f1c40f !important; color: black !important; box-shadow: 0 0 10px #f1c40f; }
        .num.active-draw { background: #ffffff !important; color: black !important; animation: quickFade 1s forwards; }

        .footer { background: #1c1f24; padding: 15px; position: fixed; bottom: 0; width: 100%; border-radius: 20px 20px 0 0; box-sizing: border-box; }
        .bet-control { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .bet-btn-small { background: #333; border: 1px solid #444; color: white; width: 35px; height: 35px; border-radius: 5px; cursor: pointer; }
        .play-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; background: #2ecc71; color: white; cursor: pointer; }

        /* Modal for Deposit/Withdraw */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1c1f24; padding: 20px; border-radius: 10px; border: 2px solid #2ecc71; z-index: 1000; width: 80%; max-width: 300px; }
        .modal input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; background: #24292e; border: 1px solid #444; color: white; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }

        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        @keyframes quickFade { 0% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; color: #2ecc71;">KENO LIVE</div>
    <div id="bal-display" style="font-weight: bold;">1,000.00 ETB</div>
</div>

<div class="wallet-btns">
    <button class="w-btn dep-btn" onclick="openModal('deposit')">DEPOSIT</button>
    <button class="w-btn wit-btn" onclick="openModal('withdraw')">WITHDRAW</button>
</div>

<div class="timer-panel">ቀጣይ እጣ በ: <span id="timer-txt" style="color:#f1c40f; font-weight:bold;">01:00</span></div>

<div class="draw-panel"><div class="drawn-numbers" id="drawn-list"></div></div>

<div class="grid" id="keno-grid"></div>
<div style="height: 180px;"></div>

<div class="footer">
    <div class="bet-control">
        <button class="bet-btn-small" onclick="changeBet(-5)">-</button>
        <div style="font-weight:bold;">ውርርድ: <span id="bet-display">15</span> ETB</div>
        <button class="bet-btn-small" onclick="changeBet(5)">+</button>
    </div>
    <button id="play-btn" class="play-btn" onclick="placeBet()">ውርርድ</button>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
    <h3 id="modal-title">Deposit</h3>
    <p id="modal-limit" style="font-size:12px; color:#888;"></p>
    <input type="number" id="modal-amount" placeholder="መጠን ያስገቡ">
    <button class="play-btn" onclick="processWallet()">አረጋግጥ</button>
</div>

<script>
    let balance = 1000, bet = 15, selected = [], isDrawing = false, hasBet = false, timeLeft = 60, currentAction = '';
    const grid = document.getElementById('keno-grid');

    // ቦርድ መፍጠር
    for(let i=1; i<=80; i++) {
        let n = document.createElement('div');
        n.className = 'num'; n.innerText = i;
        n.onclick = () => {
            if(isDrawing) return;
            if(selected.includes(i)) {
                selected = selected.filter(num => num !== i);
                n.classList.remove('selected');
            } else if(selected.length < 10) {
                selected.push(i);
                n.classList.add('selected');
            }
        };
        grid.appendChild(n);
    }

    // ሰዓት ቆጣሪ
    setInterval(() => {
        if (!isDrawing) {
            timeLeft--;
            if (timeLeft <= 0) startAutoDraw();
            updateTimerUI();
        }
    }, 1000);

    function updateTimerUI() {
        let s = timeLeft % 60;
        document.getElementById('timer-txt').innerText = `00:${s.toString().padStart(2, '0')}`;
    }

    function changeBet(v) {
        bet = Math.max(15, bet + v); // Minimum 15 ETB
        document.getElementById('bet-display').innerText = bet;
    }

    function openModal(type) {
        currentAction = type;
        document.getElementById('modal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modal-title').innerText = type === 'deposit' ? 'ብር ማስገቢያ (Deposit)' : 'ብር ማውጫ (Withdraw)';
        document.getElementById('modal-limit').innerText = type === 'deposit' ? 'ዝቅተኛ 100 ብር' : 'ዝቅተኛ 200 ብር';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    function processWallet() {
        let amt = parseFloat(document.getElementById('modal-amount').value);
        if (currentAction === 'deposit') {
            if (amt < 100) return alert("ዝቅተኛው የዲፖዚት መጠን 100 ብር ነው!");
            balance += amt;
        } else {
            if (amt < 200) return alert("ዝቅተኛው የማውጫ መጠን 200 ብር ነው!");
            if (amt > balance) return alert("በቂ ብር የለህም!");
            balance -= amt;
        }
        updateUI();
        closeModal();
    }

    function placeBet() {
        if(selected.length === 0) return alert("ቁጥር ምረጥ!");
        if(balance < bet) return alert("በቂ ብር የለህም!");
        hasBet = true;
        document.getElementById('play-btn').innerText = "ውርርድ ተይዟል...";
        document.getElementById('play-btn').disabled = true;
    }

    function startAutoDraw() {
        isDrawing = true;
        if(hasBet) { balance -= bet; updateUI(); }
        document.getElementById('drawn-list').innerHTML = '';
        document.querySelectorAll('.num').forEach(n => n.classList.remove('active-draw', 'hit'));

        let draw = [], count = 0, hits = 0;
        let interval = setInterval(() => {
            let r;
            do { r = Math.floor(Math.random() * 80) + 1; } while(draw.includes(r));
            draw.push(r);
            let box = document.createElement('div'); box.className = 'drawn-box'; box.innerText = r;
            document.getElementById('drawn-list').appendChild(box);
            let el = grid.children[r-1];
            if(selected.includes(r)) { el.classList.add('hit'); hits++; } 
            else { el.classList.add('active-draw'); }
            count++;
            if(count >= 20) { clearInterval(interval); finish(hits); }
        }, 300);
    }

    function finish(hits) {
        if(hasBet) checkWin(hits);
        setTimeout(() => {
            isDrawing = false; hasBet = false; timeLeft = 60;
            document.getElementById('play-btn').innerText = "ውርርድ";
            document.getElementById('play-btn').disabled = false;
        }, 2000);
    }

    function checkWin(hits) {
        let winMult = 0; let sCount = selected.length;
        if (sCount >= 4 && hits >= 2) winMult = hits * 2;
        else if (sCount >= 2 && hits >= 1) winMult = hits * 1.5;
        else if (sCount === 1 && hits === 1) winMult = 3.5;
        if(winMult > 0) balance += (bet * winMult);
        updateUI();
    }

    function updateUI() { document.getElementById('bal-display').innerText = balance.toFixed(2) + " ETB"; }
</script>
</body>
</html>
