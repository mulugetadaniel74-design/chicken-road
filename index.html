<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chicken Road - Real Version</title>
    <style>
        body { margin: 0; background: #1a1d21; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .header { background: #2c313a; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3e4451; }
        .balance-box { text-align: right; }
        .balance { color: #2ecc71; font-weight: bold; font-size: 20px; }
        
        /* Deposit/Withdraw Buttons */
        .nav-btns { display: flex; gap: 10px; padding: 10px; background: #252930; }
        .nav-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 14px; }
        .dep-btn { background: #27ae60; }
        .wit-btn { background: #2980b9; }

        /* Game Screen */
        #game-screen { width: 100%; height: 45vh; background: #333; position: relative; overflow: hidden; border-bottom: 4px solid #222; }
        .road-line { position: absolute; width: 100%; height: 2px; background: rgba(255,255,255,0.1); }
        .m-tag { position: absolute; background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 12px; font-size: 11px; left: 10px; color: #f1c40f; border: 1px solid #444; }
        
        #chicken { width: 45px; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); z-index: 100; transition: bottom 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .car { width: 60px; height: 32px; position: absolute; border-radius: 5px; z-index: 50; box-shadow: 0 4px rgba(0,0,0,0.4); }

        /* UI Panel */
        .ui-panel { padding: 15px; background: #252930; height: 45vh; display: flex; flex-direction: column; align-items: center; }
        .difficulty-row { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        select { background: #1a1d21; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; width: 120px; }
        
        .bet-input-container { background: #1a1d21; width: 90%; border-radius: 12px; padding: 10px; border: 1px solid #444; margin-bottom: 20px; text-align: center; }
        #bet-amt { background: transparent; border: none; color: white; font-size: 24px; font-weight: bold; width: 100px; text-align: center; outline: none; }

        .btn-container { display: flex; width: 100%; gap: 12px; }
        .main-btn { flex: 1; padding: 20px; border: none; border-radius: 15px; font-size: 22px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        #go-btn { background: #2ecc71; color: white; box-shadow: 0 6px #27ae60; }
        #go-btn:active { transform: translateY(3px); box-shadow: 0 3px #27ae60; }
        #cash-btn { background: #f1c40f; color: black; box-shadow: 0 6px #d4ac0d; display: none; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; letter-spacing: 1px;">CHICKEN ROAD 🇪🇹</div>
    <div class="balance-box">
        <div style="font-size: 10px; color: #888; text-transform: uppercase;">Balance</div>
        <div class="balance" id="bal-txt">1,000.00 ETB</div>
    </div>
</div>

<div class="nav-btns">
    <button class="nav-btn dep-btn" onclick="alert('ቴሌብርን በመጠቀም ገንዘብ ያስገቡ...')">DEPOSIT</button>
    <button class="nav-btn wit-btn" onclick="alert('ገንዘብ ለማውጣት አካውንትዎን ያስገቡ...')">WITHDRAW</button>
</div>

<div id="game-screen">
    <div class="road-line" style="bottom: 20%;"></div>
    <div class="road-line" style="bottom: 40%;"></div>
    <div class="road-line" style="bottom: 60%;"></div>
    <div class="road-line" style="bottom: 80%;"></div>

    <div class="m-tag" style="bottom: 20%;">1.44x</div>
    <div class="m-tag" style="bottom: 40%;">2.21x</div>
    <div class="m-tag" style="bottom: 60%;">3.45x</div>
    <div class="m-tag" style="bottom: 80%;">5.53x</div>
    <div class="m-tag" style="top: 5%;">9.09x</div>

    <img id="chicken" src="https://img.icons8.com/emoji/96/000000/chicken-emoji.png">
</div>

<div class="ui-panel">
    <div class="difficulty-row">
        <span style="font-size: 14px; color: #aaa;">ደረጃ (Level):</span>
        <select id="speed-level">
            <option value="4">Easy</option>
            <option value="7" selected>Medium</option>
            <option value="12">Hard</option>
            <option value="18">Extreme</option>
        </select>
    </div>

    <div class="bet-input-container">
        <input type="number" id="bet-amt" value="10">
        <span style="color: #2ecc71; font-weight: bold;">ETB</span>
    </div>

    <div class="btn-container">
        <button id="cash-btn" class="main-btn" onclick="cashOut()">CASH OUT</button>
        <button id="go-btn" class="main-btn" onclick="play()">PLAY / GO</button>
    </div>
</div>

<script>
    let balance = 1000;
    let step = 0;
    let isPlaying = false;
    let trafficTimer;
    const mults = [1.44, 2.21, 3.45, 5.53, 9.09];
    
    const chicken = document.getElementById('chicken');
    const goBtn = document.getElementById('go-btn');
    const cashBtn = document.getElementById('cash-btn');
    const balDisplay = document.getElementById('bal-txt');

    function play() {
        let bet = parseFloat(document.getElementById('bet-amt').value);
        
        if (!isPlaying) {
            if (balance < bet) return alert("በቂ ብር የለህም!");
            balance -= bet;
            isPlaying = true;
            goBtn.innerText = "GO";
            cashBtn.style.display = "block";
            startTraffic();
            updateUI();
        }

        step++;
        chicken.style.bottom = (step * 20) + "%";
        cashBtn.innerText = "CASH (" + (bet * mults[step-1]).toFixed(2) + ")";

        if (step >= 5) {
            setTimeout(() => {
                let win = bet * mults[4];
                balance += win;
                alert("ተሳካ! " + win.toFixed(2) + " ብር አሸነፍክ!");
                resetGame();
            }, 300);
        }
    }

    function startTraffic() {
        trafficTimer = setInterval(() => {
            if (!isPlaying) return;
            createCar();
        }, 900);
    }

    function createCar() {
        const car = document.createElement('div');
        car.className = 'car';
        const colors = ["#e74c3c", "#3498db", "#f1c40f", "#9b59b6", "#ecf0f1"];
        car.style.background = colors[Math.floor(Math.random() * colors.length)];
        
        const lanes = [20, 40, 60, 80];
        car.style.bottom = lanes[Math.floor(Math.random() * lanes.length)] + "%";
        car.style.left = "-70px";
        document.getElementById('game-screen').appendChild(car);

        let baseSpeed = parseInt(document.getElementById('speed-level').value);
        let speed = baseSpeed + Math.random() * 5;

        let moveCar = setInterval(() => {
            let x = parseInt(car.style.left);
            if (x > window.innerWidth || !isPlaying) {
                clearInterval(moveCar);
                car.remove();
            } else {
                car.style.left = (x + speed) + "px";
                if (checkCollision(car)) {
                    isPlaying = false;
                    chicken.src = "https://img.icons8.com/emoji/96/000000/feather-emoji.png"; // አደጋ
                    setTimeout(() => { alert("መኪና ገጭቶሃል! ተበላህ።"); resetGame(); }, 500);
                }
            }
        }, 20);
    }

    function checkCollision(car) {
        let c = chicken.getBoundingClientRect();
        let r = car.getBoundingClientRect();
        return !(r.left > c.right || r.right < c.left || r.top > c.bottom || r.bottom < c.top);
    }

    function cashOut() {
        let bet = parseFloat(document.getElementById('bet-amt').value);
        let win = bet * mults[step-1];
        balance += win;
        alert("እንኳን ደስ አለህ! " + win.toFixed(2) + " ብር ወስደሃል።");
        resetGame();
    }

    function resetGame() {
        isPlaying = false;
        clearInterval(trafficTimer);
        step = 0;
        chicken.style.bottom = "5px";
        chicken.src = "https://img.icons8.com/emoji/96/000000/chicken-emoji.png";
        goBtn.innerText = "PLAY / GO";
        cashBtn.style.display = "none";
        document.querySelectorAll('.car').forEach(c => c.remove());
        updateUI();
    }

    function updateUI() {
        balDisplay.innerText = balance.toFixed(2) + " ETB";
    }
</script>
</body>
</html>
