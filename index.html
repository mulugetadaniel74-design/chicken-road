<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chicken Road Side Scroll</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #1a1d21; color: white; font-family: sans-serif; overflow: hidden; }
        .header { background: #2c313a; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3e4451; }
        .balance { font-size: 18px; font-weight: bold; color: #2ecc71; }
        
        #game-window { width: 100%; height: 50vh; background: #333; position: relative; overflow-x: auto; overflow-y: hidden; display: flex; align-items: center; border-bottom: 4px solid #444; }
        #road { width: 2000px; height: 100%; position: relative; background: linear-gradient(to bottom, #444 0%, #444 80%, #555 80%, #555 100%); }
        
        .manhole { position: absolute; width: 70px; height: 70px; background: #555; border: 4px solid #666; border-radius: 50%; bottom: 20%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; color: #aaa; box-shadow: inset 0 0 10px #000; }
        
        #chicken { width: 60px; position: absolute; bottom: 22%; left: 20px; z-index: 10; transition: left 0.5s ease-out; }
        
        .ui-panel { padding: 15px; background: #252930; height: 40vh; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        .bet-amounts { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 15px; }
        .amt-btn { flex: 1; background: #333; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; font-size: 14px; }
        .amt-btn.active { border-color: #2ecc71; background: rgba(46, 204, 113, 0.1); }
        
        #play-btn { width: 100%; background: #2ecc71; color: white; border: none; padding: 18px; border-radius: 12px; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 4px #27ae60; }
        #play-btn:disabled { background: #555; box-shadow: none; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold;">CHICKEN ROAD</div>
    <div class="balance" id="balance-txt">1 000 000 <span>$</span></div>
</div>

<div id="game-window">
    <div id="road">
        <div class="manhole" style="left: 150px;">1.01x</div>
        <div class="manhole" style="left: 300px;">1.20x</div>
        <div class="manhole" style="left: 450px;">1.50x</div>
        <div class="manhole" style="left: 600px;">2.00x</div>
        <div class="manhole" style="left: 750px;">3.00x</div>
        <img id="chicken" src="https://img.icons8.com/emoji/96/000000/chicken-emoji.png">
    </div>
</div>

<div class="ui-panel">
    
    <div class="bet-amounts">
        <button class="amt-btn active" onclick="setBet(0.5, this)">0.5 $</button>
        <button class="amt-btn" onclick="setBet(1, this)">1 $</button>
        <button class="amt-btn" onclick="setBet(2, this)">2 $</button>
        <button class="amt-btn" onclick="setBet(7, this)">7 $</button>
    </div>

    <button id="play-btn" onclick="nextStep()">PLAY</button>
</div>

<script>
    let balance = 1000000;
    let bet = 0.5;
    let currentPos = 20;
    let step = 0;
    const chicken = document.getElementById('chicken');
    const road = document.getElementById('game-window');

    function setBet(val, el) {
        if(step > 0) return; // ጨዋታ ከጀመረ መቀየር አይቻልም
        bet = val;
        document.querySelectorAll('.amt-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function nextStep() {
        if (step === 0) {
            if(balance < bet) return alert("በቂ ገንዘብ የለህም!");
            balance -= bet;
            updateUI();
        }

        step++;
        currentPos += 150; // ወደ ቀጣዩ ክዳን ሂድ
        chicken.style.left = currentPos + "px";
        
        // ስክሪኑ ዶሮዋን እንዲከተል (Auto-scroll)
        road.scrollTo({ left: currentPos - 50, behavior: 'smooth' });

        // የማሸነፍ እድል (ለጊዜው 80%)
        if (Math.random() < 0.2) {
            setTimeout(() => {
                alert("ተበልተሃል! እንደገና ሞክር።");
                resetGame();
            }, 600);
        } else if (step >= 5) {
            setTimeout(() => {
                let winAmt = bet * 3;
                balance += winAmt;
                alert("ተሳካ! " + winAmt + " ብር አሸነፍክ!");
                resetGame();
            }, 600);
        }
        
        document.getElementById('play-btn').innerText = "ቀጥል (Step " + step + ")";
    }

    function resetGame() {
        step = 0;
        currentPos = 20;
        chicken.style.left = "20px";
        road.scrollTo({ left: 0, behavior: 'smooth' });
        document.getElementById('play-btn').innerText = "PLAY";
        updateUI();
    }

    function updateUI() {
        document.getElementById('balance-txt').innerText = balance.toFixed(2) + " ETB";
    }

    window.Telegram.WebApp.ready();
</script>

</body>
</html>
