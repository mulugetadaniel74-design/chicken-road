<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setgame - KENO ROYAL</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #12191c; color: white; margin: 0; padding: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; color: #4caf50; font-weight: bold; }
        .balance { color: white; }
        .deposit-btn { background-color: #2eb85c; color: black; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; margin-bottom: 10px; font-size: 16px; cursor: pointer; }
        .withdraw-link { color: #e53935; text-decoration: none; font-size: 14px; display: block; margin-bottom: 15px; font-weight: bold; }
        .timer { color: #ffc107; font-size: 14px; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background-color: #1c2529; padding: 10px; border-radius: 8px; }
        .number { background-color: #2a3539; padding: 10px 0; border-radius: 4px; font-size: 12px; cursor: pointer; color: #888; text-align: center; }
        .selected { background-color: #2eb85c !important; color: white; }
        .footer-btn { background-color: #333; color: #777; border: none; width: 100%; padding: 18px; border-radius: 15px; margin-top: 20px; font-size: 18px; font-weight: bold; }
        
        /* ፎቶ መላኪያ ቦታ */
        #photoBox { display: none; background: #1c2529; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #2eb85c; }
    </style>
</head>
<body>

<div class="header">
    <span>KENO ROYAL</span>
    <span class="balance">0.00 ETB</span>
</div>

<button class="deposit-btn" onclick="openPhoto()">💰 ብር ያስገቡ (Deposit)</button>

<div id="photoBox">
    <p style="font-size: 12px;">የከፈሉበትን Screenshot ይምረጡ፡</p>
    <input type="file" id="receipt" accept="image/*">
    <button onclick="sendPhoto()" style="background:#2eb85c; border:none; padding:8px; width:100%; border-radius:5px; margin-top:5px;">ጥያቄ ላክ</button>
</div>

<a href="#" class="withdraw-link" onclick="askWithdraw()">💸 ብር ለማውጣት (Withdraw)</a>

<div class="timer">ቀጣይ እጣ በ: <span id="time">00:46</span></div>

<div class="grid" id="kenoGrid">
    </div>

<button class="footer-btn" id="playBtn">ውርርድ (15 ETB)</button>

<script>
    // ቁጥሮችን መፍጠር
    let selected = [];
    const grid = document.getElementById('kenoGrid');
    for (let i = 1; i <= 80; i++) {
        let div = document.createElement('div');
        div.className = 'number';
        div.innerText = i;
        div.onclick = () => {
            if (selected.includes(i)) {
                selected = selected.filter(n => n !== i);
                div.classList.remove('selected');
            } else if (selected.length < 10) {
                selected.push(i);
                div.classList.add('selected');
            }
            updateBtn();
        };
        grid.appendChild(div);
    }

    function openPhoto() { document.getElementById('photoBox').style.display = 'block'; }
    
    function sendPhoto() {
        let file = document.getElementById('receipt').files[0];
        if(!file) { alert("መጀመሪያ ፎቶ ይምረጡ!"); return; }
        window.location.href = "https://t.me/RunChickenRunBot?start=Deposit_Request";
    }

    function askWithdraw() {
        let amt = prompt("የሚወጣው የብር መጠን?");
        let phone = prompt("የቴሌብር ስልክ ቁጥር?");
        if(amt && phone) {
            window.location.href = `https://t.me/RunChickenRunBot?start=Withdraw_${amt}_Phone_${phone}`;
        }
    }

    function updateBtn() {
        let btn = document.getElementById('playBtn');
        if(selected.length > 0) {
            btn.style.backgroundColor = "#2eb85c";
            btn.style.color = "black";
            btn.innerText = `ውርርድ (${selected.length * 15} ETB)`;
        }
    }
</script>

</body>
</html>
