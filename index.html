<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANIEL KENO ROYAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #0a0a0a; --card: #161616; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { background-color: var(--dark); color: white; text-align: center; font-family: sans-serif; margin: 0; padding-bottom: 20px; }
        
        .header { background: #1a1a1a; padding: 10px; border-bottom: 2px solid var(--gold); }
        .balance-box { border: 2px solid var(--gold); display: inline-block; padding: 5px 15px; border-radius: 50px; font-size: 20px; color: var(--gold); font-weight: bold; background: #000; }

        /* Odds Table Styling */
        .odds-container { background: #111; margin: 10px; padding: 10px; border-radius: 10px; border: 1px solid #333; font-size: 0.8rem; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { color: var(--gold); border-bottom: 1px solid #333; padding: 5px; }
        td { padding: 5px; border-bottom: 1px solid #222; }

        /* Grid Setup */
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; background: #111; padding: 8px; border-radius: 10px; margin: 10px; }
        .num { background: #333; border: 1px solid #444; padding: 10px 0; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .selected { background: var(--blue) !important; color: white; box-shadow: 0 0 8px var(--blue); }
        .hit { background: var(--gold) !important; color: black; animation: pulse 0.5s infinite; }
        
        /* Ticket View */
        .ticket-card { background: #222; border-left: 5px solid var(--green); margin: 10px; padding: 12px; text-align: left; border-radius: 8px; position: relative; }
        .ticket-nums { color: var(--gold); font-weight: bold; font-size: 1rem; margin-top: 5px; letter-spacing: 1px; }
        .win-tag { position: absolute; right: 10px; top: 10px; background: var(--green); color: black; padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }

        .btn-bet { width: 90%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; background: var(--green); color: white; margin-top: 10px; }
        .timer { font-size: 2.5rem; color: var(--red); font-weight: bold; margin: 10px 0; }
        
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0; color:var(--gold);">DANIEL KENO ROYAL</h3>
    <div class="balance-box">💰 <span id="balance">0.00</span> ETB</div>
    <div style="font-size:10px; color:#888;">ID: <span id="myID">...</span></div>
</div>

<div class="timer" id="timerDisplay">01:00</div>

<div class="odds-container">
    <h4 style="margin:5px 0; color:var(--blue);">የአሸናፊነት ማባዣ (Odds)</h4>
    <table>
        <tr><th>ምርጫ</th><th>2 ቁጥር</th><th>3 ቁጥር</th><th>5 ቁጥር</th><th>10 ቁጥር</th></tr>
        <tr><td>ድል</td><td>x10</td><td>x20</td><td>x100</td><td>x10,000</td></tr>
    </table>
</div>

<div class="grid" id="grid"></div>

<div style="padding: 10px; background: #1a1a1a;">
    መወራረጃ: <input type="number" id="betAmount" value="15" min="15" style="width:60px; background:black; color:var(--gold); border:1px solid var(--gold); padding:5px; border-radius:5px;">
    <button onclick="buyTicket()" class="btn-bet">ትኬት ቁረጥ (PLACE BET)</button>
</div>

<div id="statusUpdate" style="color:var(--gold); font-size:0.9rem; margin-top:10px;"></div>

<div style="text-align:left; padding:10px;">
    <h4 style="border-bottom: 1px solid #333; padding-bottom:5px;">🎫 የእርስዎ ትኬቶች</h4>
    <div id="activeTicketsList">ትኬት አልቆረጡም...</div>
</div>

<script>
    // Firebase Setup (የአንተን መረጃ እዚህ አስገባ)
    const firebaseConfig = {
        apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA",
        authDomain: "chickenkeno-c41fa.firebaseapp.com",
        projectId: "chickenkeno-c41fa",
        databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com",
        storageBucket: "chickenkeno-c41fa.appspot.com",
        messagingSenderId: "423384148862",
        appId: "1:423384148862:web:99e9faebe83982f95be12f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let uID = localStorage.getItem('keno_user_id') || "USER-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('keno_user_id', uID);
    document.getElementById('myID').innerText = uID;

    db.ref('users/' + uID + '/balance').on('value', s => document.getElementById('balance').innerText = (s.val() || 0).toFixed(2));

    const grid = document.getElementById('grid');
    let selectedNums = [], activeBets = [];

    // Create Grid
    for(let i=1; i<=80; i++) {
        let d = document.createElement('div'); d.className='num'; d.id='n'+i; d.innerText=i;
        d.onclick=()=>{ 
            if(d.classList.contains('selected')){ d.classList.remove('selected'); selectedNums = selectedNums.filter(x => x !== i); }
            else if(selectedNums.length < 10){ d.classList.add('selected'); selectedNums.push(i); }
        };
        grid.appendChild(d);
    }

    function buyTicket() {
        let amt = parseFloat(document.getElementById('betAmount').value);
        if(amt < 15 || selectedNums.length < 2) return alert("ቢያንስ 2 ቁጥር ይምረጡ!");
        
        db.ref('users/' + uID + '/balance').once('value', s => {
            let bal = s.val() || 0;
            if(bal < amt) return alert("በቂ ብር የለም!");
            db.ref('users/' + uID).update({balance: bal - amt});
            
            // ትኬቱን መመዝገብ
            activeBets.push({nums: [...selectedNums], bet: amt, count: selectedNums.length});
            renderTickets();
            
            // የቴሌግራም መልክት ለ @Godis1256 እንዲደርስህ
            fetch(`https://api.telegram.org/bot8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw/sendMessage?chat_id=7313437942&text=🎟 ትኬት ተቆረጠ! ID:${uID} Amt:${amt} Nums:${selectedNums.join(',')}`);
            
            selectedNums = [];
            document.querySelectorAll('.num').forEach(n => n.classList.remove('selected'));
            document.getElementById('statusUpdate').innerText = "ትኬት ተቆርጧል! መልካም እድል!";
        });
    }

    function renderTickets(drawn = []) {
        let list = document.getElementById('activeTicketsList');
        if(activeBets.length === 0) { list.innerHTML = "ትኬት የለም..."; return; }
        
        list.innerHTML = activeBets.map((t, index) => {
            let hits = t.nums.filter(n => drawn.includes(n)).length;
            return `
                <div class="ticket-card">
                    <div style="font-size:0.8rem; color:#888;">ትኬት #${index+1} | መወራረጃ: ${t.bet} ETB</div>
                    <div class="ticket-nums">${t.nums.join(' - ')}</div>
                    <div style="font-size:0.8rem; margin-top:5px;">የመቱ ቁጥሮች: <span style="color:var(--green)">${hits}</span></div>
                </div>
            `;
        }).join('');
    }

    let timeLeft = 60;
    setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById('timerDisplay').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
        if(timeLeft <= 0) runDraw();
    }, 1000);

    async function runDraw() {
        let drawn = [];
        while(drawn.length < 20) { let r = Math.floor(Math.random()*80)+1; if(!drawn.includes(r)) drawn.push(r); }
        
        document.querySelectorAll('.num').forEach(n => n.classList.remove('hit'));
        
        for(let n of drawn) {
            await new Promise(res => setTimeout(res, 300));
            document.getElementById('n'+n).classList.add('hit');
            renderTickets(drawn); // ውጤቱን እያረጋገጠ ያሳያል
        }

        // ውጤቱን ለቴሌግራም መላክ
        fetch(`https://api.telegram.org/bot8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw/sendMessage?chat_id=7313437942&text=🎰 እጣው ወጣ! ID:${uID} Numbers:${drawn.slice(0,5).join(',')}...`);

        activeBets = [];
        timeLeft = 60;
        document.getElementById('statusUpdate').innerText = "አዲስ ጨዋታ ተጀምሯል!";
    }
</script>

</body>
</html>
