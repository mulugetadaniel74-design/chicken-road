<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keno Pro - 80</title>
    <style>
        body { margin: 0; background: #1a1d21; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; text-align: center; }
        .header { background: #24292e; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2ecc71; position: sticky; top: 0; z-index: 100; }
        .balance { color: #2ecc71; font-weight: bold; font-size: 20px; }
        
        .keno-container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .info-text { color: #888; font-size: 14px; margin-bottom: 10px; }

        /* Keno Grid */
        .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; margin-bottom: 20px; }
        .num { background: #2c313a; padding: 12px 0; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; border: 1px solid #3e4451; transition: 0.2s; }
        .num.selected { background: #2ecc71; color: white; border-color: #2ecc71; transform: scale(0.95); }
        .num.draw-win { background: #f1c40f; color: black; border-color: #f1c40f; animation: pulse 0.5s infinite; }
        .num.draw-miss { background: #e74c3c; color: white; border-color: #e74c3c; }

        /* Betting Controls */
        .controls { background: #24292e; padding: 20px; border-radius: 20px 20px 0 0; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .bet-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .bet-btn { background: #333; border: none; color: white; width: 45px; height: 45px; border-radius: 10px; font-size: 20px; font-weight: bold; }
        #bet-display { font-size: 22px; font-weight: bold; min-width: 80px; }
        
        .play-btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-size: 22px; font-weight: bold; cursor: pointer; background: #2ecc71; color: white; box-shadow: 0 5px #27ae60; }
        .play-btn:disabled { background: #555; box-shadow: none; cursor: not-allowed; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; letter-spacing: 1px;">KENO 80</div>
    <div class="balance" id="bal-txt">1,000.00 ETB</div>
</div>

<div class="keno-container">
    <div class="info-text">ከ 1 እስከ 10 ቁጥሮችን ይምረጡ</div>
    <div class="grid" id="keno-grid"></div>
</div>

<div style="height: 180px;"></div> <div class="controls">
    <div class="bet-row">
        <button class="bet-btn" onclick="changeBet(-10)">-</button>
        <div id="bet-display">10</div>
        <button class="bet-btn" onclick="changeBet(10)">+</button>
    </div>
    <button id="play-btn" class="play-btn" onclick="startDraw()">BET (KENO)</button>
</div>

<script>
    let balance = 1000, bet = 10, selected = [];
    const grid = document.getElementById('keno-grid');

    // Create 80 Numbers
    for(let i=1; i<=80; i++) {
        let n = document.createElement('div');
        n.className = 'num';
        n.innerText = i;
        n.onclick = () => toggleNum(i, n);
        grid.appendChild(n);
    }

    function toggleNum(i, el) {
        if(selected.includes(i)) {
            selected = selected.filter(num => num !== i);
            el.classList.remove('selected');
        } else if(selected.length < 10) {
            selected.push(i);
            el.classList.add('selected');
        }
    }

    function changeBet(v) {
        bet = Math.max(10, bet + v);
        document.getElementById('bet-display').innerText = bet;
    }

    function startDraw() {
        if(selected.length === 0) return alert("እባክህ ቢያንስ 1 ቁጥር ምረጥ!");
        if(balance < bet) return alert("በቂ ብር የለህም!");

        balance -= bet;
        updateUI();
        document.getElementById('play-btn').disabled = true;

        // Reset previous colors
        document.querySelectorAll('.num').forEach(n => n.classList.remove('draw-win', 'draw-miss'));

        let draw = [];
        let count = 0;
        let hits = 0;

        let interval = setInterval(() => {
            let r;
            do { r = Math.floor(Math.random() * 80) + 1; } while(draw.includes(r));
            draw.push(r);
            
            let el = grid.children[r-1];
            if(selected.includes(r)) {
                el.classList.add('draw-win');
                hits++;
            } else {
                el.classList.add('draw-miss');
            }

            count++;
            if(count >= 20) {
                clearInterval(interval);
                finishGame(hits);
            }
        }, 150);
    }

    function finishGame(hits) {
        let winMult = 0;
        // Simple Paytable
        if(hits === 1) winMult = 1.5;
        else if(hits === 2) winMult = 3;
        else if(hits === 3) winMult = 10;
        else if(hits >= 4) winMult = 50;

        if(winMult > 0) {
            let winAmt = bet * winMult;
            balance += winAmt;
            alert("እንኳን ደስ አለህ! " + hits + " ቁጥሮች ገጥመውልሃል! " + winAmt + " ብር አሸነፍክ!");
        } else {
            alert("ምንም አልገጠመም። እንደገና ሞክር!");
        }

        document.getElementById('play-btn').disabled = false;
        updateUI();
    }

    function updateUI() {
        document.getElementById('bal-txt').innerText = balance.toFixed(2) + " ETB";
    }
</script>

</body>
</html>
