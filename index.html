<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keno Royal - Admin Control</title>
    <style>
        body { margin: 0; background: #121417; color: white; font-family: sans-serif; text-align: center; }
        .header { background: #1c1f24; padding: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid #2ecc71; }
        .wallet-bar { display: flex; gap: 10px; padding: 10px; }
        .w-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        .dep-btn { background: #2ecc71; color: black; }
        
        .timer-panel { background: #1c1f24; margin: 10px; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; padding: 10px; max-width: 450px; margin: 0 auto; }
        .num { background: #24292e; padding: 12px 0; border-radius: 4px; font-size: 13px; font-weight: bold; color: #666; border: 1px solid #333; }
        .num.selected { background: #2ecc71 !important; color: white !important; }

        .footer { background: #1c1f24; padding: 15px; position: fixed; bottom: 0; width: 100%; border-radius: 20px 20px 0 0; }
        .play-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; background: #2ecc71; color: white; }
        .play-btn:disabled { background: #333 !important; color: #555 !important; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1c1f24; padding: 25px; border-radius: 15px; border: 2px solid #2ecc71; z-index: 1000; width: 85%; }
        .modal input { width: 100%; padding: 12px; margin: 10px 0; background: #24292e; border: 1px solid #444; color: white; border-radius: 8px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; }
        
        #admin-panel { display: none; background: #1c1f24; padding: 20px; border: 2px solid #f1c40f; position: fixed; top: 10%; width: 90%; left: 5%; z-index: 2000; border-radius: 15px; }
        .request-card { background: #24292e; padding: 15px; margin-bottom: 10px; border-radius: 8px; text-align: left; border-left: 5px solid #2ecc71; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="checkAdmin()" style="font-weight: bold; color: #2ecc71; cursor:pointer;">KENO ROYAL</div>
    <div id="bal-display" style="font-weight: bold; font-size: 18px;">0.00 ETB</div>
</div>

<div class="wallet-bar">
    <button class="w-btn dep-btn" onclick="openDeposit()">💰 ብር ያስገቡ (Deposit)</button>
</div>

<div id="admin-panel">
    <h3 style="color:#f1c40f;">የዳንኤል መቆጣጠሪያ (Admin)</h3>
    <div id="request-list" style="max-height: 300px; overflow-y: auto;">ምንም ጥያቄ የለም...</div>
    <button class="w-btn" style="background:#444; margin-top:10px;" onclick="closeAdmin()">ዝጋ</button>
</div>

<div class="timer-panel">ቀጣይ እጣ በ: <span id="timer-txt" style="color:#f1c40f; font-weight:bold;">01:00</span></div>
<div class="grid" id="keno-grid"></div>

<div class="footer">
    <div id="status-msg" style="color: #e74c3c; font-size: 12px; margin-bottom: 5px; display: none;">ሒሳብ የለዎትም!</div>
    <button id="play-btn" class="play-btn" disabled>ውርርድ (15 ETB)</button>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="dep-modal">
    <h3 style="color:#2ecc71;">የቴሌብር ማረጋገጫ</h3>
    <p style="font-size: 13px;"><b>ለዳንኤል ሙሉጌታ (0986980130)</b> ይላኩና Screenshot እዚህ ይጫኑ።</p>
    <input type="number" id="dep-amt" placeholder="የተላከው መጠን">
    <input type="file" id="dep-img" accept="image/*">
    <button class="play-btn" onclick="submitRequest()">ጥያቄ ላክ</button>
</div>

<script>
    let balance = 0, bet = 15, requests = [], timeLeft = 60;
    
    // ቦርድ መፍጠር
    for(let i=1; i<=80; i++) {
        let n = document.createElement('div');
        n.className = 'num'; n.innerText = i;
        document.getElementById('keno-grid').appendChild(n);
    }

    function openDeposit() { document.getElementById('dep-modal').style.display='block'; document.getElementById('overlay').style.display='block'; }
    function closeModal() { document.getElementById('dep-modal').style.display='none'; document.getElementById('overlay').style.display='none'; }

    function submitRequest() {
        let amt = document.getElementById('dep-amt').value;
        if(amt >= 100) {
            requests.push({ id: Date.now(), amount: amt, status: 'Pending' });
            alert("ጥያቄው ለዳንኤል ተልኳል! እባክዎ ጥቂት ደቂቃ ይጠብቁ።");
            closeModal();
        }
    }

    function checkAdmin() {
        if(prompt("የአድሚን ኮድ ያስገቡ:") === "2026") {
            document.getElementById('admin-panel').style.display = 'block';
            renderRequests();
        }
    }

    function renderRequests() {
        let list = document.getElementById('request-list');
        list.innerHTML = requests.filter(r => r.status === 'Pending').map(r => `
            <div class="request-card">
                <b>መጠን:</b> ${r.amount} ETB <br>
                <button onclick="approve(${r.id})" style="background:#2ecc71; border:none; color:black; padding:8px; margin-top:5px; border-radius:5px; font-weight:bold;">Approve (ልቀቅ)</button>
            </div>
        `).join('') || "ምንም አዲስ ጥያቄ የለም።";
    }

    function approve(id) {
        let req = requests.find(r => r.id === id);
        if(req) {
            balance += parseFloat(req.amount);
            req.status = 'Approved';
            document.getElementById('bal-display').innerText = balance.toFixed(2) + " ETB";
            document.getElementById('play-btn').disabled = balance < bet;
            renderRequests();
            alert("ብሩ ተለቋል!");
        }
    }

    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    setInterval(() => { timeLeft--; if(timeLeft<=0) timeLeft=60; document.getElementById('timer-txt').innerText = `00:${timeLeft.toString().padStart(2,'0')}`; }, 1000);
</script>
</body>
</html>
