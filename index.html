<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANIEL KENO ROYAL - PRO V4</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #0a0a0a; --card: #161616; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { background-color: var(--dark); color: white; text-align: center; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        .header { background: var(--card); padding: 15px; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .balance-box { border: 2px solid var(--gold); display: inline-block; padding: 8px 20px; border-radius: 12px; font-size: 22px; color: var(--gold); font-weight: bold; background: #000; }
        .u-id-display { color: #888; font-size: 13px; margin-top: 5px; font-weight: bold; }
        .timer-display { font-size: 2.5rem; font-weight: bold; color: var(--red); margin: 10px; }
        
        .main-layout { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 10px; }
        .game-area { flex: 1; min-width: 320px; max-width: 450px; }
        .ticket-sidebar { flex: 0.8; min-width: 280px; background: #111; border-radius: 15px; padding: 15px; border: 1px solid #333; max-height: 400px; overflow-y: auto; }

        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin: 10px auto; }
        .num { background: #333; border: 1px solid #444; padding: 10px 0; font-weight: bold; border-radius: 5px; font-size: 0.9rem; transition: 0.3s; }
        .selected { background: var(--blue) !important; color: white; }
        .hit { background: var(--gold) !important; color: black; box-shadow: 0 0 15px var(--gold); }

        .ticket-item { background: #222; margin-bottom: 8px; padding: 10px; border-radius: 8px; text-align: left; border-left: 4px solid var(--blue); }
        .ticket-nums { color: #bbb; font-size: 0.85rem; margin-top: 5px; }
        .match { color: var(--green); font-weight: bold; }

        .result-panel { background: #1a1a1a; margin: 15px 0; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .drawn-nums { color: var(--gold); font-weight: bold; font-size: 1.1rem; min-height: 40px; word-spacing: 5px; }

        .btn-main { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; background: var(--green); color: white; margin: 10px 0; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); }
        .modal-content { background: var(--card); margin: 15% auto; padding: 25px; width: 85%; border-radius: 15px; border: 1px solid var(--gold); text-align: left; }
        
        .input-field { width: 90%; background: #000; color: var(--gold); border: 1px solid var(--gold); padding: 10px; border-radius: 5px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0; color:var(--gold);">🎰 DANIEL KENO ROYAL</h3>
    <div class="balance-box">💰 <span id="balance">0.00</span> ETB</div>
    <div class="u-id-display">የእርሶ መለያ (ID): <span id="myID" style="color:var(--gold);">...</span></div>
</div>

<div class="main-layout">
    <div class="game-area">
        <div class="timer-display" id="timerDisplay">01:00</div>
        <div id="oddsInfo" style="font-size: 0.85rem; background: #222; padding: 8px; border-radius: 5px; margin-bottom: 10px; color: var(--gold);">ቢያንስ 2 ቁጥር ይምረጡ...</div>
        <div class="grid" id="grid"></div>
        <div style="margin:10px;">
            ወራጅ: <input type="number" id="betAmount" value="15" min="15" style="width:70px; background:#000; color:var(--gold); border:1px solid #444; text-align:center; padding:5px; border-radius:5px;">
            <button onclick="buyTicket()" class="btn-main">ትኬት ቁረጥ (BUY)</button>
        </div>
        <div class="result-panel">
            <div style="color:#666; font-size:0.8rem; margin-bottom:5px;">የቀጥታ ውጤት</div>
            <div id="drawnNumbersList" class="drawn-nums">...</div>
        </div>
    </div>

    <div class="ticket-sidebar">
        <h4 style="margin:0 0 10px 0; color:var(--blue); border-bottom:1px solid #333; padding-bottom:5px;">የቆረጧቸው ትኬቶች</h4>
        <div id="activeTicketsList">ትኬት አልቆረጡም...</div>
    </div>
</div>

<div style="display:flex; justify-content:center; gap:10px; margin-bottom: 20px;">
    <button onclick="showModal('depModal')" style="background:var(--blue); color:white; border:none; padding:12px; border-radius:8px; width:45%; font-weight:bold;">Deposit 📥</button>
    <button onclick="showModal('witModal')" style="background:var(--red); color:white; border:none; padding:12px; border-radius:8px; width:45%; font-weight:bold;">Withdraw 📤</button>
</div>

<button onclick="adminAction()" style="background:transparent; border:none; color:#1a1a1a; font-size:11px; cursor:pointer;">Admin Login ⚙️</button>

<div id="depModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--blue);">📥 ብር ለማስገባት</h3>
    <p>ስም: <b>Daniel Mulugeta</b><br>Telebirr: <b>0986980130</b><br>አቢሲኒያ: <b>153682704</b></p>
    <p style="color:var(--gold);">* ቢያንስ 100 ብር እና በላይ</p>
    <p>የእርሶን ID ለባለቤቱ ይላኩ።</p>
    <button onclick="closeModal('depModal')" style="background:#444; color:white; width:100%; padding:10px; border:none; border-radius:5px;">ዝጋ</button>
</div></div>

<div id="witModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--red);">📤 ብር ለማውጣት</h3>
    <p>የሚወጣ መጠን (Min 300 ETB):</p>
    <input type="number" id="witAmt" class="input-field" placeholder="መጠን ያስገቡ...">
    <button onclick="requestWithdraw()" style="background:var(--green); color:white; width:100%; padding:12px; border:none; border-radius:8px; margin-top:15px; font-weight:bold;">አረጋግጥ (Confirm)</button>
    <button onclick="closeModal('witModal')" style="background:#444; color:white; width:100%; padding:10px; border:none; border-radius:5px; margin-top:10px;">ተመለስ</button>
</div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA",
        authDomain: "chickenkeno-c41fa.firebaseapp.com",
        projectId: "chickenkeno-c41fa",
        databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com",
        storageBucket: "chickenkeno-c41fa.appspot.com",
        messagingSenderId: "423384148862",
        appId: "1:423384148862:web:99e9faebe83982f95be12f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const BOT_TOKEN = "8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw";
    const CHAT_ID = "7313437942";

    let uID = localStorage.getItem('keno_user_id') || "USER-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('keno_user_id', uID);
    document.getElementById('myID').innerText = uID;
    db.ref('users/' + uID + '/balance').on('value', s => document.getElementById('balance').innerText = (s.val() || 0).toFixed(2));

    const kenoRules = {
        2: { 2: 10 }, 3: { 2: 1, 3: 20 }, 4: { 2: 0.5, 3: 4, 4: 40 }, 5: { 3: 3, 4: 15, 5: 100 },
        6: { 3: 1, 4: 8, 5: 50, 6: 250 }, 7: { 4: 3, 5: 20, 6: 150, 7: 1000 }, 8: { 4: 1, 5: 10, 6: 50, 7: 500, 8: 2000 },
        9: { 5: 5, 6: 25, 7: 150, 8: 1000, 9: 4000 }, 10: { 5: 2, 6: 15, 7: 100, 8: 500, 9: 2500, 10: 10000 }
    };

    const grid = document.getElementById('grid');
    let selectedNums = [], activeBets = [];

    for(let i=1; i<=80; i++) {
        let d = document.createElement('div'); d.className='num'; d.id='n'+i; d.innerText=i;
        d.onclick=()=>{ 
            if(d.classList.contains('selected')){ d.classList.remove('selected'); selectedNums = selectedNums.filter(x => x !== i); }
            else if(selectedNums.length < 10){ d.classList.add('selected'); selectedNums.push(i); }
            updateOdds();
        };
        grid.appendChild(d);
    }

    function updateOdds() {
        let count = selectedNums.length;
        let info = document.getElementById('oddsInfo');
        if (count < 2) { info.innerHTML = "ቢያንስ 2 ቁጥር ይምረጡ..."; return; }
        let rule = kenoRules[count], html = `<b>ለ ${count} ቁጥር፡</b> `;
        for (let hit in rule) html += `<span style="margin-right:8px;">${hit} ከገቡ፡ x${rule[hit]}</span>`;
        info.innerHTML = html;
    }

    function buyTicket() {
        let amt = parseFloat(document.getElementById('betAmount').value);
        if(amt < 15 || selectedNums.length < 2) return alert("ወራጅ እና ቁጥር ይምረጡ!");
        db.ref('users/' + uID + '/balance').once('value', s => {
            let bal = s.val() || 0;
            if(bal < amt) return alert("በቂ ብር የለም!");
            db.ref('users/' + uID).update({balance: bal - amt});
            activeBets.push({nums: [...selectedNums], bet: amt, count: selectedNums.length});
            renderTickets();
            selectedNums = [];
            document.querySelectorAll('.num').forEach(n => n.classList.remove('selected'));
        });
    }

    // የብር መሙያ አድሚን ሲስተም
    function adminAction() {
        let pass = prompt("Admin Password:");
        if(pass === "1234") {
            let targetID = prompt("ገንዘብ የሚሞላለት የተጫዋች ID (ለምሳሌ USER-1234):");
            let amount = parseFloat(prompt("የሚሞላው የብር መጠን:"));
            if(targetID && amount > 0) {
                db.ref('users/' + targetID).once('value', s => {
                    if(s.exists()){
                        let currentBal = s.val().balance || 0;
                        db.ref('users/' + targetID).update({balance: currentBal + amount});
                        alert("ተሳክቷል! ለ " + targetID + " " + amount + " ብር ተሞልቷል።");
                    } else { alert("ይህ ID አልተገኘም! እባክዎ በትክክል መጻፍዎን ያረጋግጡ።"); }
                });
            }
        } else if (pass !== null) { alert("የተሳሳተ ሚስጥር ቁጥር!"); }
    }

    function requestWithdraw() {
        let amt = parseFloat(document.getElementById('witAmt').value);
        if(amt < 300) return alert("ዝቅተኛው ማውጫ 300 ብር ነው!");
        db.ref('users/' + uID + '/balance').once('value', s => {
            let bal = s.val() || 0;
            if(bal < amt) return alert("በአካውንትዎ በቂ ብር የለም!");
            db.ref('users/' + uID).update({balance: bal - amt});
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=Withdraw Request! ID:${uID} Amt:${amt}`);
            alert("ጥያቄዎ ተልኳል! ባለቤቱ ሲያረጋግጥ ይላክለዎታል።");
            closeModal('witModal');
        });
    }

    function renderTickets(drawn = []) {
        let list = document.getElementById('activeTicketsList');
        if(activeBets.length === 0) { list.innerHTML = "ትኬት አልቆረጡም..."; return; }
        list.innerHTML = activeBets.map((t, idx) => {
            let hits = t.nums.filter(n => drawn.includes(n)).length;
            let numsHtml = t.nums.map(n => `<span class="${drawn.includes(n) ? 'match' : ''}">${n}${drawn.length > 0 ? (drawn.includes(n) ? '✅' : '❌') : ''}</span>`).join(' ');
            return `<div class="ticket-item"><b>ትኬት #${idx+1} (${t.bet} ETB)</b><div class="ticket-nums">${numsHtml}</div>${drawn.length > 0 ? `<div style="color:var(--gold); font-size:12px;">የገቡ፡ ${hits}/${t.count}</div>` : ""}</div>`;
        }).join('');
    }

    let timeLeft = 60, isDrawing = false;
    setInterval(() => {
        if(isDrawing) return;
        timeLeft--;
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById('timerDisplay').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        
        if(timeLeft === 59) { 
            document.querySelectorAll('.num').forEach(n => n.classList.remove('hit'));
            document.getElementById('drawnNumbersList').innerText = "...";
        }
        if(timeLeft <= 0) runDraw();
    }, 1000);

    async function runDraw() {
        isDrawing = true;
        let drawn = [];
        while(drawn.length < 20) { let r = Math.floor(Math.random()*80)+1; if(!drawn.includes(r)) drawn.push(r); }
        let displayDrawn = [];
        for(let n of drawn) {
            await new Promise(res => setTimeout(res, 400));
            document.getElementById('n'+n).classList.add('hit');
            displayDrawn.push(n);
            document.getElementById('drawnNumbersList').innerText = displayDrawn.sort((a,b)=>a-b).join('  ');
            renderTickets(displayDrawn);
        }
        activeBets.forEach(t => {
            let hits = t.nums.filter(n => drawn.includes(n)).length;
            let mult = (kenoRules[t.count] && kenoRules[t.count][hits]) || 0;
            if(mult > 0) {
                db.ref('users/' + uID + '/balance').once('value', s => db.ref('users/' + uID).update({balance: (s.val()||0) + (t.bet * mult)}));
            }
        });
        activeBets = []; isDrawing = false; timeLeft = 60;
    }

    function showModal(id) { document.getElementById(id).style.display = "block"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }
</script>
</body>
</html>
