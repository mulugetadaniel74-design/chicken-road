<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANIEL ROYAL KENO - FINAL VERSION</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #0a0a0a; --card: #161616; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { background-color: var(--dark); color: white; text-align: center; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .header { background: #1a1a1a; padding: 15px; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .balance-box { border: 2px solid var(--gold); padding: 8px 15px; border-radius: 50px; font-size: 18px; color: var(--gold); font-weight: bold; background: #000; }
        .timer-display { font-size: 3.5rem; font-weight: bold; color: var(--red); margin: 10px 0; text-shadow: 0 0 10px var(--red); }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: #111; padding: 10px; border-radius: 10px; margin: 10px; }
        .num { background: #333; border: 1px solid #444; padding: 12px 0; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .selected { background: var(--blue) !important; color: white; }
        .hit { background: var(--gold) !important; color: black; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% {transform: scale(1.1);} 100% {transform: scale(1);} }
        .bet-control { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 15px 0; }
        .circle-btn { background: #222; color: var(--gold); border: 2px solid var(--gold); width: 50px; height: 50px; border-radius: 50%; font-size: 25px; cursor: pointer; }
        .bet-input { width: 90px; background: #000; color: var(--gold); border: 2px solid var(--gold); padding: 10px; border-radius: 12px; text-align: center; font-size: 1.4rem; font-weight: bold; }
        .btn-main { width: 90%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; background: var(--green); color: white; margin-bottom: 10px; }
        .action-btns { display: flex; justify-content: center; gap: 10px; padding: 10px; }
        .btn-sub { padding: 12px; border-radius: 10px; border: none; color: white; font-weight: bold; width: 45%; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: var(--card); margin: 15% auto; padding: 20px; border-radius: 15px; width: 85%; border: 1px solid var(--gold); }
        .tg-support { position: fixed; bottom: 20px; right: 20px; background: #0088cc; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 30px; z-index: 500; border: 2px solid white; }
        #adminLink { display: none; font-size: 10px; color: #444; margin-top: 5px; cursor: pointer; background: none; border: none; }
    </style>
</head>
<body>

<div class="header">
    <div style="text-align:left">
        <h3 style="margin:0; color:var(--gold);">DANIEL ROYAL</h3>
        <div style="font-size:11px; color:#888;">ID: <span id="myID" style="color:white;">...</span></div>
        <button id="adminLink" onclick="openAdmin()">ADMIN-PANEL</button>
    </div>
    <div class="balance-box">💰 <span id="balance">0.00</span></div>
</div>

<div class="timer-display" id="timerDisplay">01:00</div>
<div class="grid" id="grid"></div>

<div class="bet-control">
    <button class="circle-btn" onclick="changeBet(-5)">-</button>
    <input type="number" id="betAmount" value="15" min="15" readonly class="bet-input">
    <button class="circle-btn" onclick="changeBet(5)">+</button>
</div>

<button onclick="buyTicket()" class="btn-main">ትኬት ቁረጥ (BUY)</button>

<div class="action-btns">
    <button class="btn-sub" style="background:var(--blue)" onclick="showModal('depModal')">Deposit 📥</button>
    <button class="btn-sub" style="background:var(--red)" onclick="showModal('witModal')">Withdraw 📤</button>
</div>

<div id="drawnNumbersList" style="color:var(--gold); margin: 15px; font-weight: bold;">Waiting for draw...</div>

<a href="https://t.me/Godis1256" target="_blank" class="tg-support">💬</a>

<div id="depModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--gold)">Deposit (ዝቅተኛ 100 ብር)</h3>
    <div style="text-align:left; font-size: 0.9rem; margin-bottom: 15px;">
        📌 <b>Telebirr:</b> 0986980130<br>
        📌 <b>Abyssinia:</b> 153682704 (Daniel ...)
    </div>
    <p>ከከፈሉ በኋላ ደረሰኙን ፎቶ አንስተው እዚህ ይላኩ፦</p>
    <input type="file" id="receiptImg" style="margin-bottom: 15px; width: 100%;">
    <button onclick="sendReceipt()" class="btn-main" style="width:100%">ደረሰኝ ላክ (Send Receipt)</button>
    <button onclick="closeModal('depModal')" style="background:none; border:none; color:gray;">ዝጋ</button>
</div></div>

<div id="witModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--red)">Withdraw (ዝቅተኛ 300 ብር)</h3>
    <input type="number" id="witAmount" placeholder="መጠን" style="width:90%; padding:10px; margin-bottom:10px; border-radius:5px;">
    <input type="text" id="witBank" placeholder="ባንክ እና አካውንት ቁጥር" style="width:90%; padding:10px; margin-bottom:10px; border-radius:5px;">
    <button onclick="sendWithdraw()" class="btn-main" style="width:100%; background:var(--red)">ጥያቄ ላክ (Withdraw)</button>
    <button onclick="closeModal('witModal')" style="background:none; border:none; color:gray;">ተመለስ</button>
</div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA", authDomain: "chickenkeno-c41fa.firebaseapp.com", projectId: "chickenkeno-c41fa", databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com", storageBucket: "chickenkeno-c41fa.appspot.com", messagingSenderId: "423384148862", appId: "1:423384148862:web:99e9faebe83982f95be12f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const BOT_TOKEN = "8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw";
    const CHAT_ID = "7313437942"; 
    const DANIEL_ID = "DK-7313"; // ያንተ ID
    const PASS = "9801";

    let uID = localStorage.getItem('keno_user_id') || "DK-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('keno_user_id', uID);
    document.getElementById('myID').innerText = uID;

    if(uID === DANIEL_ID) document.getElementById('adminLink').style.display = 'block';

    db.ref('users/' + uID + '/balance').on('value', s => document.getElementById('balance').innerText = (s.val() || 0).toFixed(2));

    function changeBet(v) {
        let el = document.getElementById('betAmount');
        let val = parseInt(el.value) + v;
        if(val >= 15) el.value = val;
    }

    let selectedNums = [], activeBets = [];
    const grid = document.getElementById('grid');
    for(let i=1; i<=80; i++) {
        let d = document.createElement('div'); d.className='num'; d.id='n'+i; d.innerText=i;
        d.onclick=()=>{
            if(d.classList.contains('selected')){ d.classList.remove('selected'); selectedNums = selectedNums.filter(x=>x!=i); }
            else if(selectedNums.length < 10){ d.classList.add('selected'); selectedNums.push(i); }
        };
        grid.appendChild(d);
    }

    async function sendToBot(msg) {
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=HTML`);
    }

    function buyTicket() {
        let amt = parseInt(document.getElementById('betAmount').value);
        if(selectedNums.length < 2) return alert("ቢያንስ 2 ቁጥር ይምረጡ!");
        db.ref('users/' + uID + '/balance').once('value', s => {
            let bal = s.val() || 0;
            if(bal < amt) return alert("በቂ ብር የለም!");
            db.ref('users/' + uID).update({balance: bal - amt});
            activeBets.push({nums: [...selectedNums], amt: amt});
            sendToBot(`🎟 <b>ትኬት ተቆርጧል!</b>\nID: ${uID}\nAmount: ${amt} ETB\nNums: ${selectedNums.join(', ')}`);
            selectedNums = []; document.querySelectorAll('.selected').forEach(n => n.classList.remove('selected'));
        });
    }

    async function sendReceipt() {
        let file = document.getElementById('receiptImg').files[0];
        if(!file) return alert("እባክዎ መጀመሪያ ደረሰኝ ይምረጡ!");
        let fd = new FormData(); fd.append('chat_id', CHAT_ID); fd.append('photo', file); fd.append('caption', `📥 <b>የዲፖዚት ደረሰኝ</b>\nUser ID: ${uID}`);
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {method:'POST', body:fd});
        alert("ደረሰኙ ተልኳል! አድሚን እስኪያረጋግጥ ይጠብቁ።"); closeModal('depModal');
    }

    function sendWithdraw() {
        let amt = document.getElementById('witAmount').value;
        if(amt < 300) return alert("ዝቅተኛው የዊዝድራው መጠን 300 ብር ነው!");
        sendToBot(`📤 <b>WITHDRAW REQUEST</b>\nUser ID: ${uID}\nAmount: ${amt} ETB\nBank: ${document.getElementById('witBank').value}`);
        alert("ጥያቄው ተልኳል!"); closeModal('witModal');
    }

    function openAdmin() {
        let p = prompt("Password:");
        if(p === PASS) {
            let t = prompt("User ID:"); let a = parseFloat(prompt("Amount:"));
            if(!isNaN(a)) db.ref('users/' + t + '/balance').once('value', s => {
                db.ref('users/' + t).update({balance: (s.val()||0) + a});
                alert("ተሳክቷል!"); sendToBot(`⚙️ <b>ADMIN DEPOSIT</b>\nTo: ${t}\nAmt: ${a} ETB`);
            });
        }
    }

    function showModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // Draw Logic
    let timeLeft = 60;
    setInterval(() => {
        timeLeft--;
        document.getElementById('timerDisplay').innerText = `00:${timeLeft<10?'0'+timeLeft:timeLeft}`;
        if(timeLeft <= 0) {
            runDraw();
            timeLeft = 60;
        }
    }, 1000);

    async function runDraw() {
        let drawn = []; while(drawn.length < 20) { let r = Math.floor(Math.random()*80)+1; if(!drawn.includes(r)) drawn.push(r); }
        let disp = [];
        for(let n of drawn) {
            await new Promise(r => setTimeout(r, 400));
            document.getElementById('n'+n).classList.add('hit');
            disp.push(n); document.getElementById('drawnNumbersList').innerText = disp.join(' ');
        }
        activeBets.forEach(b => {
            let hits = b.nums.filter(n => drawn.includes(n)).length;
            if(hits >= 2) {
                let win = b.amt * 2;
                db.ref('users/' + uID + '/balance').once('value', s => db.ref('users/' + uID).update({balance: (s.val()||0) + win}));
                confetti(); sendToBot(`💰 <b>አሸንፏል (WIN)!</b>\nID: ${uID}\nWin: ${win} ETB`);
            } else { sendToBot(`❌ <b>ተሸንፏል (LOSS)</b>\nID: ${uID}\nBet: ${b.amt}`); }
        });
        setTimeout(() => { document.querySelectorAll('.hit').forEach(n => n.classList.remove('hit')); activeBets = []; }, 5000);
    }
</script>
</body>
</html>
