<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENO ROYAL PRO - SECURE</title>
    <style>
        :root { --gold: #ffc40f; --dark: #121212; --card: #1e1e1e; --green: #2ecc71; --white: #ffffff; --red: #e74c3c; }
        body { background-color: var(--dark); color: var(--white); text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .header { background: var(--card); padding: 15px; border-radius: 0 0 25px 25px; border-bottom: 4px solid var(--gold); margin-bottom: 10px; }
        .user-id { font-size: 14px; color: #aaa; margin-top: 5px; cursor: pointer; }
        .balance-container { border: 3px solid var(--gold); display: inline-block; padding: 10px 25px; border-radius: 40px; margin: 10px 0; }
        .balance-display { font-size: 26px; font-weight: bold; color: var(--gold); }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-width: 450px; margin: 10px auto; }
        .num { background: #2c2c2c; border: 1px solid #444; padding: 10px 0; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .selected { background: #3498db !important; }
        .hit { background: var(--gold) !important; color: black; transform: scale(1.1); }
        .action-btn { width: 100%; max-width: 450px; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; margin: 5px 0; }
        .draw-btn { background: var(--green); color: white; }
        .dep-btn { background: #f39c12; color: white; }
        .with-btn { background: var(--red); color: white; }
        input { background: #000; color: var(--gold); border: 2px solid var(--gold); padding: 5px; width: 80px; text-align: center; border-radius: 5px; font-size: 18px; }
    </style>
</head>
<body>

    <div class="header">
        <h3 style="margin:0; color:var(--gold);">🎰 KENO ROYAL PRO</h3>
        <div class="user-id" id="adminTrigger">የእርስዎ መለያ (ID): <span id="displayID">...</span></div>
        <div class="balance-container">
            <span class="balance-display">💰 <span id="balance">0.00</span> ETB</span>
        </div>
    </div>

    <div style="margin: 10px;">
        የውርርድ መጠን (Min 15): <input type="number" id="betAmount" value="15" min="15">
    </div>

    <div class="grid" id="grid"></div>

    <button class="action-btn draw-btn" id="drawBtn" onclick="startDraw()">ይጀምር (DRAW)</button>
    <button onclick="showPaymentInfo()" class="action-btn dep-btn">💳 ብር አስገባ (Deposit)</button>
    <button onclick="requestWithdraw()" class="action-btn with-btn">💸 ብር አውጣ (Withdraw)</button>

    <script>
        // --- ያንተ መረጃዎች (እዚህ ጋር አስተካክል) ---
        const myTelebirr = "09XXXXXXXX"; // ስልክህን እዚህ ተካ
        const myBankInfo = "CBE: 1000XXXXXXXX"; // ባንክህን እዚህ ተካ
        const myTelegram = "@YourUsername"; // ዩዘርኔምህን እዚህ ተካ
        
        const botToken = '8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw';
        const chatId = '7313437942';
        const adminPass = "1234";

        let currentBalance = 0.00;
        let selected = [];
        let userID = "";

        // Unique ID መፍጠሪያ
        function setupUser() {
            userID = localStorage.getItem('unique_keno_id');
            if (!userID) {
                // ለአንድ ሰው ብቻ የሚሰራ ልዩ ቁጥር
                userID = "KR-" + Math.random().toString(36).substr(2, 6).toUpperCase();
                localStorage.setItem('unique_keno_id', userID);
            }
            document.getElementById('displayID').innerText = userID;
            
            let savedBal = localStorage.getItem('bal_' + userID);
            if (savedBal) currentBalance = parseFloat(savedBal);
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').innerText = currentBalance.toFixed(2);
            localStorage.setItem('bal_' + userID, currentBalance);
        }

        // --- ብር ማስገቢያ መመሪያ ---
        function showPaymentInfo() {
            alert(`ብር ለማስገባት፦\n\n1. ቴሌብር፦ ${myTelebirr}\n2. ባንክ፦ ${myBankInfo}\n3. Telegram: ${myTelegram}\n\nብር ከላኩ በኋላ የእርስዎን መለያ (ID: ${userID}) በመጥቀስ ለባለቤቱ ይላኩ።`);
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent("📥 የዴፖዚት ፍላጎት ከ ID: " + userID)}`);
        }

        // --- አድሚን ፓነል (ID ላይ ተጭነህ በመያዝ) ---
        let timer;
        document.getElementById('adminTrigger').addEventListener('touchstart', () => {
            timer = setTimeout(() => {
                let pass = prompt("Admin Password:");
                if (pass === adminPass) {
                    let targetID = prompt("ብር የሚጨመርለት ሰው ID ያስገቡ (ለምሳሌ: KR-XXXXXX)፦");
                    let amount = parseFloat(prompt("የብር መጠን፦"));
                    if (targetID === userID) {
                        currentBalance += amount;
                        updateUI();
                        alert("ተጨምሯል!");
                    } else {
                        // ለሌላ ሰው ከሆነ ዳታቤዝ ስለሌለን ለጊዜው ቴሌግራም ላይ ትዕዛዝ ይልካል
                        alert("ጥያቄው ወደ ሲስተም ተልኳል።");
                        fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent("✅ አድሚን ለ ID: " + targetID + " " + amount + " ETB ጨምሯል")}`);
                    }
                }
            }, 2000);
        });
        document.getElementById('adminTrigger').addEventListener('touchend', () => clearTimeout(timer));

        // Withdraw ገደብ
        function requestWithdraw() {
            if (currentBalance < 300) {
                alert("ባላንስዎ ከ 300 ብር በታች ስለሆነ ማውጣት አይችሉም!");
                return;
            }
            let amt = parseFloat(prompt("የሚወጣ መጠን (Min 300):"));
            if (amt >= 300 && amt <= currentBalance) {
                let phone = prompt("ብር የሚላክበት ስልክ ቁጥር:");
                currentBalance -= amt;
                updateUI();
                fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent("💸 WITHDRAW\nID: " + userID + "\nAmount: " + amt + "\nPhone: " + phone)}`);
                alert("ጥያቄው ተልኳል!");
            }
        }

        // Grid መፍጠሪያ
        const grid = document.getElementById('grid');
        for (let i = 1; i <= 80; i++) {
            let d = document.createElement('div');
            d.className = 'num'; d.id = 'num-' + i; d.innerText = i;
            d.onclick = function() {
                if (this.classList.contains('selected')) {
                    this.classList.remove('selected');
                    selected = selected.filter(n => n !== i);
                } else if (selected.length < 10) {
                    this.classList.add('selected');
                    selected.push(i);
                }
            };
            grid.appendChild(d);
        }

        function startDraw() {
            let bet = parseFloat(document.getElementById('betAmount').value);
            if (selected.length === 0 || currentBalance < bet || bet < 15) {
                alert("እባክዎ መጀመሪያ ቁጥሮችን ይምረጡ ወይም ባላንስዎን ያረጋግጡ!");
                return;
            }
            currentBalance -= bet;
            updateUI();
            
            document.querySelectorAll('.num').forEach(el => el.classList.remove('hit'));
            let drawn = [];
            let hits = 0;
            
            let i = 0;
            let interval = setInterval(() => {
                let r;
                do { r = Math.floor(Math.random() * 80) + 1; } while (drawn.includes(r));
                drawn.push(r);
                document.getElementById('num-' + r).classList.add('hit');
                if (selected.includes(r)) hits++;
                i++;
                if (i === 20) {
                    clearInterval(interval);
                    if (hits >= 3) {
                        let win = bet * (hits - 1);
                        currentBalance += win;
                        updateUI();
                        alert("እንኳን ደስ አሎት! " + hits + " መትተው " + win + " አሸንፈዋል!");
                    } else {
                        alert("አልመታም! " + hits + " ብቻ ነው የመታው።");
                    }
                }
            }, 200);
        }

        window.onload = setupUser;
    </script>
</body>
</html>
