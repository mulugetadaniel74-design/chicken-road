<body>
    <h1>🎰 KENO ROYAL 🎰</h1>
    <div style="background: #444; padding: 10px; border-radius: 5px; margin-bottom: 10px;">
        💰 ሂሳብዎ: <span id="balance">0.00</span> ብር
    </div>
    
    <p id="msg">እባክዎ እስከ 10 ቁጥሮችን ይምረጡ</p>
    
    <div class="grid" id="grid"></div>

    <div class="controls">
        <button class="btn play-btn" onclick="checkGame()">አሁኑኑ ይጫወቱ</button>
        <button class="btn clear-btn" onclick="location.reload()">ሁሉንም አጥፋ</button>
    </div>

    <div style="margin-top: 30px;">
        <a href="tg://resolve?domain=Godis1256" style="display:inline-block; background:#e67e22; color:white; padding:10px; text-decoration:none; border-radius:5px; margin:5px;">💰 ብር አስገባ</a>
        <a href="tg://resolve?domain=Godis1256" style="display:inline-block; background:#27ae60; color:white; padding:10px; text-decoration:none; border-radius:5px; margin:5px;">💸 ብር አውጣ</a>
    </div>

    <script>
        let selectedCount = 0;
        const grid = document.getElementById('grid');
        for (let i = 1; i <= 80; i++) {
            let div = document.createElement('div');
            div.className = 'num';
            div.innerText = i;
            div.onclick = function() {
                if(this.classList.contains('selected')) {
                    this.classList.remove('selected');
                    selectedCount--;
                } else if(selectedCount < 10) {
                    this.classList.add('selected');
                    selectedCount++;
                } else {
                    alert("ከ 10 ቁጥር በላይ መምረጥ አይቻልም!");
                }
            };
            grid.appendChild(div);
        }
        function checkGame() {
            if(selectedCount === 0) alert("እባክዎ መጀመሪያ ቁጥር ይምረጡ!");
            else alert("ሂሳብዎ በቂ አይደለም። እባክዎ መጀመሪያ ዲፖዚት ያድርጉ!");
        }
    </script>
</body>
