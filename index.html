<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keno Live - Daniel Payment</title>
    <style>
        body { margin: 0; background: #121417; color: white; font-family: sans-serif; text-align: center; }
        .header { background: #1c1f24; padding: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid #2ecc71; }
        
        /* ብር ማስገቢያ አዝራር */
        .deposit-bar { background: #2ecc71; color: black; padding: 12px; margin: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        
        .timer-panel { background: #1c1f24; margin: 5px 10px; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .draw-panel { background: #1c1f24; margin: 0 10px 10px 10px; padding: 15px; border-radius: 10px; min-height: 50px; border: 1px solid #333; }
        .drawn-numbers { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }
        .drawn-box { background: #f1c40f; color: black; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; animation: pop 0.2s; }

        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; padding: 10px; max-width: 450px; margin: 0 auto; }
        .num { background: #24292e; padding: 12px 0; border-radius: 4px; font-size: 13px; font-weight: bold; color: #666; border: 1px solid #333; }
        .num.selected { background: #2ecc71 !important; color: white !important; }
        .num.hit { background: #f1c40f !important; color: black !important; box-shadow: 0 0 10px #f1c40f; }
        .num.active-draw { background: #ffffff !important; color: black !important; animation: quickFade 1s forwards; }

        .footer { background: #1c1f24; padding: 15px; position: fixed; bottom: 0; width: 100%; border-radius: 20px 20px 0 0; box-sizing: border-box; }
        .play-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; background: #2ecc71; color: white; cursor: pointer; }
        .play-btn:disabled { background: #333 !important; color: #555 !important; cursor: not-allowed; border: 1px solid #444; }

        /* Telebirr Modal */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1c1f24; padding: 25px; border-radius: 15px; border: 2px solid #2ecc71; z-index: 1000; width: 85%; max-width: 350px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .modal input { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; background: #24292e; border: 1px solid #444; color: white; border-radius: 8px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; }
        
        @keyframes quickFade { 0% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; color: #2ecc71;">KENO ROYAL</div>
    <div id="bal-display" style="font-weight: bold; font-size: 18px;">0.00 ETB</div>
</div>

<div class="deposit-bar" onclick="openDeposit()">
    <span>💰 ብር ያስገቡ (DEPOSIT)</span>
    <span>➔</span>
</div>

<div class="timer-panel">ቀጣይ እጣ በ: <span id="timer-txt" style="color:#f1c40f; font-weight:bold;">01:00</span></div>

<div class="draw-panel"><div class="drawn-numbers" id="drawn-list"></div></div>

<div class="grid" id="keno-grid"></div>
<div style="height: 180px;"></div>

<div class="footer">
    <div id="no-money-msg" style="color: #e74c3c; font-size: 12px; margin-bottom: 8px; display: none; font-weight: bold;">ሒሳብዎ ስላለቀ መጫወት አይችሉም! እባክዎ ብር ያስገቡ።</div>
    <button id="play-btn" class="play-btn" onclick="placeBet()">ውርርድ (15 ETB)</button>
</div>

<div class="overlay" id="overlay"></div>
<div class="modal" id="dep-modal">
    <h2 style="color:#2ecc71; margin-top: 0;">የቴሌብር ዲፖዚት</h2>
    <div style="text-align: left; font-size: 14px; background: #24292e; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
        <p style="margin: 0;"><b>ስም:</b> ዳንኤል ሙሉጌታ ኩምሳ</p>
        <p style="margin: 5px 0;"><b>ቁጥር:</b> <span style="color: #2ecc71; font-size: 18px;">0986980130</span></p>
        <hr style="border: 0.5px solid #333;">
        <p style="margin: 0; font-size: 12px; color: #aaa;">1. ከላይ ወዳለው ቁጥር ብር ይላኩ።<br>2. የላኩትን መጠን እና የትራንዛክሽን ቁጥሩን ከታች ያስገቡ።</p>
    </div>
    <input type="number" id="dep-amount" placeholder="የብር መጠን (ቢያንስ 100)">
    <input type="text" id="dep-id" placeholder="የግብይት መለያ (Transaction ID)">
    <button class="play-btn" onclick="submitDeposit()">አረጋግጥ</button>
    <button style="background:none; border:none; color:#888; margin-top:15px; font-weight: bold;" onclick="closeDeposit()">ተመለስ</button>
</div>

<script>
    let balance = 0, bet = 15, selected = [], isDrawing = false, hasBet = false, timeLeft = 60;
    const grid = document.getElementById('keno-grid');

    // ቦርድ መፍጠር
    for(let i=1; i<=80; i++) {
        let n = document.createElement('div');
        n.className = 'num'; n.innerText = i;
        n.onclick = () => {
            if(isDrawing) return;
            if(selected.includes(i)) {
                selected = selected.filter(num => num !== i);
                n.classList.remove('selected');
            } else if(selected.length < 10) {
                selected.push(i);
                n.classList.add('selected');
            }
        };
        grid.appendChild(n);
    }

    function checkBalanceStatus() {
        const btn = document.getElementById('play-btn');
        const msg = document.getElementById('no-money-msg');
        if (balance < bet) {
            btn.disabled = true;
            msg.style.display = "block";
        } else {
            btn.disabled = false;
            msg.style.display = "none";
        }
    }

    function openDeposit() {
        document.getElementById('dep-modal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeDeposit() {
        document.getElementById('dep-modal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    function submitDeposit() {
        let amt = parseFloat(document.getElementById('dep-amount').value);
        let tid = document.getElementById('dep-id').value;
        if (amt >= 100 && tid.length >= 6) {
            balance += amt;
            updateUI();
            alert("ብርዎ በትክክል ገብቷል! መልካም እድል!");
            closeDeposit();
            checkBalanceStatus();
        } else {
            alert("እባክዎ ቢያንስ 100 ብር እና ትክክለኛ Transaction ID ያስገቡ!");
        }
    }

    setInterval(() => {
        if (!isDrawing) {
            timeLeft--;
            if (timeLeft <= 0) startAutoDraw();
            updateTimerUI();
        }
    }, 1000);

    function updateTimerUI() {
        document.getElementById('timer-txt').innerText = `00:${(timeLeft % 60).toString().padStart(2, '0')}`;
    }

    function placeBet() {
        if(selected.length === 0) return alert("እባክዎ ቁጥር ይምረጡ!");
        hasBet = true;
        document.getElementById('play-btn').innerText = "ውርርድ ተይዟል...";
        document.getElementById('play-btn').disabled = true;
    }

    function startAutoDraw() {
        isDrawing = true;
        if(hasBet) { balance -= bet; updateUI(); }
        document.getElementById('drawn-list').innerHTML = '';
        document.querySelectorAll('.num').forEach(n => n.classList.remove('active-draw', 'hit'));

        let draw = [], count = 0, hits = 0;
        let interval = setInterval(() => {
            let r;
            do { r = Math.floor(Math.random() * 80) + 1; } while(draw.includes(r));
            draw.push(r);
            let box = document.createElement('div'); box.className = 'drawn-box'; box.innerText = r;
            document.getElementById('drawn-list').appendChild(box);
            let el = grid.children[r-1];
            if(selected.includes(r)) { el.classList.add('hit'); hits++; } 
            else { el.classList.add('active-draw'); }
            count++;
            if(count >= 20) { clearInterval(interval); finish(hits); }
        }, 300);
    }

    function finish(hits) {
        if(hasBet) checkWin(hits);
        setTimeout(() => {
            isDrawing = false; hasBet = false; timeLeft = 60;
            document.getElementById('play-btn').innerText = "ውርርድ (15 ETB)";
            checkBalanceStatus();
        }, 2000);
    }

    function checkWin(hits) {
        let winMult = 0;
        let sCount = selected.length;
        if (sCount >= 4 && hits >= 2) winMult = hits * 2.5;
        else if (sCount >= 2 && hits >= 1) winMult = hits * 2;
        else if (sCount === 1 && hits === 1) winMult = 3.5;
        if(winMult > 0) balance += (bet * winMult);
        updateUI();
    }

    function updateUI() { 
        document.getElementById('bal-display').innerText = balance.toFixed(2) + " ETB"; 
    }
    
    checkBalanceStatus();
</script>
</body>
</html>
