<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANIEL KENO ROYAL - PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #0a0a0a; --card: #161616; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { background-color: var(--dark); color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        .header { background: #1a1a1a; padding: 10px; border-bottom: 3px solid var(--gold); }
        .balance-box { border: 2px solid var(--gold); display: inline-block; padding: 5px 20px; border-radius: 50px; font-size: 20px; color: var(--gold); font-weight: bold; }
        .timer { font-size: 3rem; font-weight: bold; color: var(--red); margin: 10px; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; background: #111; padding: 10px; border-radius: 12px; max-width: 450px; margin: auto; }
        .num { background: #2a2a2a; border: 1px solid #444; padding: 12px 0; font-weight: bold; border-radius: 8px; cursor: pointer; color: #ccc; }
        .selected { background: var(--blue) !important; color: white; }
        .hit { background: var(--gold) !important; color: black; }
        .btn-main { width: 90%; max-width: 400px; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; background: var(--green); color: white; margin-top: 10px; }
        .panel { background: var(--card); margin: 15px; padding: 15px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        .result-ball { display: inline-block; width: 30px; height: 30px; background: var(--gold); color: black; border-radius: 50%; line-height: 30px; margin: 3px; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0; color:var(--gold);">DANIEL KENO ROYAL</h3>
    <div class="balance-box">💰 <span id="balance">0.00</span> ETB</div>
    <div style="font-size:12px; color:#888;">ID: <span id="myID">...</span></div>
</div>

<div class="timer" id="timerDisplay">01:00</div>

<div class="grid" id="grid"></div>

<div style="margin-top:20px;">
    <span style="color:#aaa;">Bet Amount: </span>
    <input type="number" id="betAmount" value="15" min="15" style="width:80px; padding:8px; border-radius:8px; background:#000; color:var(--gold); border:1px solid var(--gold); text-align:center;">
    <br>
    <button onclick="buyTicket()" class="btn-main">ትኬት ቁረጥ (PLACE BET)</button>
</div>

<div class="panel">
    <h4 style="color:var(--gold); margin-bottom:10px;">🔴 የአሁኑ ዙር ውጤቶች (CURRENT DRAW)</h4>
    <div id="currentDrawResult">... ዕጣ እየተጠበቀ ነው ...</div>
</div>

<div class="panel">
    <h4 style="color:var(--blue); margin-bottom:10px;">🔥 HOT NUMBERS</h4>
    <div id="hotNumbers"></div>
</div>

<script>
    const ADMIN_ID = "USER-4173";
    const BOT_TOKEN = "8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw";
    const CHAT_ID = "7313437942";

    const firebaseConfig = {
        apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA",
        authDomain: "chickenkeno-c41fa.firebaseapp.com",
        projectId: "chickenkeno-c41fa",
        databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com",
        appId: "1:423384148862:web:99e9faebe83982f95be12f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let uID = localStorage.getItem('keno_user_id') || "USER-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('keno_user_id', uID);
    document.getElementById('myID').innerText = uID;

    let selectedNums = [], timeLeft = 60, isDrawing = false;
    let numberStats = {};

    // Grid Setup
    for(let i=1; i<=80; i++) {
        let d = document.createElement('div'); d.className='num'; d.id='n'+i; d.innerText=i;
        d.onclick=()=> {
            if(isDrawing) return;
            if(d.classList.contains('selected')) { d.classList.remove('selected'); selectedNums = selectedNums.filter(x=>x!==i); }
            else if(selectedNums.length < 10) { d.classList.add('selected'); selectedNums.push(i); }
        };
        document.getElementById('grid').appendChild(d);
    }

    // Timer
    setInterval(() => {
        if(isDrawing) return;
        timeLeft--;
        let s = timeLeft % 60;
        document.getElementById('timerDisplay').innerText = `00:${s<10?'0'+s:s}`;
        if(timeLeft <= 0) runDraw();
    }, 1000);

    async function runDraw() {
        isDrawing = true;
        let drawn = [];
        while(drawn.length < 20) {
            let r = Math.floor(Math.random()*80)+1;
            if(!drawn.includes(r)) drawn.push(r);
        }

        // ውጤቱን ከስር ማሳየት
        let resultHTML = "";
        for(let n of drawn) {
            await new Promise(res => setTimeout(res, 400));
            document.getElementById('n'+n).classList.add('hit');
            resultHTML += `<span class="result-ball">${n}</span>`;
            document.getElementById('currentDrawResult').innerHTML = resultHTML;
            numberStats[n] = (numberStats[n] || 0) + 1;
        }

        updateHotNumbers();

        // ቶሎ እንዲጠፋ (በ 3 ሰከንድ ውስጥ)
        setTimeout(() => {
            document.querySelectorAll('.num').forEach(el => el.classList.remove('hit', 'selected'));
            selectedNums = [];
            isDrawing = false;
            timeLeft = 60;
        }, 3000);
    }

    function updateHotNumbers() {
        let sorted = Object.keys(numberStats).sort((a,b) => numberStats[b] - numberStats[a]).slice(0, 8);
        document.getElementById('hotNumbers').innerHTML = sorted.map(n => `<span class="result-ball" style="background:var(--blue); color:white;">${n}</span>`).join('');
    }

    async function buyTicket() {
        let amt = parseFloat(document.getElementById('betAmount').value);
        if(amt < 15) return alert("ዝቅተኛው መቆመሪያ 15 ETB ነው!");
        if(selectedNums.length < 2) return alert("እባክዎ ቢያንስ 2 ቁጥሮች ይምረጡ!");

        db.ref('users/'+uID+'/balance').once('value', s => {
            let bal = s.val() || 0;
            if(bal < amt) return alert("በቂ ቀሪ ሂሳብ የለም!");
            db.ref('users/'+uID).update({balance: bal - amt});
            
            // ወደ ቦት መላክ
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CHAT_ID, text: `🎟 ትኬት ተቆረጠ!\nID: ${uID}\nመጠን: ${amt} ETB\nቁጥሮች: ${selectedNums.join(', ')}` })
            });
            alert("ትኬት ተቆርጧል! መልካም ዕድል!");
        });
    }

    db.ref('users/'+uID+'/balance').on('value', s => {
        document.getElementById('balance').innerText = (s.val()||0).toFixed(2);
    });
</script>
</body>
</html>
