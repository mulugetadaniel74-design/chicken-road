<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHICKEN KENO ROYAL - PRO FIX</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #0a0a0a; --card: #161616; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { background-color: var(--dark); color: white; text-align: center; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        .header { background: var(--card); padding: 15px; border-bottom: 3px solid var(--gold); }
        .balance-box { border: 2px solid var(--gold); display: inline-block; padding: 10px 20px; border-radius: 12px; font-size: 20px; color: var(--gold); }
        .timer-text { font-size: 32px; font-weight: bold; color: var(--red); margin: 10px; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; max-width: 420px; margin: 10px auto; padding: 10px; }
        .num { background: #333; border: 1px solid #444; padding: 12px 0; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .selected { background: var(--blue) !important; }
        .hit { background: var(--gold) !important; color: #000; box-shadow: 0 0 15px var(--gold); }
        .btn-pay { width: 45%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; color: white; margin-top: 10px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: var(--card); margin: 15% auto; padding: 25px; width: 85%; border-radius: 15px; border: 1px solid var(--gold); text-align: left; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #000; color: var(--gold); border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div class="header">
    <h2 style="color:var(--gold); margin:0;">🎰 CHICKEN KENO ROYAL</h2>
    <div class="balance-box">💰 <span id="balance">0.00</span> ETB</div>
    <p style="font-size:12px;">የእርሶ መለያ (ID): <span id="myID" style="color:var(--gold);">...</span></p>
</div>

<div class="timer-text" id="timerDisplay">01:00</div>

<div class="grid" id="grid"></div>

<div style="margin:15px;">
    <input type="number" id="betAmount" value="15" min="15" style="width:60px; text-align:center;">
    <button onclick="buyTicket()" style="background:var(--green); color:white; padding:15px; width:80%; border:none; border-radius:10px; font-weight:bold;">ትኬት ቁረጥ (BUY)</button>
</div>

<div style="display:flex; justify-content:center; gap:10px;">
    <button onclick="showModal('depModal')" class="btn-pay" style="background:var(--blue);">Deposit 📥</button>
    <button onclick="showModal('witModal')" class="btn-pay" style="background:var(--red);">Withdraw 📤</button>
</div>

<button onclick="adminAction()" style="background:#222; border:none; color:#444; margin-top:20px;">Admin ⚙️</button>

<div id="depModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--gold);">ብር ለማስገባት (Deposit)</h3>
    <p>Telebirr: <b>0986980130</b><br>አብሲንያ: <b>153682704</b></p>
    <p>ደረሰኝ እና ID: <b class="u-id-text"></b> ለ <b>@Godis1256</b> ይላኩ።</p>
    <p style="color:var(--red);">* Minimum Deposit: 100 ETB</p>
    <button onclick="closeModal('depModal')" style="background:var(--red); color:white; width:100%; padding:10px; border:none;">ዝጋ</button>
</div></div>

<div id="witModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--gold);">ብር ለማውጣት (Withdraw)</h3>
    <input type="number" id="witAmt" placeholder="መጠን (Min 300)">
    <input type="text" id="witPhone" placeholder="ባንክ እና ስልክ ቁጥር">
    <button onclick="requestWithdraw()" style="background:var(--green); color:white; width:100%; padding:12px; border:none;">ጥያቄ ላክ</button>
    <button onclick="closeModal('witModal')" style="background:#444; color:white; width:100%; padding:10px; border:none; margin-top:5px;">ተመለስ</button>
</div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA",
        authDomain: "chickenkeno-c41fa.firebaseapp.com",
        projectId: "chickenkeno-c41fa",
        databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com",
        storageBucket: "chickenkeno-c41fa.appspot.com",
        messagingSenderId: "423384148862",
        appId: "1:423384148862:web:99e9faebe83982f95be12f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const BOT_TOKEN = "8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw";
    const CHAT_ID = "7313437942";

    let uID = localStorage.getItem('keno_user_id') || "USER-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('keno_user_id', uID);
    document.getElementById('myID').innerText = uID;
    document.querySelectorAll('.u-id-text').forEach(el => el.innerText = uID);

    // ተጠቃሚውን ወዲያውኑ መመዝገብ (Admin ላይ ብር እንዲጨምር)
    db.ref('users/' + uID).once('value', s => { 
        if(!s.exists()) db.ref('users/' + uID).set({balance: 0}); 
    });
    
    db.ref('users/' + uID + '/balance').on('value', s => {
        document.getElementById('balance').innerText = (s.val() || 0).toFixed(2);
    });

    const grid = document.getElementById('grid');
    let selectedNums = [];
    for(let i=1; i<=80; i++) {
        let d = document.createElement('div');
        d.className='num'; d.id='n'+i; d.innerText=i;
        d.onclick=()=>{ d.classList.toggle('selected'); toggleNum(i); };
        grid.appendChild(d);
    }

    function toggleNum(n) {
        if(selectedNums.includes(n)) selectedNums = selectedNums.filter(x => x !== n);
        else if(selectedNums.length < 10) selectedNums.push(n);
    }

    let timeLeft = 60;
    setInterval(() => {
        timeLeft--;
        document.getElementById('timerDisplay').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
        
        // **አዲስ ማስተካከያ**፡ Countdown 55 ሲደርስ የድሮ ውጤቶች ይጠፋሉ
        if(timeLeft === 55) {
            document.querySelectorAll('.num').forEach(n => n.classList.remove('hit'));
        }
        
        if(timeLeft <= 0) { runDraw(); timeLeft = 60; }
    }, 1000);

    async function runDraw() {
        let drawn = [];
        while(drawn.length < 20) {
            let r = Math.floor(Math.random()*80)+1;
            if(!drawn.includes(r)) drawn.push(r);
        }
        drawn.forEach(n => document.getElementById('n'+n).classList.add('hit'));

        if(selectedNums.length > 0) {
            let hits = selectedNums.filter(n => drawn.includes(n)).length;
            let win = hits >= 2 ? 30 : 0; // ለምሳሌ
            
            // ቴሌግራም መላኪያ
            let status = win > 0 ? "💰 WON" : "📉 LOST";
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${status} ID:${uID} Win:${win}`);

            if(win > 0) {
                db.ref('users/' + uID + '/balance').once('value', s => {
                    db.ref('users/' + uID).update({balance: (s.val()||0) + win});
                });
            }
            selectedNums = [];
            document.querySelectorAll('.num').forEach(n => n.classList.remove('selected'));
        }
    }

    function adminAction() {
        if(prompt("Admin Password:") === "1234") {
            let id = prompt("User ID:");
            let amt = parseFloat(prompt("Amount:"));
            db.ref('users/' + id).once('value', s => {
                if(s.exists()) {
                    db.ref('users/' + id).update({balance: (s.val().balance || 0) + amt});
                    alert("ብር ተጨምሯል!");
                } else {
                    alert("User አልተገኘም! መጀመሪያ ዌብሳይቱን መክፈት አለበት።");
                }
            });
        }
    }

    function requestWithdraw() {
        let amt = parseFloat(document.getElementById('witAmt').value);
        if(amt < 300) return alert("ዝቅተኛው 300 ብር ነው!");
        // (የዊዝድራው ኮድ ይቀጥላል...)
    }

    function showModal(id) { document.getElementById(id).style.display = "block"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }
</script>
</body>
</html>
