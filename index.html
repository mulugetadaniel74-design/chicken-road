<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANIEL KENO ROYAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #0a0a0a; --card: #161616; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { background-color: var(--dark); color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* --- 1. Header & User Info (ያልተነካ) --- */
        .header { background: #1a1a1a; padding: 15px; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .balance-box { border: 2px solid var(--gold); padding: 10px 20px; border-radius: 50px; font-size: 22px; color: var(--gold); font-weight: bold; background: #000; box-shadow: 0 0 10px var(--gold); cursor: pointer; }
        
        .user-info-bar { background: #222; padding: 10px; font-size: 1rem; color: #ddd; border-bottom: 1px solid #333; display: flex; justify-content: space-around; font-weight: bold; }

        /* --- 2. New Elements (Jackpot & Ticker) --- */
        .jackpot-tag { background: linear-gradient(90deg, #b2944d, var(--gold), #b2944d); color: black; font-weight: bold; padding: 5px; font-size: 0.8rem; }
        .ticker-wrap { background: #111; color: var(--green); padding: 5px; font-size: 0.8rem; border-bottom: 1px solid #333; }

        /* --- 3. Game Area (Original Style) --- */
        .timer-display { font-size: 4rem; font-weight: bold; color: var(--red); margin: 15px 0; text-shadow: 0 0 15px var(--red); font-family: monospace; }
        
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; padding: 10px; max-width: 500px; margin: auto; background: #111; border-radius: 10px; }
        .num { background: #333; border: 1px solid #444; padding: 15px 0; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.1s; font-size: 1rem; }
        .selected { background: var(--blue) !important; transform: scale(0.9); box-shadow: 0 0 10px var(--blue); }
        .hit { background: var(--gold) !important; color: black; animation: pulse 0.5s infinite; box-shadow: 0 0 20px var(--gold); }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.1);} 100% {transform: scale(1);} }

        /* --- 4. Bet Box with +/- --- */
        .bet-box { background: var(--card); margin: 15px; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        .bet-ctrl { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 15px 0; }
        .b-btn { background: #333; color: var(--gold); border: 2px solid var(--gold); width: 50px; height: 50px; border-radius: 50%; font-size: 24px; cursor: pointer; font-weight: bold; }
        .buy-btn { width: 100%; padding: 20px; border-radius: 15px; border: none; font-weight: bold; font-size: 1.4rem; cursor: pointer; background: var(--green); color: white; box-shadow: 0 5px 0 #219150; }
        .buy-btn:active { transform: translateY(3px); box-shadow: none; }

        /* --- 5. Message Button (@Godis1256) --- */
        .help-fab { position: fixed; bottom: 20px; right: 20px; background: #0088cc; color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 32px; box-shadow: 0 5px 15px rgba(0,0,0,0.6); z-index: 1000; }

        /* --- 6. Results & Modals --- */
        .result-panel { background: #111; margin: 15px; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .res-list { color: var(--gold); font-weight: bold; font-size: 1.5rem; letter-spacing: 2px; margin-top: 10px; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); }
        .modal-content { background: var(--card); margin: 20% auto; padding: 30px; width: 85%; border-radius: 25px; border: 1px solid var(--gold); text-align: center; }
        .input-f { width: 100%; background: #000; color: var(--gold); border: 1px solid #444; padding: 15px; border-radius: 10px; box-sizing: border-box; margin-top: 10px; font-size: 1rem; }
        
        .admin-link { opacity: 0.02; position: fixed; bottom: 0; left: 0; padding: 10px; color: white; background: none; border: none; }
    </style>
</head>
<body>

<div class="jackpot-tag">💰 ROYAL JACKPOT: <span id="jackpotAmt">54,230.00</span> ETB</div>
<div class="ticker-wrap"><marquee id="tickerText">እንኳን ወደ DANIEL ROYAL በደህና መጡ! | አስተማማኝ ክፍያ | ደረሰኝ በ @Godis1256 ይላኩ!</marquee></div>

<div class="header">
    <div style="text-align:left">
        <h2 style="margin:0; color:var(--gold);">DANIEL ROYAL</h2>
        <button onclick="toggleLang()" style="font-size:11px; background:#333; color:white; border:1px solid #555; border-radius:4px; padding:4px 8px;">EN/አማ</button>
    </div>
    <div class="balance-box" onclick="copyID()">💰 <span id="balance">0.00</span></div>
</div>

<div class="user-info-bar">
    <span>ID: <b id="uID">---</b></span>
    <span>User: <b id="uName">Guest</b></span>
</div>

<div class="timer-display" id="timerDisplay">01:00</div>

<div class="grid" id="grid"></div>

<div class="bet-box">
    <span id="txt-bet-label" style="color:#aaa; font-size:1rem;">የወራጅ መጠን (Min 15)</span>
    <div class="bet-ctrl">
        <button class="b-btn" onclick="changeBet(-5)">-</button>
        <input type="number" id="betAmount" value="15" min="15" readonly style="width:100px; text-align:center; background:#000; color:var(--gold); border:2px solid var(--gold); padding:12px; border-radius:12px; font-weight:bold; font-size:1.5rem;">
        <button class="b-btn" onclick="changeBet(5)">+</button>
    </div>
    <button onclick="buyTicket()" class="buy-btn" id="txt-buy-btn">ትኬት ቁረጥ (BUY TICKET)</button>
</div>

<div class="result-panel">
    <div id="txt-res-label" style="color:#666; font-size:0.9rem;">የቀጥታ ውጤት (LIVE)</div>
    <div id="drawnNumbersList" class="res-list">...</div>
</div>

<div style="display:flex; justify-content:center; gap:15px; padding:0 15px 30px;">
    <button onclick="showModal('depModal')" style="flex:1; background:var(--blue); color:white; border:none; padding:18px; border-radius:15px; font-weight:bold; font-size:1.1rem;">Deposit 📥</button>
    <button onclick="showModal('witModal')" style="flex:1; background:var(--red); color:white; border:none; padding:18px; border-radius:15px; font-weight:bold; font-size:1.1rem;">Withdraw 📤</button>
</div>

<a href="https://t.me/Godis1256" target="_blank" class="help-fab">💬</a>

<button class="admin-link" onclick="adminAction()">Admin</button>

<div id="depModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--blue)">Deposit 📥</h3>
    <div style="text-align:left; background:#000; padding:15px; border-radius:12px; font-size:1rem; margin-bottom:15px; border:1px solid #333;">
        Telebirr: <b>0986980130</b> (Daniel M.)<br>
        Abyssinia: <b>153682704</b>
    </div>
    <input type="file" id="receiptFile" accept="image/*" class="input-f">
    <button onclick="sendScreenshot()" id="upBtn" style="background:var(--green); color:white; border:none; width:100%; padding:18px; border-radius:12px; font-weight:bold; margin-top:20px;">SEND SCREENSHOT ✅</button>
    <button onclick="closeModal('depModal')" style="background:none; border:none; color:#777; margin-top:15px;">Close</button>
</div></div>

<div id="witModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--red)">Withdraw 📤</h3>
    <input type="number" id="witAmt" class="input-f" placeholder="Amount (Min 300)">
    <input type="text" id="witAcc" class="input-f" placeholder="Bank Name & Account">
    <button onclick="requestWithdraw()" style="background:var(--green); color:white; border:none; width:100%; padding:18px; border-radius:12px; font-weight:bold; margin-top:20px;">SUBMIT REQUEST</button>
    <button onclick="closeModal('witModal')" style="background:none; border:none; color:#777; margin-top:15px;">Cancel</button>
</div></div>

<script>
    // Audio Context
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSnd(f, t, d) { try { const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(0.05, audioCtx.currentTime); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d); } catch(e){} }

    // Firebase (ያልተቀነሰ)
    const firebaseConfig = { apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA", authDomain: "chickenkeno-c41fa.firebaseapp.com", projectId: "chickenkeno-c41fa", databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com", storageBucket: "chickenkeno-c41fa.appspot.com", messagingSenderId: "423384148862", appId: "1:423384148862:web:99e9faebe83982f95be12f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const BOT_TOKEN = "8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw";
    const CHAT_ID = "7313437942";

    // User Session (ያልተቀነሰ)
    let uID = localStorage.getItem('keno_user_id') || "DK-" + Math.floor(1000 + Math.random() * 9000);
    let uName = localStorage.getItem('keno_user_name') || "Player_" + uID.split('-')[1];
    localStorage.setItem('keno_user_id', uID);
    document.getElementById('uID').innerText = uID;
    document.getElementById('uName').innerText = uName;

    db.ref('users/' + uID + '/balance').on('value', s => document.getElementById('balance').innerText = (s.val() || 0).toFixed(2));

    // Grid System
    let selectedNums = [], activeBets = [], lang = 'am';
    for(let i=1; i<=80; i++) {
        let d = document.createElement('div'); d.className='num'; d.id='n'+i; d.innerText=i;
        d.onclick=()=>{
            playSnd(440, 'sine', 0.05);
            if(d.classList.contains('selected')){ d.classList.remove('selected'); selectedNums = selectedNums.filter(x => x !== i); }
            else if(selectedNums.length < 10){ d.classList.add('selected'); selectedNums.push(i); }
        };
        document.getElementById('grid').appendChild(d);
    }

    function changeBet(v) { let b = document.getElementById('betAmount'); let n = parseInt(b.value) + v; if(n >= 15) { b.value = n; playSnd(300, 'square', 0.05); } }

    function buyTicket() {
        let amt = parseInt(document.getElementById('betAmount').value);
        if(selectedNums.length < 2) return alert(lang==='am'?'እባክዎ ቁጥሮችን ይምረጡ!':'Select numbers!');
        db.ref('users/' + uID + '/balance').once('value', s => {
            let bal = s.val() || 0;
            if(bal < amt) return alert("በቂ ብር የለም!");
            db.ref('users/' + uID).update({balance: bal - amt});
            activeBets.push({nums: [...selectedNums], bet: amt});
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent("🎟 New Ticket\nUser: "+uName+"\nID: "+uID+"\nAmt: "+amt+"\nNums: "+selectedNums.join(','))}`);
            selectedNums = []; document.querySelectorAll('.selected').forEach(n => n.classList.remove('selected'));
        });
    }

    // Timer Logic
    let timeLeft = 60, isDrawing = false;
    setInterval(() => {
        if(isDrawing) return;
        timeLeft--;
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById('timerDisplay').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
        let j = parseFloat(document.getElementById('jackpotAmt').innerText.replace(',',''));
        document.getElementById('jackpotAmt').innerText = (j + 0.05).toLocaleString(undefined, {minimumFractionDigits:2});
        if(timeLeft <= 0) runDraw();
    }, 1000);

    async function runDraw() {
        isDrawing = true;
        let drawn = []; while(drawn.length < 20) { let r = Math.floor(Math.random()*80)+1; if(!drawn.includes(r)) drawn.push(r); }
        let display = [];
        for(let n of drawn) {
            await new Promise(r => setTimeout(r, 350));
            playSnd(200+(n*5), 'sine', 0.1);
            document.getElementById('n'+n).classList.add('hit');
            display.push(n);
            document.getElementById('drawnNumbersList').innerText = display.sort((a,b)=>a-b).join(' ');
        }
        // Win Check
        activeBets.forEach(t => {
            let hits = t.nums.filter(n => drawn.includes(n)).length;
            if(hits >= 2) {
                let win = t.bet * (hits * 1.5);
                db.ref('users/' + uID + '/balance').once('value', s => db.ref('users/' + uID).update({balance: (s.val()||0) + win}));
                confetti({ particleCount: 250, spread: 90, origin: { y: 0.6 } });
                playSnd(800, 'square', 0.5);
            }
        });
        setTimeout(() => {
            document.querySelectorAll('.hit').forEach(n => n.classList.remove('hit'));
            document.getElementById('drawnNumbersList').innerText = "...";
            activeBets = []; isDrawing = false; timeLeft = 60;
        }, 6000);
    }

    // New Screenshot Send
    async function sendScreenshot() {
        const file = document.getElementById('receiptFile').files[0];
        if(!file) return alert("ፎቶ ይምረጡ!");
        const btn = document.getElementById('upBtn'); btn.innerText = "Sending...";
        const fd = new FormData(); fd.append('chat_id', CHAT_ID); fd.append('photo', file);
        fd.append('caption', `📥 DEPOSIT RECEIPT\nUser: ${uName}\nID: ${uID}`);
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
        alert("ተልኳል!"); closeModal('depModal'); btn.innerText = "SEND SCREENSHOT ✅";
    }

    function requestWithdraw() {
        let amt = document.getElementById('witAmt').value;
        let acc = document.getElementById('witAcc').value;
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent("📤 WITHDRAW REQUEST\nID: "+uID+"\nAmt: "+amt+"\nAcc: "+acc)}`);
        alert("ጥያቄዎ ተልኳል!"); closeModal('witModal');
    }

    function toggleLang() {
        lang = lang === 'am' ? 'en' : 'am';
        document.getElementById('txt-bet-label').innerText = lang === 'am' ? 'የወራጅ መጠን (Min 15)' : 'Bet Amount (Min 15)';
        document.getElementById('txt-buy-btn').innerText = lang === 'am' ? 'ትኬት ቁረጥ (BUY TICKET)' : 'Buy Ticket (BUY)';
    }

    function copyID() { navigator.clipboard.writeText(uID); alert("ID Copied!"); }

    function adminAction() {
        let p = prompt("Admin Pass:");
        if(p === "1234") {
            let id = prompt("User ID:"); let a = parseFloat(prompt("Amount:"));
            db.ref('users/' + id).update({balance: a}); alert("Done!");
        }
    }

    function showModal(id) { document.getElementById(id).style.display = "block"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }
</script>
</body>
</html>
