<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chicken Road ETB Betting</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #1a1d21; color: white; font-family: sans-serif; overflow: hidden; }
        .header { background: #2c313a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3e4451; }
        .balance-box { text-align: right; }
        .balance { font-size: 20px; font-weight: bold; color: #2ecc71; }
        
        .action-btns { display: flex; gap: 10px; padding: 10px; background: #252930; justify-content: center; }
        .act-btn { padding: 8px 15px; border-radius: 5px; border: none; font-weight: bold; color: white; cursor: pointer; }
        .dep { background: #27ae60; }
        .wit { background: #2980b9; }

        #game-area { width: 100%; height: 40vh; background: #333; position: relative; overflow: hidden; }
        .manhole { position: absolute; width: 80px; height: 80px; background: url('https://img.icons8.com/ios-filled/100/666666/manhole-cover.png') no-repeat center; background-size: contain; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: rgba(255,255,255,0.5); }
        #chicken { width: 70px; position: absolute; bottom: 20px; left: 20px; z-index: 10; transition: 0.5s; }

        .bet-panel { padding: 20px; background: #252930; height: 40vh; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        .amt-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 20px; }
        .amt-btn { background: #333; border: 1px solid #444; color: white; padding: 12px 5px; border-radius: 8px; font-size: 14px; font-weight: bold; }
        .amt-btn.active { border-color: #2ecc71; background: rgba(46, 204, 113, 0.2); }

        #play-btn { width: 100%; background: #2ecc71; color: white; border: none; padding: 18px; border-radius: 12px; font-size: 24px; font-weight: bold; cursor: pointer; box-shadow: 0 5px #27ae60; }
        #play-btn:active { box-shadow: 0 0; transform: translateY(5px); }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold;">CHICKEN ROAD 🇪🇹</div>
    <div class="balance-box">
        <div style="font-size: 10px; color: #aaa;">ያለህ ገንዘብ</div>
        <div class="balance" id="bal-txt">1,000.00 ETB</div>
    </div>
</div>

<div class="action-btns">
    <button class="act-btn dep" onclick="alert('የቴሌብር ቁጥርዎን ያስገቡ...')">DEPOSIT</button>
    <button class="act-btn wit" onclick="alert('ዝቅተኛው የማውጫ መጠን 100 ብር ነው')">WITHDRAW</button>
</div>

<div id="game-area">
    <div class="manhole" style="left: 40%; top: 40%;">1.2x</div>
    <div class="manhole" style="left: 70%; top: 40%;">2.5x</div>
    <img id="chicken" src="https://img.icons8.com/emoji/96/000000/chicken-emoji.png">
</div>

<div class="bet-panel">
    <div style="margin-bottom: 10px; font-size: 14px; color: #ccc;">የውርርድ መጠን ይምረጡ (ብር)</div>
    <div class="amt-grid">
        <button class="amt-btn active" onclick="setBet(10, this)">10</button>
        <button class="amt-btn" onclick="setBet(50, this)">50</button>
        <button class="amt-btn" onclick="setBet(100, this)">100</button>
        <button class="amt-btn" onclick="setBet(500, this)">500</button>
    </div>
    <button id="play-btn" onclick="playGame()">PLAY</button>
</div>

<script>
    let balance = 1000;
    let bet = 10;
    const balTxt = document.getElementById('bal-txt');
    const chicken = document.getElementById('chicken');

    function setBet(val, el) {
        bet = val;
        document.querySelectorAll('.amt-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function playGame() {
        if(balance < bet) return alert("በቂ ገንዘብ የለህም!");
        balance -= bet;
        updateUI();
        
        // Animation
        chicken.style.left = "80%";
        setTimeout(() => {
            let win = Math.random() > 0.5;
            if(win) {
                let prize = bet * 2;
                balance += prize;
                alert("እንኳን ደስ አለህ! " + prize + " ብር አሸነፍክ!");
            } else {
                alert("ተበልተሃል! እንደገና ሞክር።");
            }
            chicken.style.left = "20px";
            updateUI();
        }, 600);
    }

    function updateUI() {
        balTxt.innerText = balance.toFixed(2) + " ETB";
    }
</script>

</body>
</html>
