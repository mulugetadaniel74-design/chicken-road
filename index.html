<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANIEL KENO ROYAL - ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #0a0a0a; --card: #1a1a1a; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { background-color: var(--dark); color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 60px; }
        .header { background: #111; padding: 15px; border-bottom: 2px solid var(--gold); }
        .balance-box { border: 2px solid var(--gold); display: inline-block; padding: 5px 25px; border-radius: 50px; font-size: 24px; color: var(--gold); font-weight: bold; background: #000; box-shadow: 0 0 15px rgba(255,196,15,0.3); }
        .timer { font-size: 3.2rem; font-weight: bold; color: var(--red); margin: 10px; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: #111; padding: 10px; border-radius: 12px; max-width: 450px; margin: auto; border: 1px solid #333; }
        .num { background: #2a2a2a; border: 1px solid #333; padding: 12px 0; font-weight: bold; border-radius: 6px; cursor: pointer; color: #ccc; font-size: 0.9rem; transition: 0.2s; }
        .selected { background: var(--blue) !important; color: white; transform: scale(1.05); }
        .hit { background: var(--gold) !important; color: black; animation: pop 0.4s; }
        @keyframes pop { 0% {transform: scale(1);} 50% {transform: scale(1.2);} 100% {transform: scale(1);} }
        
        .bet-controls { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 20px 0; }
        .bet-btn { background: #333; color: white; border: 1px solid var(--gold); width: 45px; height: 45px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; }
        .btn-bet-main { width: 90%; max-width: 400px; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 1.3rem; cursor: pointer; background: var(--green); color: white; }
        
        .panel { background: var(--card); margin: 10px; padding: 15px; border-radius: 15px; border: 1px solid #333; text-align: left; }
        .scroll-box { display: flex; gap: 8px; overflow-x: auto; padding: 5px; }
        .ball { min-width: 32px; height: 32px; background: var(--gold); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); }
        .modal-content { background: var(--card); margin: 10% auto; padding: 25px; width: 85%; max-width: 380px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; }
        .input-field { width: 100%; background: #000; color: white; border: 1px solid #444; padding: 12px; border-radius: 10px; margin-top: 10px; box-sizing: border-box; }
        #adminBtn { display: none; background: #222; color: var(--gold); border: 1px solid var(--gold); padding: 10px 20px; border-radius: 10px; margin: 20px auto; cursor: pointer; font-weight: bold; }
        
        /* Win Message */
        #winMsg { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--green); color: white; padding: 30px; border-radius: 20px; z-index: 2000; font-size: 1.5rem; font-weight: bold; box-shadow: 0 0 50px rgba(46, 204, 113, 0.5); border: 3px solid white; }
    </style>
</head>
<body>

<div id="winMsg">🎉 እንኳን ደስ አለዎት! <br><span id="winAmtText">0</span> ETB አሸንፈዋል!</div>

<div class="header">
    <h3 style="margin:0; color:var(--gold);">DANIEL KENO ROYAL</h3>
    <div class="balance-box">💰 <span id="balance">0.00</span> ETB</div>
    <div style="font-size:11px; color:#555; margin-top:5px;">ID: <span id="myID" style="color:var(--gold)">...</span></div>
</div>

<div class="timer" id="timerDisplay">01:00</div>

<div style="display: flex; justify-content: center; gap: 8px; margin-bottom: 10px;">
    <button style="background:#333; color:white; border:1px solid #444; padding:8px 12px; border-radius:8px;" onclick="quickPick(5)">Lucky 5</button>
    <button style="background:#333; color:white; border:1px solid #444; padding:8px 12px; border-radius:8px;" onclick="quickPick(10)">Lucky 10</button>
    <button style="background:rgba(231,76,60,0.2); color:var(--red); border:1px solid var(--red); padding:8px 12px; border-radius:8px;" onclick="clearSelection()">Clear</button>
</div>

<div class="grid" id="grid"></div>

<div class="bet-controls">
    <button class="bet-btn" onclick="adjustBet(-5)">-</button>
    <div style="font-size: 1.4rem; font-weight: bold; color: var(--gold); min-width: 80px;"><span id="betValue">15</span> ETB</div>
    <button class="bet-btn" onclick="adjustBet(5)">+</button>
</div>

<button onclick="buyTicket()" class="btn-bet-main">ትኬት ቁረጥ (PLACE BET)</button>

<div style="display:flex; justify-content:center; gap:10px; margin: 15px;">
    <button onclick="showModal('depModal')" style="background:var(--blue); border:none; padding:15px; border-radius:12px; width:45%; color:white; font-weight:bold;">Deposit 📥</button>
    <button onclick="showModal('witModal')" style="background:var(--red); border:none; padding:15px; border-radius:12px; width:45%; color:white; font-weight:bold;">Withdraw 📤</button>
</div>

<div class="panel">
    <div style="color:var(--blue); margin-bottom:8px; font-size:0.9rem;">📜 የአሁኑ ዙር ውጤቶች (LIVE)</div>
    <div id="liveDraw" class="scroll-box"></div>
</div>

<div class="panel">
    <div style="color:var(--gold); margin-bottom:8px; font-size:0.9rem;">🎟 የእርስዎ ትኬቶች (MY TICKETS)</div>
    <div id="ticketList" style="font-size:0.85rem;"></div>
</div>

<button id="adminBtn" onclick="adminAction()">Admin Panel ⚙️</button>

<div id="depModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--blue);">📥 ብር ለማስገባት (Min 100)</h3>
    <div style="text-align:left; background:#111; padding:12px; border-radius:10px; font-size:0.85rem; border:1px solid #333;">
        📱 Telebirr: <b>0986980130</b><br>
        🏦 Abyssinia: <b>153682704</b><br>
        👤 ስም: <b>ዳንኤል ሙሉጌታ ኩምሳ</b>
    </div>
    <input type="file" id="receiptFile" accept="image/*" class="input-field">
    <button onclick="sendDeposit()" style="background:var(--green); color:white; border:none; padding:15px; border-radius:12px; width:100%; font-weight:bold; margin-top:15px;">ደረሰኝ ላክ</button>
    <button onclick="closeModal('depModal')" style="background:#444; color:white; width:100%; border:none; border-radius:10px; margin-top:10px; padding:10px;">ተመለስ</button>
</div></div>

<div id="witModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--red);">📤 ብር ለማውጣት (Min 300)</h3>
    <input type="number" id="witAmt" class="input-field" placeholder="የብር መጠን">
    <input type="text" id="witBank" class="input-field" placeholder="ባንክ / ቴሌብር">
    <input type="text" id="witAcc" class="input-field" placeholder="አካውንት ቁጥር">
    <input type="text" id="witName" class="input-field" placeholder="ሙሉ ስም">
    <button onclick="sendWithdraw()" style="background:var(--red); color:white; border:none; padding:15px; border-radius:12px; width:100%; font-weight:bold; margin-top:15px;">ጥያቄ ላክ</button>
    <button onclick="closeModal('witModal')" style="background:#444; color:white; width:100%; border:none; border-radius:10px; margin-top:10px; padding:10px;">ተመለስ</button>
</div></div>

<script>
    const BOT_TOKEN = "8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw";
    const CHAT_ID = "7313437942";
    const ADMIN_ID = "USER-4173";
    
    const kenoOdds = {
        2: { 2: 10 },
        3: { 2: 2, 3: 25 },
        4: { 2: 1, 3: 5, 4: 80 },
        5: { 3: 2, 4: 15, 5: 350 },
        10: { 5: 2, 6: 10, 7: 50, 8: 300, 9: 1500, 10: 10000 }
    };

    const firebaseConfig = {
        apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA",
        authDomain: "chickenkeno-c41fa.firebaseapp.com",
        projectId: "chickenkeno-c41fa",
        databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com",
        appId: "1:423384148862:web:99e9faebe83982f95be12f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let uID = localStorage.getItem('keno_user_id') || "USER-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('keno_user_id', uID);
    document.getElementById('myID').innerText = uID;
    if(uID === ADMIN_ID) document.getElementById('adminBtn').style.display = "block";

    let selectedNums = [], timeLeft = 60, isDrawing = false, currentBet = 15, activeTickets = [];

    for(let i=1; i<=80; i++) {
        let d = document.createElement('div'); d.className='num'; d.id='n'+i; d.innerText=i;
        d.onclick=()=> {
            if(isDrawing) return;
            if(d.classList.contains('selected')) { d.classList.remove('selected'); selectedNums = selectedNums.filter(x=>x!==i); }
            else if(selectedNums.length < 10) { d.classList.add('selected'); selectedNums.push(i); }
        };
        document.getElementById('grid').appendChild(d);
    }

    function adjustBet(val) { currentBet = Math.max(15, currentBet + val); document.getElementById('betValue').innerText = currentBet; }

    setInterval(() => {
        if(isDrawing) return;
        timeLeft--;
        let s = timeLeft % 60;
        document.getElementById('timerDisplay').innerText = `00:${s<10?'0'+s:s}`;
        if(timeLeft <= 0) runDraw();
    }, 1000);

    async function runDraw() {
        isDrawing = true;
        let drawn = [];
        while(drawn.length < 20) { let r = Math.floor(Math.random()*80)+1; if(!drawn.includes(r)) drawn.push(r); }
        
        let html = "";
        for(let n of drawn) {
            await new Promise(res => setTimeout(res, 400));
            document.getElementById('n'+n).classList.add('hit');
            html += `<div class="ball">${n}</div>`;
            document.getElementById('liveDraw').innerHTML = html;
        }

        checkTickets(drawn);
        setTimeout(() => {
            document.querySelectorAll('.num').forEach(el => el.classList.remove('hit', 'selected'));
            document.getElementById('liveDraw').innerHTML = "";
            activeTickets = []; updateTicketUI();
            selectedNums = []; isDrawing = false; timeLeft = 60;
            document.getElementById('winMsg').style.display = "none";
        }, 6000);
    }

    function checkTickets(drawn) {
        activeTickets.forEach(t => {
            let hits = t.nums.filter(n => drawn.includes(n)).length;
            t.hits = hits;
            let selCount = t.nums.length;
            let mult = 0;
            if (kenoOdds[selCount] && kenoOdds[selCount][hits]) mult = kenoOdds[selCount][hits];

            if (mult > 0) {
                let win = t.bet * mult;
                t.win = win;
                // Update Balance
                db.ref('users/'+uID+'/balance').once('value', s => {
                    db.ref('users/'+uID).update({balance: (s.val()||0) + win});
                });
                // Show Win Msg
                document.getElementById('winAmtText').innerText = win;
                document.getElementById('winMsg').style.display = "block";
                // Send to Bot
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        chat_id: CHAT_ID, 
                        text: `💰 አሸናፊ (WINNER)! 🎉\nID: ${uID}\nBet: ${t.bet} ETB\nHits: ${hits}/${selCount}\nያሸነፈው: ${win} ETB` 
                    })
                });
            }
        });
        updateTicketUI();
    }

    function updateTicketUI() {
        document.getElementById('ticketList').innerHTML = activeTickets.map(t => `
            <div style="background:#222; padding:10px; border-radius:10px; margin-bottom:6px; border-left:4px solid ${t.win > 0 ? 'var(--green)' : 'var(--gold)'};">
                <div style="display:flex; justify-content:space-between;">
                    <span>💸 ${t.bet} ETB</span>
                    <b style="color:${t.win > 0 ? 'var(--green)' : 'white'}">${t.win > 0 ? 'WON: '+t.win : 'Hits: '+t.hits}</b>
                </div>
            </div>
        `).join('');
    }

    function buyTicket() {
        if(selectedNums.length < 2) return alert("ቢያንስ 2 ቁጥሮች ይምረጡ!");
        db.ref('users/'+uID+'/balance').once('value', s => {
            let bal = s.val() || 0;
            if(bal < currentBet) return alert("በቂ ብር የለም!");
            db.ref('users/'+uID).update({balance: bal - currentBet});
            activeTickets.push({ bet: currentBet, nums: [...selectedNums], hits: 0, win: 0 });
            updateTicketUI();
            // Send Ticket to Bot
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ chat_id: CHAT_ID, text: `🎟 ትኬት ተቆረጠ!\nID: ${uID}\nBet: ${currentBet} ETB\nቁጥሮች: ${selectedNums.join(', ')}` }) 
            });
            clearSelection();
            alert("ትኬት ተቆርጧል!");
        });
    }

    async function sendDeposit() {
        const file = document.getElementById('receiptFile').files[0];
        if(!file) return alert("ደረሰኝ ይምረጡ!");
        let fd = new FormData(); fd.append('chat_id', CHAT_ID); fd.append('photo', file); fd.append('caption', `📥 ገቢ ጥያቄ (DEPOSIT)\nID: ${uID}`);
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
        alert("ተልኳል!"); closeModal('depModal');
    }

    function sendWithdraw() {
        let amt = document.getElementById('witAmt').value;
        if(amt < 300) return alert("ዝቅተኛ 300 ነው!");
        let msg = `📤 የወጪ ጥያቄ (WITHDRAW)\nID: ${uID}\nAmount: ${amt} ETB\nBank: ${document.getElementById('witBank').value}\nAcc: ${document.getElementById('witAcc').value}\nName: ${document.getElementById('witName').value}`;
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ chat_id: CHAT_ID, text: msg }) });
        alert("ጥያቄዎ ተልኳል!"); closeModal('witModal');
    }

    function adminAction() {
        let p = prompt("Password:");
        if(p === "9801") {
            let id = prompt("User ID:");
            let amt = parseFloat(prompt("Amount (+/-):"));
            if(id && !isNaN(amt)) {
                db.ref('users/'+id+'/balance').once('value', s => {
                    db.ref('users/'+id).update({balance: (s.val()||0) + amt});
                    alert("ተስተካክሏል!");
                });
            }
        }
    }

    db.ref('users/'+uID+'/balance').on('value', s => { document.getElementById('balance').innerText = (s.val()||0).toFixed(2); });
    function showModal(id) { document.getElementById(id).style.display = "block"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }
    function quickPick(n) { clearSelection(); while(selectedNums.length<n) { let r=Math.floor(Math.random()*80)+1; if(!selectedNums.includes(r)) { selectedNums.push(r); document.getElementById('n'+r).classList.add('selected'); } } }
    function clearSelection() { document.querySelectorAll('.num').forEach(n=>n.classList.remove('selected')); selectedNums=[]; }
</script>
</body>
    </html>
