<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANIEL KENO ROYAL - PRO MAX</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #0a0a0a; --card: #161616; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { background-color: var(--dark); color: white; text-align: center; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        
        .header { background: #1a1a1a; padding: 15px; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .balance-box { border: 2px solid var(--gold); padding: 8px 15px; border-radius: 50px; font-size: 18px; color: var(--gold); font-weight: bold; background: #000; }
        
        .timer-display { font-size: 4rem; font-weight: bold; color: var(--red); margin: 15px 0; text-shadow: 0 0 15px var(--red); }
        
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: #111; padding: 10px; border-radius: 10px; margin: 10px; }
        .num { background: #333; border: 1px solid #444; padding: 12px 0; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 0.9rem; }
        .selected { background: var(--blue) !important; color: white; }
        .hit { background: var(--gold) !important; color: black; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }

        .bet-control { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 20px 0; }
        .circle-btn { background: #222; color: var(--gold); border: 2px solid var(--gold); width: 55px; height: 55px; border-radius: 50%; font-size: 30px; cursor: pointer; }
        .bet-input { width: 100px; background: #000; color: var(--gold); border: 2px solid var(--gold); padding: 12px; border-radius: 12px; text-align: center; font-size: 1.6rem; font-weight: bold; }

        .btn-main { width: 90%; padding: 20px; border-radius: 15px; border: none; font-weight: bold; font-size: 1.3rem; cursor: pointer; background: var(--green); color: white; margin-bottom: 20px; }
        
        .panel { background: var(--card); padding: 15px; border-radius: 15px; margin: 10px; text-align: left; border: 1px solid #333; }
        
        /* Telegram Floating Button */
        .tg-support { position: fixed; bottom: 25px; right: 25px; background: #0088cc; color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 500; border: 2px solid white; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); }
        .modal-content { background: var(--card); margin: 15% auto; padding: 25px; width: 80%; border-radius: 20px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div class="header">
    <div style="text-align:left">
        <h3 style="margin:0; color:var(--gold);">DANIEL ROYAL</h3>
        <div style="font-size:10px; color:#888;">ID: <span id="myID" style="color:var(--gold);">...</span></div>
    </div>
    <div class="balance-box">💰 <span id="balance">0.00</span></div>
</div>

<div class="timer-display" id="timerDisplay">01:00</div>

<div class="grid" id="grid"></div>

<div class="bet-control">
    <button class="circle-btn" onclick="changeBet(-5)">-</button>
    <input type="number" id="betAmount" value="15" min="15" readonly class="bet-input">
    <button class="circle-btn" onclick="changeBet(5)">+</button>
</div>

<button onclick="buyTicket()" class="btn-main">ትኬት ቁረጥ (BUY)</button>

<div class="panel">
    <div style="color:#888; font-size:0.8rem; margin-bottom:5px;">የቀጥታ ውጤት</div>
    <div id="drawnNumbersList" style="color:var(--gold); font-weight:bold; font-size:1.2rem; min-height: 1.5em;">Waiting...</div>
</div>

<div class="panel">
    <h4 style="margin:0; color:var(--blue); border-bottom:1px solid #333; padding-bottom:8px;">የቆረጧቸው ትኬቶች</h4>
    <div id="activeTicketsList" style="margin-top:10px; font-size:0.9rem;">ትኬት የለም...</div>
</div>

<div style="display:flex; justify-content:center; gap:10px; padding:10px;">
    <button onclick="showModal('depModal')" style="background:var(--blue); color:white; border:none; padding:15px; border-radius:12px; width:45%; font-weight:bold;">Deposit 📥</button>
    <button onclick="showModal('witModal')" style="background:var(--red); color:white; border:none; padding:15px; border-radius:12px; width:45%; font-weight:bold;">Withdraw 📤</button>
</div>

<a href="https://t.me/Godis1256" target="_blank" class="tg-support">💬</a>

<div id="depModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--blue)">Deposit 📥</h3>
    <p>የገቡበትን ደረሰኝ ይላኩ</p>
    <input type="file" id="receiptFile" style="width:100%; margin-bottom:15px;">
    <button onclick="sendReceipt()" class="btn-main" style="width:100%">ላክ</button>
    <button onclick="closeModal('depModal')" style="color:gray; background:none; border:none;">ዝጋ</button>
</div></div>

<div id="witModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--red)">Withdraw 📤</h3>
    <input type="number" id="witAmt" placeholder="Amount" style="width:90%; padding:10px; margin-bottom:10px;">
    <input type="text" id="witAcc" placeholder="Account" style="width:90%; padding:10px;">
    <button onclick="requestWithdraw()" class="btn-main" style="width:100%; margin-top:15px;">ጠይቅ</button>
    <button onclick="closeModal('witModal')" style="color:gray; background:none; border:none;">ተመለስ</button>
</div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA", authDomain: "chickenkeno-c41fa.firebaseapp.com", projectId: "chickenkeno-c41fa", databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com", storageBucket: "chickenkeno-c41fa.appspot.com", messagingSenderId: "423384148862", appId: "1:423384148862:web:99e9faebe83982f95be12f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Bot Config
    const BOT_TOKEN = "8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw";
    const CHAT_ID = "7313437942";

    let uID = localStorage.getItem('keno_id') || "DK-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('keno_id', uID);
    document.getElementById('myID').innerText = uID;

    // Telegram Message Function
    async function sendTG(msg) {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=HTML`);
    }

    db.ref('users/' + uID + '/balance').on('value', s => document.getElementById('balance').innerText = (s.val() || 0).toFixed(2));

    function changeBet(v) {
        let el = document.getElementById('betAmount');
        let val = parseInt(el.value) + v;
        if(val >= 15) el.value = val;
    }

    let selectedNums = [], activeBets = [];
    const grid = document.getElementById('grid');
    for(let i=1; i<=80; i++) {
        let d = document.createElement('div'); d.className='num'; d.id='n'+i; d.innerText=i;
        d.onclick=()=>{
            if(d.classList.contains('selected')){ d.classList.remove('selected'); selectedNums = selectedNums.filter(x=>x!=i); }
            else if(selectedNums.length < 10){ d.classList.add('selected'); selectedNums.push(i); }
        };
        grid.appendChild(d);
    }

    function buyTicket() {
        let amt = parseInt(document.getElementById('betAmount').value);
        if(selectedNums.length < 2) return alert("ቢያንስ 2 ቁጥር ይምረጡ!");
        db.ref('users/' + uID + '/balance').once('value', s => {
            let bal = s.val() || 0;
            if(bal < amt) return alert("በቂ ብር የለም!");
            db.ref('users/' + uID).update({balance: bal - amt});
            activeBets.push({nums: [...selectedNums], bet: amt});
            renderTickets();
            
            // Notify Telegram
            sendTG(`🎟 <b>ትኬት ተቆርጧል!</b>\nID: ${uID}\nመጠን: ${amt} ETB\nቁጥሮች: ${selectedNums.join(', ')}`);
            
            selectedNums = []; document.querySelectorAll('.selected').forEach(n => n.classList.remove('selected'));
        });
    }

    function renderTickets() {
        let list = document.getElementById('activeTicketsList');
        list.innerHTML = activeBets.map(t => `<div style="background:#222; padding:10px; margin-bottom:5px; border-radius:8px; border-left:4px solid var(--blue);">💰 ${t.bet} ETB | ${t.nums.join(', ')}</div>`).join('');
    }

    let timeLeft = 60, isDrawing = false;
    setInterval(() => {
        if(isDrawing) return;
        timeLeft--;
        document.getElementById('timerDisplay').innerText = `00:${timeLeft<10?'0'+timeLeft:timeLeft}`;
        if(timeLeft <= 0) runDraw();
    }, 1000);

    async function runDraw() {
        isDrawing = true; let drawn = [];
        while(drawn.length < 20) { let r = Math.floor(Math.random()*80)+1; if(!drawn.includes(r)) drawn.push(r); }
        let disp = [];
        for(let n of drawn) {
            await new Promise(r => setTimeout(r, 400));
            document.getElementById('n'+n).classList.add('hit');
            disp.push(n);
            document.getElementById('drawnNumbersList').innerText = disp.join('  ');
        }
        
        activeBets.forEach(t => {
            let hits = t.nums.filter(n => drawn.includes(n)).length;
            if(hits >= 2) {
                let win = t.bet * (hits * 1.5);
                db.ref('users/' + uID + '/balance').once('value', s => db.ref('users/' + uID).update({balance: (s.val()||0) + win}));
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                sendTG(`✅ <b>ተበልቷል (WIN)!</b>\nID: ${uID}\nትርፍ: ${win} ETB\nHits: ${hits}`);
            } else {
                sendTG(`❌ <b>ተበልቷል (LOSS)</b>\nID: ${uID}\nትኬት: ${t.bet} ETB`);
            }
        });

        setTimeout(() => {
            document.querySelectorAll('.hit').forEach(n => n.classList.remove('hit'));
            activeBets = []; renderTickets(); isDrawing = false; timeLeft = 60;
        }, 5000);
    }

    function showModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
          </html>
