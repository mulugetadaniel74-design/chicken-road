<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHICKEN KENO LIVE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #121212; --card: #1e1e1e; --green: #2ecc71; --red: #e74c3c; --white: #ffffff; }
        body { background-color: var(--dark); color: var(--white); text-align: center; font-family: sans-serif; margin: 0; padding-bottom: 30px; }
        .header { background: var(--card); padding: 10px; border-bottom: 3px solid var(--gold); }
        .balance-box { border: 2px solid var(--gold); display: inline-block; padding: 5px 15px; border-radius: 10px; margin-top: 5px; color: var(--gold); font-weight: bold; }
        .timer { font-size: 24px; color: var(--red); margin: 15px 0; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-width: 380px; margin: 0 auto; padding: 10px; }
        .num { background: #333; border: 1px solid #444; padding: 10px 0; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .selected { background: #3498db !important; }
        .hit { background: var(--gold) !important; color: black; font-weight: bold; }
        .btn { width: 85%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .buy-btn { background: var(--green); color: white; }
        .action-btns { display: flex; justify-content: center; gap: 10px; }
        .small-btn { padding: 10px 20px; border-radius: 5px; border: none; font-weight: bold; color: white; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0; color:var(--gold);">🎰 CHICKEN KENO LIVE</h3>
    <div class="balance-box">💰 <span id="balance">0.00</span> ETB</div>
    <div style="font-size:11px; margin-top:5px;">ID: <span id="myID" style="color:var(--gold);">...</span></div>
</div>

<div class="timer" id="timerDisplay">01:00</div>

<div class="grid" id="grid"></div>

<button class="btn buy-btn" onclick="buyTicket()">ትኬት ቁረጥ (BUY TICKET)</button>

<div class="action-btns">
    <button onclick="showModal('depModal')" class="small-btn" style="background:#3498db;">Deposit 📥</button>
    <button onclick="showModal('witModal')" class="small-btn" style="background:var(--red);">Withdraw 📤</button>
</div>
<button onclick="adminAddMoney()" style="background:#555; color:white; border:none; padding:5px 15px; border-radius:5px; margin-top:15px; font-size:12px;">Admin ⚙️</button>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA",
        authDomain: "chickenkeno-c41fa.firebaseapp.com",
        projectId: "chickenkeno-c41fa",
        databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com",
        storageBucket: "chickenkeno-c41fa.appspot.com",
        messagingSenderId: "423384148862",
        appId: "1:423384148862:web:99e9faebe83982f95be12f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let uID = localStorage.getItem('keno_user_id') || "USER-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('keno_user_id', uID);
    document.getElementById('myID').innerText = uID;

    // ተጠቃሚውን ዳታቤዝ ላይ መመዝገብ (ለ Admin እንዲመች)
    db.ref('users/' + uID).once('value', snap => {
        if (!snap.exists()) {
            db.ref('users/' + uID).set({ balance: 0 });
        }
    });

    db.ref('users/' + uID + '/balance').on('value', snap => {
        document.getElementById('balance').innerText = (snap.val() || 0).toFixed(2);
    });

    // Grid መፍጠሪያ
    const grid = document.getElementById('grid');
    for (let i = 1; i <= 80; i++) {
        let d = document.createElement('div');
        d.className = 'num'; d.id = 'n' + i; d.innerText = i;
        d.onclick = () => d.classList.toggle('selected');
        grid.appendChild(d);
    }

    // Timer እና Draw (ባለፈው የሰጠሁህ Smart Draw እዚህ ይቀጥላል...)
    let timeLeft = 60;
    setInterval(() => {
        timeLeft--;
        let mins = Math.floor(timeLeft / 60), secs = timeLeft % 60;
        document.getElementById('timerDisplay').innerText = `${mins}:${secs < 10 ? '0'+secs : secs}`;
        if (timeLeft <= 0) { timeLeft = 60; /* runDraw() function እዚህ ይገባል */ }
    }, 1000);

    function adminAddMoney() {
        if (prompt("Password:") === "1234") {
            let id = prompt("User ID (e.g. USER-4173):");
            let amt = parseFloat(prompt("Amount:"));
            db.ref('users/' + id).once('value', s => {
                if (s.exists()) {
                    db.ref('users/' + id).update({ balance: (s.val().balance || 0) + amt });
                    alert("ለ " + id + " " + amt + " ብር ተጨምሯል!");
                } else {
                    alert("User አልተገኘም! መጀመሪያ ተጠቃሚው ዌብሳይቱን መክፈት አለበት።");
                }
            });
        }
    }
</script>
</body>
</html>
