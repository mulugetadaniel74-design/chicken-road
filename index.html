<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENO ROYAL - @RunChickenRunBot</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #12191c; color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* ዲፖዚት እና ውዝድራው በተኖች */
        .action-btns { display: flex; gap: 10px; width: 100%; margin-bottom: 15px; }
        .btn-link { flex: 1; padding: 14px; border-radius: 10px; font-weight: bold; text-decoration: none; text-align: center; font-size: 14px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .dep-btn { background-color: #2eb85c; color: black; }
        .with-btn { background-color: #3d4449; color: white; }

        .timer-box { background: #1c2529; border: 1px solid #c8a42d; color: #c8a42d; width: 100%; padding: 12px; border-radius: 10px; text-align: center; margin-bottom: 15px; font-size: 18px; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; background: #1c2529; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .number { width: 34px; height: 38px; background: #2c3439; display: flex; align-items: center; justify-content: center; border-radius: 5px; cursor: pointer; font-size: 14px; border: 1px solid #3d4449; transition: 0.2s; }
        .number.selected { background: #2eb85c; color: black; font-weight: bold; box-shadow: 0 0 8px #2eb85c; }
        
        /* ቁጥሮቹ ሲወጡ የሚበሩበት ቢጫ ቀለም */
        .number.drawn { background: #f1c40f !important; color: black !important; transform: scale(1.1); box-shadow: 0 0 15px #f1c40f; font-weight: bold; z-index: 10; }
        
        .play-btn { background-color: #2eb85c; color: black; border: none; width: 100%; padding: 20px; border-radius: 15px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="color: #2eb85c; font-weight: bold; font-size: 22px;">KENO ROYAL</div>
        <div style="color: #2eb85c; font-weight: bold; font-size: 20px;">0.00 ETB</div>
    </div>

    <div class="action-btns">
        <a href="https://t.me/RunChickenRunBot?start=deposit" target="_blank" class="btn-link dep-btn">💰 ዲፖዚት</a>
        <button onclick="withdraw()" class="btn-link with-btn">💸 ውዝድራው</button>
    </div>

    <div class="timer-box">⏳ ቀጣይ እጣ በ: <span id="timer">50</span> ሰከንድ</div>

    <div class="grid" id="grid"></div>

    <button class="play-btn" id="playBtn" onclick="startDraw()">ውርርድ (20 ETB)</button>

    <script>
        const grid = document.getElementById('grid');
        for (let i = 1; i <= 80; i++) {
            const div = document.createElement('div');
            div.className = 'number'; div.id = 'n' + i; div.innerText = i;
            div.onclick = function() { if(!this.classList.contains('drawn')) this.classList.toggle('selected'); };
            grid.appendChild(div);
        }

        function withdraw() {
            let amount = prompt("ማውጣት የሚፈልጉትን ብር ያስገቡ (ዝቅተኛ 50):");
            if (amount >= 50) {
                let phone = prompt("የቴሌብር ስልክ ቁጥርዎን ያስገቡ:");
                if (phone) window.open(`https://t.me/RunChickenRunBot?start=withdraw_${amount}_${phone}`, '_blank');
            } else if (amount != null) alert("ዝቅተኛው የማውጫ መጠን 50 ብር ነው።");
        }

        function startDraw() {
            if (document.querySelectorAll('.selected').length === 0) return alert("ቁጥር ይምረጡ!");
            document.querySelectorAll('.number').forEach(n => n.classList.remove('drawn'));
            document.getElementById('playBtn').disabled = true;
            let count = 0;
            let inv = setInterval(() => {
                let r = Math.floor(Math.random() * 80) + 1;
                document.getElementById('n' + r).classList.add('drawn');
                count++; if (count >= 20) { clearInterval(inv); document.getElementById('playBtn').disabled = false; }
            }, 300);
        }

        let time = 50;
        setInterval(() => {
            time--; if (time < 0) { time = 50; startDraw(); }
            document.getElementById('timer').innerText = time;
        }, 1000);
    </script>
</body>
</html>
