<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chicken Road Survival</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #1a1d21; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .header { background: #2c313a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3e4451; }
        .balance { font-size: 20px; font-weight: bold; color: #2ecc71; }
        
        #game-area { width: 100%; height: 55vh; background: #333; position: relative; overflow: hidden; }
        .lane { height: 20%; border-bottom: 1px dashed rgba(255,255,255,0.1); position: relative; }
        .grass { background: #27ae60; height: 15%; }
        
        #chicken { width: 50px; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); z-index: 10; transition: all 0.1s; }
        .car { width: 60px; height: 35px; background: #e74c3c; position: absolute; border-radius: 5px; box-shadow: 0 4px #c0392b; }
        
        .controls-panel { padding: 15px; background: #252930; height: 35vh; text-align: center; }
        .bet-display { margin-bottom: 10px; font-size: 14px; color: #aaa; }
        
        #play-btn { width: 100%; background: #2ecc71; color: white; border: none; padding: 20px; border-radius: 15px; font-size: 26px; font-weight: bold; cursor: pointer; box-shadow: 0 6px #27ae60; margin-top: 10px; }
        #play-btn:active { box-shadow: 0 0; transform: translateY(6px); }
        
        .bet-btns { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .b-btn { background: #3e4451; border: none; color: white; padding: 10px 15px; border-radius: 5px; font-weight: bold; }
        .b-btn.active { background: #2ecc71; }
    </style>
</head>
<body>

<div class="header">
    <div>CHICKEN CROSS 🇪🇹</div>
    <div class="balance" id="bal">1,000.00 ETB</div>
</div>

<div id="game-area">
    <div class="grass" style="position: absolute; top: 0; width: 100%; z-index: 1;"></div>
    <div id="lanes-container" style="height: 100%;">
        <div class="lane"></div><div class="lane"></div><div class="lane"></div><div class="lane"></div>
    </div>
    <div class="grass" style="position: absolute; bottom: 0; width: 100%;"></div>
    <img id="chicken" src="https://img.icons8.com/emoji/96/000000/chicken-emoji.png">
</div>

<div class="controls-panel">
    <div class="bet-display">ውርርድ: <span id="current-bet">10</span> ብር</div>
    <div class="bet-btns">
        <button class="b-btn active" onclick="setBet(10, this)">10</button>
        <button class="b-btn" onclick="setBet(50, this)">50</button>
        <button class="b-btn" onclick="setBet(100, this)">100</button>
    </div>
    <button id="play-btn" onclick="moveUp()">⬆️ ተሻገር!</button>
    <p style="font-size: 12px; color: #777; margin-top: 10px;">መኪና ሳይመታህ ማዶ ካደረስካት ብርህን ታባዛለህ!</p>
</div>

<script>
    let balance = 1000;
    let bet = 10;
    let chickenY = 5;
    let isPlaying = false;
    let gameLoop;
    const chicken = document.getElementById('chicken');
    const balDisplay = document.getElementById('bal');

    function setBet(amt, el) {
        if(isPlaying) return;
        bet = amt;
        document.querySelectorAll('.b-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('current-bet').innerText = amt;
    }

    function moveUp() {
        if(!isPlaying) {
            if(balance < bet) return alert("በቂ ገንዘብ የለህም!");
            balance -= bet;
            isPlaying = true;
            startCars();
            updateUI();
        }

        chickenY += 18;
        chicken.style.bottom = chickenY + "%";

        // ማዶ ከተሻገረች (WIN)
        if(chickenY > 85) {
            setTimeout(() => {
                let winAmt = bet * 2.5;
                balance += winAmt;
                alert("ተሳካ! " + winAmt + " ብር አሸነፍክ!");
                resetGame();
            }, 200);
        }
    }

    function startCars() {
        gameLoop = setInterval(() => {
            if(!isPlaying) return;
            createCar();
        }, 1000);
    }

    function createCar() {
        const car = document.createElement('div');
        car.className = 'car';
        const lanes = [25, 43, 61, 79]; // አስፓልቶቹ
        car.style.bottom = lanes[Math.floor(Math.random() * lanes.length)] + "%";
        car.style.left = "-70px";
        document.getElementById('game-area').appendChild(car);

        let speed = 3 + Math.random() * 5;
        let carMove = setInterval(() => {
            let left = parseInt(car.style.left);
            if(left > window.innerWidth || !isPlaying) {
                clearInterval(carMove);
                car.remove();
            } else {
                car.style.left = (left + speed) + "px";
                checkCollision(car, carMove);
            }
        }, 20);
    }

    function checkCollision(car, interval) {
        let cRect = chicken.getBoundingClientRect();
        let rRect = car.getBoundingClientRect();
        if(!(rRect.left > cRect.right || rRect.right < cRect.left || rRect.top > cRect.bottom || rRect.bottom < cRect.top)) {
            isPlaying = false;
            clearInterval(gameLoop);
            alert("መኪና ገጭቶሃል! ተበላህ።");
            resetGame();
        }
    }

    function resetGame() {
        isPlaying = false;
        clearInterval(gameLoop);
        chickenY = 5;
        chicken.style.bottom = "5px";
        document.querySelectorAll('.car').forEach(c => c.remove());
        updateUI();
    }

    function updateUI() {
        balDisplay.innerText = balance.toFixed(2) + " ETB";
    }

    window.Telegram.WebApp.ready();
</script>

</body>
</html>
