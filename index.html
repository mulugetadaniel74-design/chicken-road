<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Road Fix</title>
    <style>
        body { margin: 0; background: #1a1d21; color: white; text-align: center; font-family: sans-serif; }
        #game-area { width: 100%; height: 300px; background: #333; position: relative; overflow: hidden; border-bottom: 5px solid #222; }
        #chicken { width: 40px; position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 100; }
        .car { width: 50px; height: 30px; position: absolute; background: red; border-radius: 5px; }
        .btn { padding: 15px 30px; font-size: 20px; background: #2ecc71; border: none; color: white; border-radius: 10px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>CHICKEN ROAD</h2>
    <div id="bal">1000 ETB</div>

    <div id="game-area">
        <img id="chicken" src="https://img.icons8.com/emoji/96/000000/chicken-emoji.png">
    </div>

    <button class="btn" onclick="moveChicken()">GO / PLAY</button>

    <script>
        let balance = 1000;
        let step = 0;
        let isPlaying = false;
        const chicken = document.getElementById('chicken');

        function moveChicken() {
            if(!isPlaying) {
                isPlaying = true;
                setInterval(spawnCar, 1000); // መኪና ማምጫ
            }
            step++;
            chicken.style.bottom = (step * 50) + "px";
            if(step >= 5) { alert("አሸነፍክ!"); location.reload(); }
        }

        function spawnCar() {
            const car = document.createElement('div');
            car.className = 'car';
            car.style.left = "-60px";
            car.style.bottom = (Math.floor(Math.random() * 4 + 1) * 50) + "px";
            document.getElementById('game-area').appendChild(car);

            let move = setInterval(() => {
                let x = parseInt(car.style.left);
                if(x > window.innerWidth) { clearInterval(move); car.remove(); }
                else {
                    car.style.left = (x + 5) + "px";
                    // መጋጨታቸውን ማረጋገጫ
                    let c = chicken.getBoundingClientRect();
                    let r = car.getBoundingClientRect();
                    if(!(r.left > c.right || r.right < c.left || r.top > c.bottom || r.bottom < c.top)) {
                        alert("ተገጨህ!"); location.reload();
                    }
                }
            }, 20);
        }
    </script>
</body>
</html>
