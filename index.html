<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHICKEN KENO ROYAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #121212; --card: #1e1e1e; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; --white: #ffffff; }
        body { background-color: var(--dark); color: var(--white); text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        .header { background: var(--card); padding: 15px; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .balance-box { border: 2px solid var(--gold); display: inline-block; padding: 10px 25px; border-radius: 15px; margin: 10px 0; background: #000; font-size: 20px; font-weight: bold; color: var(--gold); }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; max-width: 450px; margin: 15px auto; padding: 10px; }
        .num { background: #2c2c2c; border: 1px solid #444; padding: 12px 0; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .selected { background: var(--blue) !important; color: white; transform: scale(1.1); }
        .hit { background: var(--gold) !important; color: black; box-shadow: 0 0 10px var(--gold); }
        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 10px; }
        .action-btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; min-width: 120px; }
        .draw-btn { background: var(--green); color: white; width: 80%; max-width: 400px; font-size: 20px; }
        .dep-btn { background: var(--blue); color: white; }
        .wit-btn { background: var(--red); color: white; }
        .adm-btn { background: #555; color: white; font-size: 12px; }
        input { background: #000; color: var(--gold); border: 2px solid var(--gold); padding: 8px; width: 70px; text-align: center; border-radius: 8px; font-size: 16px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); padding-top: 60px; }
        .modal-content { background: var(--card); margin: auto; padding: 20px; border: 1px solid var(--gold); width: 85%; border-radius: 15px; text-align: left; line-height: 1.6; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; color:var(--gold);">🎰 CHICKEN KENO</h2>
    <div style="font-size:12px; color:#888;">መለያ (ID): <span id="myID" style="color:var(--gold); font-weight:bold;">...</span></div>
    <div class="balance-box">💰 <span id="balance">0.00</span> ETB</div>
</div>

<div style="margin: 15px;">ወራጅ (Bet): <input type="number" id="betAmount" value="15" min="5"></div>

<div class="grid" id="grid"></div>

<button class="action-btn draw-btn" onclick="startDraw()">ይጀምር (DRAW)</button>

<div class="btn-group">
    <button class="action-btn dep-btn" onclick="showModal('depModal')">Deposit 📥</button>
    <button class="action-btn wit-btn" onclick="showModal('witModal')">Withdraw 📤</button>
    <button class="action-btn adm-btn" onclick="adminAddMoney()">Admin ⚙️</button>
</div>

<div id="depModal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--blue); border-bottom: 1px solid #444;">ብር ለማስገባት (Deposit)</h3>
        <p>📱 <b>Telebirr:</b> <span style="color:var(--gold)">0986980130</span></p>
        <p>🏦 <b>Abyssinia:</b> <span style="color:var(--gold)">153682704</span></p>
        <p>👤 <b>Name:</b> DANIEL M.</p>
        <p>የላኩበትን Screenshot እና የረሶን ID ለ <b>@Godis1256</b> ይላኩ።</p>
        <button onclick="closeModal('depModal')" style="background:var(--red); color:white; padding:12px; border:none; border-radius:5px; width:100%; font-weight:bold;">ዝጋ</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA",
        authDomain: "chickenkeno-c41fa.firebaseapp.com",
        projectId: "chickenkeno-c41fa",
        databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com",
        storageBucket: "chickenkeno-c41fa.appspot.com",
        messagingSenderId: "423384148862",
        appId: "1:423384148862:web:99e9faebe83982f95be12f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const BOT_TOKEN = "8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw";
    const CHAT_ID = "7313437942";

    let uID = localStorage.getItem('keno_user_id') || "USER-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('keno_user_id', uID);
    document.getElementById('myID').innerText = uID;

    // አዲስ ተጠቃሚ መመዝገብ
    db.ref('users/' + uID).once('value', (snap) => {
        if (!snap.exists()) {
            db.ref('users/' + uID).set({ balance: 50 });
        }
    });

    db.ref('users/' + uID + '/balance').on('value', (snap) => {
        document.getElementById('balance').innerText = (snap.val() || 0).toFixed(2);
    });

    const grid = document.getElementById('grid');
    let selected = [];
    for (let i = 1; i <= 80; i++) {
        let d = document.createElement('div');
        d.className = 'num'; d.id = 'n' + i; d.innerText = i;
        d.onclick = function() {
            if (this.classList.contains('selected')) {
                this.classList.remove('selected');
                selected = selected.filter(n => n !== i);
            } else if (selected.length < 10) {
                this.classList.add('selected');
                selected.push(i);
            }
        };
        grid.appendChild(d);
    }

    // *** ዋናው የተስተካከለ startDraw ክፍል ***
    function startDraw() {
        if (selected.length === 0) return alert("ቁጥር ይምረጡ!");
        let bet = parseFloat(document.getElementById('betAmount').value);
        db.ref('users/' + uID + '/balance').once('value', (s) => {
            let bal = s.val() || 0;
            if (bal < bet) return alert("በቂ ብር የለም!");
            
            db.ref('users/' + uID).update({ balance: bal - bet });
            document.querySelectorAll('.num').forEach(n => n.classList.remove('hit'));
            
            let drawn = []; let hits = 0;
            let intv = setInterval(() => {
                let r = Math.floor(Math.random() * 80) + 1;
                if(!drawn.includes(r)) {
                    drawn.push(r);
                    document.getElementById('n' + r).classList.add('hit');
                    if (selected.includes(r)) hits++;
                    if (drawn.length === 20) {
                        clearInterval(intv);
                        let winTable = [0, 0, 0, bet*2, bet*5, bet*10, bet*20, bet*50, bet*100, bet*500, bet*1000];
                        let win = winTable[hits] || 0;
                        db.ref('users/' + uID).update({ balance: (bal - bet + win) });

                        // ለቴሌግራም ሪፖርት መላክ
                        let status = (win > 0) ? "💰 አሸንፏል!" : "❌ ተበልቷል!";
                        let reportMsg = `🕹 *Game Report*\n\n👤 User: \`${uID}\`\n💵 Bet: *${bet} ETB*\n🎯 Hits: *${hits}*\n💰 Win: *${win} ETB*\n📝 Status: ${status}`;
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(reportMsg)}&parse_mode=Markdown`);

                        alert("Hits: " + hits + " | Win: " + win + " ETB");
                    }
                }
            }, 100);
        });
    }

    function adminAddMoney() {
        if (prompt("Admin Password:") === "1234") {
            let id = prompt("User ID (ለምሳሌ USER-4173):");
            let amt = parseFloat(prompt("የሚጨመር ብር:"));
            if (!id || isNaN(amt)) return;
            db.ref('users/' + id + '/balance').once('value', (s) => {
                let current = s.val() || 0;
                db.ref('users/' + id).update({ balance: current + amt }).then(() => {
                    alert("ለ " + id + " " + amt + " ብር ተጨምሯል!");
                    location.reload(); 
                });
            });
        }
    }

    function showModal(id) { document.getElementById(id).style.display = "block"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }
</script>
</body>
</html>
