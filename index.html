<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chicken & Keno Pro</title>
    <style>
        body { margin: 0; background: #1a1d21; color: white; font-family: sans-serif; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-between; padding: 12px; background: #24292e; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .balance { color: #2ecc71; font-weight: bold; font-size: 18px; }
        
        /* Tabs */
        .tabs { display: flex; background: #1a1d21; border-bottom: 1px solid #333; }
        .tab { flex: 1; padding: 15px; border: none; background: none; color: #888; font-weight: bold; cursor: pointer; }
        .tab.active { color: #2ecc71; border-bottom: 3px solid #2ecc71; }

        /* Chicken Game */
        #chicken-game { height: 40vh; background: #2c313a; position: relative; overflow: hidden; display: block; }
        #chicken { width: 45px; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); z-index: 10; transition: 0.3s; }
        .car { width: 55px; height: 30px; position: absolute; border-radius: 4px; }

        /* Keno Game */
        #keno-game { display: none; padding: 15px; background: #1a1d21; }
        .keno-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; margin-bottom: 20px; }
        .keno-num { background: #2c313a; padding: 10px 0; text-align: center; border-radius: 4px; font-size: 12px; cursor: pointer; border: 1px solid #444; }
        .keno-num.selected { background: #2ecc71; color: white; border-color: #2ecc71; }
        .keno-num.hit { background: #f1c40f; color: black; animation: flash 0.5s infinite; }

        /* Controls */
        .controls { padding: 20px; background: #1a1d21; border-top: 1px solid #333; }
        .bet-input { display: flex; align-items: center; background: #24292e; border-radius: 10px; padding: 10px; margin-bottom: 15px; }
        .main-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; }
        #action-btn { background: #2ecc71; color: white; }
        #cashout-btn { background: #f1c40f; color: black; display: none; margin-top: 10px; }

        @keyframes flash { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="top-bar">
    <div style="font-weight: bold;">GAME HUB</div>
    <div class="balance" id="bal-txt">1,000.00 ETB</div>
</div>

<div class="tabs">
    <button id="t-chicken" class="tab active" onclick="switchTab('chicken')">CHICKEN</button>
    <button id="t-keno" class="tab" onclick="switchTab('keno')">KENO</button>
</div>

<div id="chicken-game">
    <img id="chicken" src="https://img.icons8.com/emoji/96/000000/chicken-emoji.png">
</div>

<div id="keno-game">
    <div class="keno-grid" id="keno-grid"></div>
</div>

<div class="controls">
    <div class="bet-input">
        <span style="color:#888; margin-right:10px;">BET:</span>
        <input type="number" id="bet-amount" value="10" style="background:none; border:none; color:white; font-size:18px; width:100%;">
    </div>
    <button id="action-btn" class="main-btn" onclick="handleMainAction()">PLAY</button>
    <button id="cashout-btn" class="main-btn" onclick="cashOut()">CASH OUT</button>
</div>

<script>
    let balance = 1000, bet = 10, step = 0, isPlaying = false, currentGame = 'chicken';
    let selectedKeno = [], trafficInterval;
    const mults = [1.20, 1.80, 2.50, 4.00, 10.00];

    // Create Keno Grid (80 numbers)
    const grid = document.getElementById('keno-grid');
    for(let i=1; i<=80; i++) {
        let n = document.createElement('div');
        n.className = 'keno-num';
        n.innerText = i;
        n.onclick = () => toggleKeno(i, n);
        grid.appendChild(n);
    }

    function toggleKeno(num, el) {
        if(selectedKeno.includes(num)) {
            selectedKeno = selectedKeno.filter(n => n !== num);
            el.classList.remove('selected');
        } else if(selectedKeno.length < 10) {
            selectedKeno.push(num);
            el.classList.add('selected');
        }
    }

    function switchTab(game) {
        currentGame = game;
        document.getElementById('chicken-game').style.display = game === 'chicken' ? 'block' : 'none';
        document.getElementById('keno-game').style.display = game === 'keno' ? 'block' : 'none';
        document.getElementById('t-chicken').classList.toggle('active', game === 'chicken');
        document.getElementById('t-keno').classList.toggle('active', game === 'keno');
        resetAll();
    }

    function handleMainAction() {
        bet = parseFloat(document.getElementById('bet-amount').value);
        if(balance < bet) return alert("በቂ ብር የለህም!");

        if(currentGame === 'chicken') {
            if(!isPlaying) {
                balance -= bet; isPlaying = true;
                document.getElementById('action-btn').innerText = "GO";
                document.getElementById('cashout-btn').style.display = "block";
                trafficInterval = setInterval(spawnCar, 1000);
            } else {
                step++;
                document.getElementById('chicken').style.bottom = (step * 20) + "%";
                document.getElementById('cashout-btn').innerText = `CASH OUT (${(bet * mults[step-1]).toFixed(2)})`;
                if(step >= 5) { win(bet * mults[4]); }
            }
        } else {
            if(selectedKeno.length < 1) return alert("ቢያንስ 1 ቁጥር ምረጥ!");
            balance -= bet;
            playKeno();
        }
        updateUI();
    }

    function playKeno() {
        let draw = [];
        while(draw.length < 20) {
            let r = Math.floor(Math.random() * 80) + 1;
            if(!draw.includes(r)) draw.push(r);
        }
        
        let hits = selectedKeno.filter(n => draw.includes(n)).length;
        alert(`የወጡት ቁጥሮች: ${draw.slice(0,5).join(", ")} ...\n${hits} ቁጥሮች ገጥመውልሃል!`);
        
        if(hits > 0) {
            let winAmt = bet * (hits * 1.5);
            balance += winAmt;
            alert(`${winAmt.toFixed(2)} ETB አሸነፍክ!`);
        }
        updateUI();
    }

    function spawnCar() {
        const car = document.createElement('div');
        car.className = 'car';
        car.style.background = ["#e74c3c", "#f1c40f", "#3498db"][Math.floor(Math.random()*3)];
        car.style.bottom = [20, 40, 60, 80][Math.floor(Math.random()*4)] + "%";
        car.style.left = "-60px";
        document.getElementById('chicken-game').appendChild(car);
        
        let move = setInterval(() => {
            let x = parseInt(car.style.left || -60);
            if(x > window.innerWidth || !isPlaying) { clearInterval(move); car.remove(); }
            else {
                car.style.left = (x + 6) + "px";
                let cp = document.getElementById('chicken').getBoundingClientRect();
                let rp = car.getBoundingClientRect();
                if(!(rp.left > cp.right || rp.right < cp.left || rp.top > cp.bottom || rp.bottom < cp.top)) {
                    isPlaying = false; alert("ተበላህ!"); resetAll();
                }
            }
        }, 20);
    }

    function cashOut() { win(bet * mults[step-1]); }

    function win(amt) {
        balance += amt;
        alert(`እንኳን ደስ አለህ! ${amt.toFixed(2)} ETB አሸነፍክ!`);
        resetAll();
    }

    function resetAll() {
        isPlaying = false; step = 0; clearInterval(trafficInterval);
        document.getElementById('chicken').style.bottom = "5px";
        document.getElementById('action-btn').innerText = "PLAY";
        document.getElementById('cashout-btn').style.display = "none";
        document.querySelectorAll('.car').forEach(c => c.remove());
        updateUI();
    }

    function updateUI() { document.getElementById('bal-txt').innerText = balance.toFixed(2) + " ETB"; }
</script>
</body>
</html>
