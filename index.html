<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENO ROYAL</title>
    <style>
        body { font-family: Arial; background-color: #12191c; color: white; text-align: center; padding: 20px; }
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; color: #2eb85c; font-weight: bold; }
        .btn { padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; width: 45%; }
        .dep-btn { background: #2eb85c; color: black; text-decoration: none; display: inline-block; }
        .with-btn { background: #3d4449; color: white; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; background: #1c2529; padding: 10px; border-radius: 10px; }
        .number { width: 30px; height: 35px; background: #2c3439; display: flex; align-items: center; justify-content: center; border-radius: 5px; cursor: pointer; border: 1px solid #3d4449; }
        .number.selected { background: #2eb85c; color: black; }
        .number.drawn { background: #f1c40f; color: black; box-shadow: 0 0 10px #f1c40f; }
        .play-btn { background: #2eb85c; color: black; width: 100%; padding: 20px; border-radius: 10px; font-size: 18px; font-weight: bold; margin-top: 20px; border: none; }
    </style>
</head>
<body>
    <div class="header">
        <span>KENO ROYAL</span>
        <span id="balance">0.00 ETB</span>
    </div>
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <a href="https://t.me/RunChickenRunBot?start=deposit" class="btn dep-btn">💰 ዲፖዚት</a>
        <button onclick="goToBot()" class="btn with-btn">💸 ውዝድራው</button>
    </div>
    <div class="grid" id="grid"></div>
    <button class="play-btn" onclick="startDraw()">ውርርድ ተጫወት (20 ETB)</button>

    <script>
        const grid = document.getElementById('grid');
        for (let i = 1; i <= 80; i++) {
            let d = document.createElement('div'); d.className = 'number'; d.innerText = i;
            d.onclick = function() { this.classList.toggle('selected'); };
            grid.appendChild(d);
        }

        function goToBot() {
            // ተጠቃሚው ወደ ቦቱ እንዲሄድና መረጃ እንዲልክ ያደርጋል
            window.location.href = "https://t.me/RunChickenRunBot?start=Withdraw_Request";
        }

        function startDraw() {
            let selected = document.querySelectorAll('.selected');
            if (selected.length === 0) return alert("ቁጥር ይምረጡ!");
            document.querySelectorAll('.number').forEach(n => n.classList.remove('drawn'));
            let count = 0, hits = 0;
            let inv = setInterval(() => {
                let r = Math.floor(Math.random() * 80) + 1;
                let n = document.querySelectorAll('.number')[r-1];
                n.classList.add('drawn');
                if (n.classList.contains('selected')) hits++;
                count++;
                if (count >= 20) {
                    clearInterval(inv);
                    let win = hits > 2 ? 40 : 0; // ለምሳሌ በ 2 ሲባዛ
                    if (win > 1500) win = 1500; // ከፍተኛ ማሸነፊያ 1500
                    if (win > 0) alert("እንኳን ደስ አለዎት! " + win + " ብር አሸንፈዋል። ውዝድራው በመንካት ለቦቱ ይላኩ።");
                }
            }, 200);
        }
    </script>
</body>
</html>
