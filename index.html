<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENO ROYAL PRO</title>
    <style>
        :root { --gold: #ffc40f; --dark: #121212; --card: #1e1e1e; --green: #2ecc71; --white: #ffffff; --blue: #3498db; }
        body { background-color: var(--dark); color: var(--white); text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .header { background: var(--card); padding: 15px; border-radius: 15px; border-bottom: 4px solid var(--gold); margin-bottom: 10px; }
        .balance-display { font-size: 24px; font-weight: bold; color: var(--gold); border: 2px solid var(--gold); display: inline-block; padding: 8px 25px; border-radius: 30px; margin: 5px 0; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-width: 450px; margin: 10px auto; }
        .num { background: #333; border: 1px solid #444; padding: 12px 0; cursor: pointer; font-weight: bold; border-radius: 5px; font-size: 14px; transition: 0.2s; }
        .selected { background: var(--blue) !important; transform: scale(1.05); box-shadow: 0 0 10px var(--blue); }
        .winner { background: var(--gold) !important; color: black !important; animation: pop 0.3s ease; }
        .matched { background: var(--green) !important; color: white !important; border: 2px solid white; box-shadow: 0 0 15px var(--green); }
        @keyframes pop { 0% { transform: scale(0.7); } 100% { transform: scale(1); } }
        .bet-box, .withdraw-section { background: var(--card); padding: 15px; border-radius: 15px; margin-top: 10px; border: 1px solid #444; }
        input { background: #000; color: var(--gold); border: 1px solid var(--gold); padding: 8px; width: 80px; text-align: center; border-radius: 5px; font-size: 18px; }
        .action-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; margin: 5px 0; transition: 0.3s; }
        .dep-btn { background: #e67e22; color: white; }
        .with-btn { background: #c0392b; color: white; }
        .draw-btn { background: var(--green); color: white; font-size: 18px; }
        .action-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; color:var(--gold);">🎰 KENO ROYAL PRO 🎰</h2>
        <div class="balance-display">💰 <span id="balance">0.00</span> ETB</div>
    </div>

    <div class="bet-box">
        መወራረድ (ሚኒመም 15): <input type="number" id="betAmount" value="15" min="15">
    </div>

    <div class="grid" id="grid"></div>

    <button class="action-btn draw-btn" onclick="draw()">ይጀምር (DRAW)</button>
    <button onclick="requestDeposit()" class="action-btn dep-btn">💳 ብር አስገባ / DEPOSIT</button>

    <div class="withdraw-section">
        <h3>💸 ብር አውጣ (WITHDRAW)</h3>
        <input type="number" id="withAmount" value="300" min="300"><br>
        <button class="action-btn with-btn" onclick="requestWithdraw()">ብር አውጣ</button>
    </div>

    <script>
        const botToken = '8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw';
        const chatId = '7313437942';

        let currentBalance = 0.00; 
        let selected = [];
        const grid = document.getElementById('grid');

        // ቁጥሮቹን መፍጠር
        for (let i = 1; i <= 80; i++) {
            let d = document.createElement('div');
            d.className = 'num'; d.id = 'n' + i; d.innerText = i;
            d.onclick = function() {
                if (this.classList.contains('selected')) {
                    this.classList.remove('selected');
                    selected = selected.filter(n => n !== i);
                } else if (selected.length < 10) {
                    this.classList.add('selected');
                    selected.push(i);
                }
            };
            grid.appendChild(d);
        }

        function sendToTelegram(message) {
            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=HTML`;
            fetch(url).then(res => {
                if(res.ok) alert("ጥያቄዎ ለአስተዳዳሪው ተልኳል!");
            });
        }

        function requestDeposit() {
            sendToTelegram("<b>📥 የዴፖዚት ጥያቄ</b>\nአንድ ተጠቃሚ ብር ማስገባት ይፈልጋል።");
        }

        function requestWithdraw() {
            let amt = document.getElementById('withAmount').value;
            if (amt >= 300) {
                let phone = prompt("ብር የሚላክበትን ስልክ ቁጥር ያስገቡ፦");
                if (phone) {
                    sendToTelegram(`<b>💸 የውዝድሮው ጥያቄ</b>\n<b>መጠን:</b> ${amt} ETB\n<b>ስልክ:</b> ${phone}`);
                }
            } else { alert("ዝቅተኛው ማውጫ 300 ብር ነው!"); }
        }

        function draw() {
            let bet = parseFloat(document.getElementById('betAmount').value);
            if (selected.length === 0) { alert("እባክዎ ቁጥር ይምረጡ!"); return; }
            if (currentBalance < bet) { alert("በቂ ባላንስ የሎትም! መጀመሪያ ዴፖዚት ያድርጉ።"); return; }

            currentBalance -= bet;
            updateUI();

            document.querySelectorAll('.num').forEach(n => n.classList.remove('winner', 'matched'));

            let winners = [];
            while (winners.length < 20) {
                let r = Math.floor(Math.random() * 80) + 1;
                if (!winners.includes(r)) winners.push(r);
            }

            winners.forEach((n, i) => {
                setTimeout(() => {
                    let el = document.getElementById('n' + n);
                    el.classList.add('winner');
                    if (selected.includes(n)) el.classList.add('matched');
                    if (i === 19) checkWin(winners, bet);
                }, i * 100);
            });
        }

        function checkWin(winNums, bet) {
            let matches = selected.filter(n => winNums.includes(n)).length;
            let multiplier = 0;

            // የአሸናፊነት ህግ (እንደ ፍላጎትህ መቀየር ትችላለህ)
            if (matches === 2) multiplier = 2;
            if (matches === 3) multiplier = 5;
            if (matches === 4) multiplier = 20;
            if (matches >= 5) multiplier = 100;

            if (multiplier > 0) {
                let winAmt = bet * multiplier;
                currentBalance += winAmt;
                alert(`እንኳን ደስ አለዎት! ${matches} ቁጥሮች ገጥመው ${winAmt} ብር አሸንፈዋል! (x${multiplier})`);
            } else {
                alert("ለጥቂት አልገጠመም! ድጋሚ ይሞክሩ።");
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').innerText = currentBalance.toFixed(2);
        }
    </script>
</body>
</html>
