<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHICKEN KENO ROYAL - PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #0a0a0a; --card: #161616; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; --white: #ffffff; }
        body { background-color: var(--dark); color: var(--white); text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding-bottom: 50px; }
        .header { background: var(--card); padding: 15px; border-bottom: 3px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .balance-box { border: 2px solid var(--gold); display: inline-block; padding: 8px 20px; border-radius: 12px; background: #000; font-size: 20px; color: var(--gold); font-weight: bold; }
        .timer-container { margin: 15px; background: #222; display: inline-block; padding: 10px 30px; border-radius: 50px; border: 2px solid var(--red); }
        .timer-text { font-size: 28px; font-weight: bold; color: var(--red); }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; max-width: 420px; margin: 10px auto; padding: 10px; background: #1a1a1a; border-radius: 10px; }
        .num { background: #333; border: 1px solid #444; padding: 12px 0; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .selected { background: var(--blue) !important; transform: scale(0.9); }
        .hit { background: var(--gold) !important; color: #000; box-shadow: 0 0 15px var(--gold); }
        .winner-announcement { background: rgba(46, 204, 113, 0.2); color: var(--green); padding: 10px; margin: 10px auto; max-width: 400px; border-radius: 8px; border: 1px dashed var(--green); display: none; }
        .btn-pay { width: 45%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); }
        .modal-content { background: var(--card); margin: 15% auto; padding: 25px; width: 85%; border-radius: 15px; border: 1px solid var(--gold); text-align: left; }
        input, select { width: 90%; padding: 12px; margin: 10px 0; background: #000; color: var(--gold); border: 1px solid var(--gold); border-radius: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; color:var(--gold);">🎰 CHICKEN KENO ROYAL</h2>
    <div class="balance-box">💰 <span id="balance">0.00</span> ETB</div>
    <p style="font-size:12px; margin:5px 0 0 0;">ID: <span id="myID" style="color:var(--gold);">...</span></p>
</div>

<div class="winner-announcement" id="winnerBox">🎉 እንኳን ደስ አለዎት! <span id="winnerInfo"></span></div>

<div class="timer-container">
    <div style="font-size:12px; color:#aaa;">ቀጣይ ጨዋታ በ</div>
    <div class="timer-text" id="timerDisplay">01:00</div>
</div>

<div class="grid" id="grid"></div>

<div style="margin:15px;">
    ወራጅ መጠን: <input type="number" id="betAmount" value="15" min="15" style="width:70px; text-align:center;">
    <button onclick="buyTicket()" style="background:var(--green); color:white; padding:15px 40px; border:none; border-radius:10px; font-weight:bold; font-size:18px; width:90%; margin-top:10px;">ትኬት ቁረጥ (BUY)</button>
</div>

<div style="display:flex; justify-content:center; gap:10px; margin-bottom:20px;">
    <button onclick="showModal('depModal')" class="btn-pay" style="background:var(--blue);">Deposit 📥</button>
    <button onclick="showModal('witModal')" class="btn-pay" style="background:var(--red);">Withdraw 📤</button>
</div>

<button onclick="adminAction()" style="background:#333; border:none; color:#777; padding:5px 15px; border-radius:5px;">Admin ⚙️</button>

<div id="depModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--gold); border-bottom:1px solid #333;">ብር ለማስገባት (Deposit)</h3>
    <p>1. በነዚህ አካውንቶች ይክፈሉ:<br>
       - Telebirr: <b>0986980130</b><br>
       - Abyssinia: <b>153682704</b></p>
    <p>2. የከፈሉበትን <b>ስክሪንሹት</b> እና የእርሶን <b>ID: <span class="u-id-text"></span></b> ለቴሌግራም ባለቤቱ <b>@Godis1256</b> ይላኩ።</p>
    <p style="color:var(--red);">* ዝቅተኛ የዲፖዚት መጠን 100 ETB ነው።</p>
    <button onclick="closeModal('depModal')" style="background:var(--red); color:white; width:100%; padding:12px; border:none; border-radius:8px;">ዝጋ</button>
</div></div>

<div id="witModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--gold);">ብር ለማውጣት (Withdraw)</h3>
    <input type="number" id="witAmt" placeholder="መጠን (Min 300)">
    <input type="text" id="witBank" placeholder="ባንክ እና ስልክ ቁጥር">
    <button onclick="requestWithdraw()" style="background:var(--green); color:white; width:100%; padding:15px; border:none; border-radius:8px; font-weight:bold;">ጥያቄ ላክ</button>
    <button onclick="closeModal('witModal')" style="background:#444; color:white; width:100%; padding:10px; border:none; border-radius:8px; margin-top:10px;">ተመለስ</button>
</div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA",
        authDomain: "chickenkeno-c41fa.firebaseapp.com",
        projectId: "chickenkeno-c41fa",
        databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com",
        storageBucket: "chickenkeno-c41fa.appspot.com",
        messagingSenderId: "423384148862",
        appId: "1:423384148862:web:99e9faebe83982f95be12f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const BOT_TOKEN = "8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw";
    const CHAT_ID = "7313437942";

    let uID = localStorage.getItem('keno_user_id') || "USER-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('keno_user_id', uID);
    document.getElementById('myID').innerText = uID;
    document.querySelectorAll('.u-id-text').forEach(el => el.innerText = uID);

    // Register user if not exists
    db.ref('users/' + uID).once('value', s => { if(!s.exists()) db.ref('users/' + uID).set({balance: 0}); });
    db.ref('users/' + uID + '/balance').on('value', s => document.getElementById('balance').innerText = (s.val() || 0).toFixed(2));

    const grid = document.getElementById('grid');
    let selectedNums = [];
    for(let i=1; i<=80; i++) {
        let d = document.createElement('div');
        d.className='num'; d.id='n'+i; d.innerText=i;
        d.onclick=()=>{ d.classList.toggle('selected'); toggleNum(i); };
        grid.appendChild(d);
    }

    function toggleNum(n) {
        if(selectedNums.includes(n)) selectedNums = selectedNums.filter(x => x !== n);
        else if(selectedNums.length < 10) selectedNums.push(n);
    }

    let currentBet = 0;
    function buyTicket() {
        let amt = parseFloat(document.getElementById('betAmount').value);
        if(amt < 15) return alert("ዝቅተኛ ወራጅ 15 ብር ነው!");
        if(selectedNums.length < 2) return alert("ቢያንስ 2 ቁጥር ይምረጡ!");
        
        db.ref('users/' + uID + '/balance').once('value', s => {
            let bal = s.val() || 0;
            if(bal < amt) return alert("በቂ ብር የለም!");
            db.ref('users/' + uID).update({balance: bal - amt});
            currentBet = amt;
            alert("ትኬት ተቆርጧል!");
        });
    }

    let timeLeft = 60;
    setInterval(() => {
        timeLeft--;
        document.getElementById('timerDisplay').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
        if(timeLeft <= 0) { runDraw(); timeLeft = 60; }
    }, 1000);

    async function runDraw() {
        document.querySelectorAll('.num').forEach(n => n.classList.remove('hit'));
        let drawn = [];
        while(drawn.length < 20) {
            let r = Math.floor(Math.random()*80)+1;
            if(!drawn.includes(r)) drawn.push(r);
        }
        drawn.forEach(n => document.getElementById('n'+n).classList.add('hit'));

        if(selectedNums.length > 0) {
            let hits = selectedNums.filter(n => drawn.includes(n)).length;
            let multiplier = [0, 0, 2, 5, 10, 25, 50, 100, 200, 500, 1000][hits] || 0;
            let win = currentBet * multiplier;

            let status = win > 0 ? "💰 አሸንፏል (WON)" : "📉 ተበልቷል (LOST)";
            let log = `${status}\n🆔 ID: ${uID}\n💵 Bet: ${currentBet}\n🏆 Win: ${win}\n🎯 Hits: ${hits}`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(log)}`);

            if(win > 0) {
                db.ref('users/' + uID + '/balance').once('value', s => db.ref('users/' + uID).update({balance: (s.val()||0) + win}));
                showWinner(uID, win);
            }
            selectedNums = []; document.querySelectorAll('.num').forEach(n => n.classList.remove('selected'));
        }
    }

    function showWinner(id, amt) {
        let box = document.getElementById('winnerBox');
        document.getElementById('winnerInfo').innerText = `${id} በ ${amt} ETB አሸንፏል!`;
        box.style.display = "block";
        setTimeout(() => box.style.display = "none", 10000);
    }

    function requestWithdraw() {
        let amt = parseFloat(document.getElementById('witAmt').value);
        let info = document.getElementById('witBank').value;
        if(amt < 300) return alert("ዝቅተኛ ማውጫ 300 ብር ነው!");
        db.ref('users/' + uID + '/balance').once('value', s => {
            let bal = s.val() || 0;
            if(bal < amt) return alert("በቂ ብር የለም!");
            let msg = `📤 *Withdraw Request*\nID: ${uID}\nAmount: ${amt} ETB\nInfo: ${info}`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            db.ref('users/' + uID).update({balance: bal - amt});
            alert("ጥያቄው ተልኳል!"); closeModal('witModal');
        });
    }

    function adminAction() {
        if(prompt("Admin Password:") === "1234") {
            let id = prompt("Target ID:");
            let amt = parseFloat(prompt("Add Amount:"));
            db.ref('users/' + id).once('value', s => {
                if(s.exists()) {
                    db.ref('users/' + id).update({balance: (s.val().balance || 0) + amt});
                    alert("ተሳክቷል!");
                } else alert("User አልተገኘም!");
            });
        }
    }

    function showModal(id) { document.getElementById(id).style.display = "block"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }
</script>
</body>
</html>
