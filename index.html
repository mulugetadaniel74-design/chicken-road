<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANIEL KENO ROYAL - OFFICIAL v3</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #0a0a0a; --card: #161616; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { background-color: var(--dark); color: white; text-align: center; font-family: sans-serif; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        /* UI Elements */
        .header { background: #1a1a1a; padding: 15px; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .balance-box { border: 2px solid var(--gold); display: inline-block; padding: 10px 25px; border-radius: 50px; font-size: 24px; color: var(--gold); font-weight: bold; background: #000; box-shadow: 0 0 15px var(--gold); }
        .timer { font-size: 3.5rem; font-weight: bold; color: var(--red); margin: 10px 0; text-shadow: 0 0 10px var(--red); }

        /* Odds Table */
        .odds-card { background: #111; margin: 10px; padding: 10px; border-radius: 10px; border: 1px solid #333; font-size: 0.8rem; }
        table { width: 100%; border-collapse: collapse; }
        th { color: var(--gold); border-bottom: 1px solid #333; padding: 5px; }
        td { padding: 5px; border-bottom: 1px solid #222; }

        /* Keno Grid */
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: #111; padding: 10px; border-radius: 10px; margin: 10px; border: 1px solid #333; }
        .num { background: #333; border: 1px solid #444; padding: 12px 0; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; position: relative; }
        .selected { background: var(--blue) !important; color: white; box-shadow: 0 0 10px var(--blue); }
        .hit { background: var(--gold) !important; color: black; box-shadow: 0 0 20px var(--gold); transform: scale(1.1); z-index: 2; }
        .my-hit::after { content: "✅"; position: absolute; top: -8px; right: -5px; font-size: 14px; }

        /* Buttons & Panels */
        .btn-main { width: 90%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; background: var(--green); color: white; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4); }
        .btn-action { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 45%; color: white; margin: 5px; }
        .panel { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #333; text-align: left; margin: 10px; }
        .ticket-item { background: #222; padding: 12px; border-radius: 8px; margin-top: 8px; border-left: 5px solid var(--blue); }

        /* Modals */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
        .modal-content { background: var(--card); margin: 10% auto; padding: 25px; width: 85%; border-radius: 20px; border: 1px solid var(--gold); text-align: center; max-width: 400px; }
        .input-field { width: 100%; background: #000; color: var(--gold); border: 1px solid #444; padding: 12px; border-radius: 8px; margin-top: 10px; box-sizing: border-box; font-size: 1rem; }

        /* Win Animation Overlay */
        #winOverlay { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(46, 204, 113, 0.95); color: white; padding: 40px; border-radius: 25px; z-index: 2000; font-size: 2.5rem; font-weight: bold; border: 5px solid white; box-shadow: 0 0 50px var(--green); text-align: center; animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: translate(-50%, -50%) scale(0); } to { transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>

<div id="winOverlay">YOU WIN! 🎉<br><span id="winAmount" style="font-size:1.5rem; color:var(--gold);"></span></div>

<div class="header">
    <h2 style="margin:0; color:var(--gold);">DANIEL KENO ROYAL</h2>
    <div class="balance-box">💰 <span id="balance">0.00</span> ETB</div>
    <div style="font-size:12px; color:#888; margin-top:5px;">User ID: <span id="myID" style="color:var(--gold);">...</span></div>
</div>

<div class="timer" id="timerDisplay">01:00</div>

<div class="odds-card">
    <table>
        <tr><th>Hits</th><th>2</th><th>3</th><th>4</th><th>5</th><th>10</th></tr>
        <tr><td>Odd</td><td>x10</td><td>x25</td><td>x50</td><td>x100</td><td>x5000</td></tr>
    </table>
</div>

<div class="grid" id="grid"></div>

<div style="padding: 15px; background: #1a1a1a; margin: 10px; border-radius: 15px;">
    መወራረጃ: <input type="number" id="betAmount" value="15" min="15" style="width:70px; background:#000; color:var(--gold); border:1px solid var(--gold); padding:8px; border-radius:8px; text-align:center; font-weight:bold;">
    <button onclick="buyTicket()" class="btn-main" style="margin-top:10px;">ትኬት ቁረጥ (PLACE BET)</button>
</div>

<div style="display:flex; justify-content:center; padding:10px;">
    <button onclick="showModal('depModal')" class="btn-action" style="background:var(--blue);">Deposit 📥</button>
    <button onclick="showModal('witModal')" class="btn-action" style="background:var(--red);">Withdraw 📤</button>
</div>

<div class="panel">
    <h4 style="margin:0; color:var(--gold); border-bottom: 1px solid #333; padding-bottom:5px;">🎫 የእርስዎ ትኬቶች</h4>
    <div id="activeTicketsList" style="margin-top:10px; font-size:0.9rem;">ትኬት አልቆረጡም...</div>
</div>

<button onclick="adminAction()" style="background:transparent; color:#333; border:none; padding:10px; cursor:pointer;">Admin Panel ⚙️</button>

<div id="depModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--blue);">📥 ብር ለማስገባት (Min 100)</h3>
    <div style="text-align:left; background:#000; padding:15px; border-radius:10px; font-size:1rem; border:1px solid #333; line-height:1.6;">
        📌 <b>Telebirr:</b> <span style="color:var(--gold);">0986980130</span><br>
        📌 <b>Abyssinia:</b> <span style="color:var(--gold);">153682704</span><br>
        👤 ስም: <b>Daniel Mulugeta</b>
    </div>
    <p style="font-size:12px; color:#888; margin-top:15px;">የከፈሉበትን ደረሰኝ (Screenshot) ይላኩ:</p>
    <input type="file" id="receiptFile" accept="image/*" class="input-field">
    <button onclick="sendReceipt()" id="uploadBtn" style="background:var(--green); color:white; border:none; padding:15px; border-radius:10px; width:100%; font-weight:bold; margin-top:15px;">ደረሰኝ ላክ</button>
    <button onclick="closeModal('depModal')" style="background:#444; color:white; width:100%; padding:10px; border:none; border-radius:10px; margin-top:10px;">ዝጋ</button>
</div></div>

<div id="witModal" class="modal"><div class="modal-content">
    <h3 style="color:var(--red);">📤 ብር ለማውጣት (Min 300)</h3>
    <input type="number" id="witAmt" class="input-field" placeholder="የሚወጣ መጠን (Min 300)">
    <input type="text" id="witName" class="input-field" placeholder="ሙሉ ስም">
    <input type="text" id="witAccount" class="input-field" placeholder="የአካውንት ቁጥር">
    <select id="witBank" class="input-field">
        <option value="Telebirr">Telebirr</option>
        <option value="Abyssinia Bank">Abyssinia Bank</option>
        <option value="CBE">CBE (ንግድ ባንክ)</option>
    </select>
    <button onclick="requestWithdraw()" style="background:var(--green); color:white; width:100%; padding:15px; border:none; border-radius:12px; font-weight:bold; margin-top:15px;">ጥያቄ ላክ</button>
    <button onclick="closeModal('witModal')" style="background:#444; color:white; width:100%; padding:10px; border:none; border-radius:10px; margin-top:10px;">ተመለስ</button>
</div></div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA",
        authDomain: "chickenkeno-c41fa.firebaseapp.com",
        projectId: "chickenkeno-c41fa",
        databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com",
        storageBucket: "chickenkeno-c41fa.appspot.com",
        messagingSenderId: "423384148862",
        appId: "1:423384148862:web:99e9faebe83982f95be12f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const BOT_TOKEN = "8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw";
    const CHAT_ID = "7313437942";

    let uID = localStorage.getItem('keno_user_id') || "USER-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('keno_user_id', uID);
    document.getElementById('myID').innerText = uID;

    // Balance Listener
    db.ref('users/' + uID + '/balance').on('value', s => document.getElementById('balance').innerText = (s.val() || 0).toFixed(2));

    // Keno Grid Creation
    const grid = document.getElementById('grid');
    let selectedNums = [], activeBets = [];

    for(let i=1; i<=80; i++) {
        let d = document.createElement('div'); d.className='num'; d.id='n'+i; d.innerText=i;
        d.onclick=()=>{ 
            if(d.classList.contains('selected')){ d.classList.remove('selected'); selectedNums = selectedNums.filter(x => x !== i); }
            else if(selectedNums.length < 10){ d.classList.add('selected'); selectedNums.push(i); }
        };
        grid.appendChild(d);
    }

    function buyTicket() {
        let amt = parseFloat(document.getElementById('betAmount').value);
        if(amt < 15 || selectedNums.length < 2) return alert("ቢያንስ 2 ቁጥር ይምረጡ!");
        db.ref('users/' + uID + '/balance').once('value', s => {
            let bal = s.val() || 0;
            if(bal < amt) return alert("በቂ ብር የለም!");
            db.ref('users/' + uID).update({balance: bal - amt});
            activeBets.push({nums: [...selectedNums], bet: amt});
            renderTickets();
            selectedNums = [];
            document.querySelectorAll('.num').forEach(n => n.classList.remove('selected'));
        });
    }

    function renderTickets(drawn = []) {
        let list = document.getElementById('activeTicketsList');
        if(activeBets.length === 0) { list.innerHTML = "ትኬት አልቆረጡም..."; return; }
        list.innerHTML = activeBets.map(t => {
            let hits = t.nums.filter(n => drawn.includes(n)).length;
            return `<div class="ticket-item">💰 ${t.bet} ETB | ቁጥሮች: ${t.nums.join(', ')} <br><b>Hits: ${hits}</b></div>`;
        }).join('');
    }

    // Timer & Game Loop
    let timeLeft = 60, isDrawing = false;
    setInterval(() => {
        if(isDrawing) return;
        timeLeft--;
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById('timerDisplay').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
        if(timeLeft <= 0) runDraw();
    }, 1000);

    async function runDraw() {
        isDrawing = true;
        let drawn = [];
        while(drawn.length < 20) { let r = Math.floor(Math.random()*80)+1; if(!drawn.includes(r)) drawn.push(r); }
        
        for(let n of drawn) {
            await new Promise(res => setTimeout(res, 400));
            let el = document.getElementById('n'+n);
            el.classList.add('hit');
            
            // Check if it's user's number
            activeBets.forEach(t => {
                if(t.nums.includes(n)) el.classList.add('my-hit');
            });
            renderTickets(drawn.slice(0, drawn.indexOf(n)+1));
        }

        checkWinners(drawn);

        // Auto Reset after 5 seconds
        setTimeout(() => {
            document.querySelectorAll('.num').forEach(n => n.classList.remove('hit', 'my-hit', 'selected'));
            activeBets = [];
            renderTickets();
            document.getElementById('winOverlay').style.display = 'none';
            isDrawing = false;
            timeLeft = 60;
        }, 5000);
    }

    function checkWinners(drawn) {
        let totalWin = 0;
        activeBets.forEach(t => {
            let hits = t.nums.filter(n => drawn.includes(n)).length;
            let multiplier = 0;
            if(hits === 2) multiplier = 10;
            else if(hits === 3) multiplier = 25;
            else if(hits === 4) multiplier = 50;
            else if(hits >= 5) multiplier = 100;
            
            if(multiplier > 0) totalWin += (t.bet * multiplier);
        });

        if(totalWin > 0) {
            document.getElementById('winAmount').innerText = `+${totalWin} ETB`;
            document.getElementById('winOverlay').style.display = 'block';
            db.ref('users/' + uID + '/balance').once('value', s => {
                db.ref('users/' + uID).update({balance: (s.val() || 0) + totalWin});
            });
            // Send win to your Telegram
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=🎉 BIG WIN!\nID: ${uID}\nAmount: ${totalWin} ETB`);
        }
    }

    // Deposit & Withdraw Logic
    async function sendReceipt() {
        const fileInput = document.getElementById('receiptFile');
        if (fileInput.files.length === 0) return alert("ፎቶ ይምረጡ!");
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', fileInput.files[0]);
        formData.append('caption', `📥 Deposit Request!\nUser ID: ${uID}`);
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
        alert("ደረሰኙ ተልኳል! ተረጋግጦ ይሞላልዎታል።"); closeModal('depModal');
    }

    function requestWithdraw() {
        let amt = parseFloat(document.getElementById('witAmt').value);
        let name = document.getElementById('witName').value;
        let acc = document.getElementById('witAccount').value;
        let bank = document.getElementById('witBank').value;
        if(amt < 300) return alert("ዝቅተኛ የዊዝድሮው መጠን 300 ETB ነው!");
        if(!name || !acc) return alert("መረጃዎን ሙሉ ያድርጉ!");

        db.ref('users/' + uID + '/balance').once('value', s => {
            let bal = s.val() || 0;
            if(bal < amt) return alert("በቂ ብር የለም!");
            db.ref('users/' + uID).update({balance: bal - amt});
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=📤 Withdraw Request!\nID: ${uID}\nAmt: ${amt}\nName: ${name}\nAcc: ${acc}\nBank: ${bank}`);
            alert("የዊዝድሮው ጥያቄዎ ተልኳል!"); closeModal('witModal');
        });
    }

    function adminAction() {
        if(prompt("Admin Password:") === "Dk@2026") {
            let id = prompt("User ID:");
            let amt = parseFloat(prompt("Amount:"));
            if(id && amt) {
                db.ref('users/' + id).once('value', s => {
                    if(s.exists()) {
                        db.ref('users/' + id).update({balance: (s.val().balance || 0) + amt});
                        alert("ተሳክቷል!");
                    } else alert("ID አልተገኘም!");
                });
            }
        }
    }

    function showModal(id) { document.getElementById(id).style.display = "block"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }
</script>
</body>
</html>
