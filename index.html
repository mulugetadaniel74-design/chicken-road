<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENO ROYAL - Setgame</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #12191c; color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .balance { color: #2eb85c; font-weight: bold; font-size: 20px; }
        .dep-btn { background-color: #2eb85c; color: black; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; text-decoration: none; display: block; text-align: center; margin-bottom: 15px; }
        .timer-box { background: #1c2529; border: 1px solid #c8a42d; color: #c8a42d; width: 100%; padding: 12px; border-radius: 10px; text-align: center; margin-bottom: 15px; font-size: 18px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; background: #1c2529; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .number { width: 34px; height: 38px; background: #2c3439; display: flex; align-items: center; justify-content: center; border-radius: 5px; cursor: pointer; font-size: 14px; border: 1px solid #3d4449; }
        .number.selected { background: #2eb85c; color: black; box-shadow: 0 0 10px #2eb85c; font-weight: bold; }
        .number.drawn { background: #f1c40f !important; color: black !important; transform: scale(1.1); box-shadow: 0 0 15px #f1c40f; font-weight: bold; }
        .play-btn { background-color: #2eb85c; color: black; border: none; width: 100%; padding: 20px; border-radius: 15px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="color: #2eb85c; font-weight: bold; font-size: 22px;">KENO ROYAL</div>
        <div class="balance">0.00 ETB</div>
    </div>

    <a href="https://t.me/RunChickenRunBot?start=deposit" target="_blank" class="dep-btn">💰 ዲፖዚት (Deposit)</a>

    <div class="timer-box">⏳ ቀጣይ እጣ በ: <span id="timer">50</span> ሰከንድ</div>

    <div class="grid" id="grid"></div>

    <button class="play-btn" onclick="startDraw()">ውርርድ (20 ETB)</button>

    <script>
        const grid = document.getElementById('grid');
        for (let i = 1; i <= 80; i++) {
            const div = document.createElement('div');
            div.className = 'number'; div.id = 'n' + i; div.innerText = i;
            div.onclick = function() { this.classList.toggle('selected'); };
            grid.appendChild(div);
        }

        function startDraw() {
            if (document.querySelectorAll('.selected').length === 0) return alert("ቁጥር ይምረጡ!");
            document.querySelectorAll('.number').forEach(n => n.classList.remove('drawn'));
            let count = 0;
            let inv = setInterval(() => {
                let r = Math.floor(Math.random() * 80) + 1;
                document.getElementById('n' + r).classList.add('drawn');
                count++; if (count >= 20) clearInterval(inv);
            }, 300);
        }

        let time = 50;
        setInterval(() => {
            time--; if (time < 0) { time = 50; startDraw(); }
            document.getElementById('timer').innerText = time;
        }, 1000);
    </script>
</body>
</html>
