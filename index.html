<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANIEL KENO ROYAL - PRO CONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #0a0a0a; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { background-color: var(--dark); color: white; text-align: center; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        .header { background: #1a1a1a; padding: 15px; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .balance-box { border: 2px solid var(--gold); display: inline-block; padding: 10px 25px; border-radius: 50px; font-size: 24px; color: var(--gold); font-weight: bold; background: #000; }
        .timer { font-size: 3.5rem; font-weight: bold; color: var(--red); margin: 10px 0; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: #111; padding: 10px; border-radius: 10px; margin: 10px; border: 1px solid #333; }
        .num { background: #333; border: 1px solid #444; padding: 12px 0; font-weight: bold; border-radius: 5px; cursor: pointer; position: relative; font-size: 0.9rem; }
        .selected { background: var(--blue) !important; color: white; }
        .hit { background: var(--gold) !important; color: black; transform: scale(1.1); z-index: 2; box-shadow: 0 0 15px var(--gold); }
        .my-hit::after { content: "✅"; position: absolute; top: -8px; right: -5px; font-size: 14px; }
        .my-miss::after { content: "❌"; position: absolute; top: -8px; right: -5px; font-size: 14px; color: var(--red); }
        .btn-main { width: 90%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; background: var(--green); color: white; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #161616; margin: 15% auto; padding: 25px; width: 80%; border-radius: 20px; border: 1px solid var(--gold); }
        .input-field { width: 100%; background: #000; color: var(--gold); border: 1px solid #444; padding: 12px; border-radius: 8px; margin-top: 10px; box-sizing: border-box; }
        #winOverlay { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(46, 204, 113, 0.9); color: white; padding: 40px; border-radius: 20px; z-index: 2000; font-size: 2rem; }
    </style>
</head>
<body>

<div id="winOverlay">WINNER! 🎉<br><span id="winAmount"></span></div>

<div class="header">
    <h2 style="margin:0; color:var(--gold);">DANIEL KENO ROYAL</h2>
    <div class="balance-box">💰 <span id="balance">0.00</span> ETB</div>
    <div style="font-size:12px; color:#888;">ID: <span id="myID" style="color:var(--gold);">...</span></div>
</div>

<div class="timer" id="timerDisplay">01:00</div>

<div class="grid" id="grid"></div>

<div style="padding: 15px;">
    Bet: <input type="number" id="betAmount" value="15" min="15" style="width:60px; background:#000; color:var(--gold); border:1px solid var(--gold); padding:5px;">
    <button onclick="buyTicket()" class="btn-main" style="margin-top:10px;">PLACE BET</button>
</div>

<div style="display:flex; justify-content:center; gap:10px;">
    <button onclick="showModal('depModal')" style="background:var(--blue); padding:10px; border-radius:5px; color:white; border:none;">Deposit</button>
    <button onclick="showModal('witModal')" style="background:var(--red); padding:10px; border-radius:5px; color:white; border:none;">Withdraw</button>
</div>

<div id="activeTicketsList" style="text-align:left; padding:15px; background:#111; margin:10px; border-radius:10px;"></div>

<button onclick="adminAction()" style="background:transparent; color:#222; border:none; margin-top:20px;">Admin Panel ⚙️</button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA",
        authDomain: "chickenkeno-c41fa.firebaseapp.com",
        projectId: "chickenkeno-c41fa",
        databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com",
        storageBucket: "chickenkeno-c41fa.appspot.com",
        messagingSenderId: "423384148862",
        appId: "1:423384148862:web:99e9faebe83982f95be12f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const BOT_TOKEN = "8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw";
    const CHAT_ID = "7313437942";

    let uID = localStorage.getItem('keno_user_id') || "USER-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('keno_user_id', uID);
    document.getElementById('myID').innerText = uID;

    db.ref('users/' + uID + '/balance').on('value', s => document.getElementById('balance').innerText = (s.val() || 0).toFixed(2));

    const grid = document.getElementById('grid');
    let selectedNums = [], activeBets = [];

    for(let i=1; i<=80; i++) {
        let d = document.createElement('div'); d.className='num'; d.id='n'+i; d.innerText=i;
        d.onclick=()=>{ 
            if(d.classList.contains('selected')){ d.classList.remove('selected'); selectedNums = selectedNums.filter(x => x !== i); }
            else if(selectedNums.length < 10){ d.classList.add('selected'); selectedNums.push(i); }
        };
        grid.appendChild(d);
    }

    function buyTicket() {
        let amt = parseFloat(document.getElementById('betAmount').value);
        if(amt < 15 || selectedNums.length < 2) return alert("Select numbers!");
        db.ref('users/' + uID + '/balance').once('value', s => {
            let bal = s.val() || 0;
            if(bal < amt) return alert("No balance!");
            db.ref('users/' + uID).update({balance: bal - amt});
            activeBets.push({nums: [...selectedNums], bet: amt});
            renderTickets();
            selectedNums = [];
            document.querySelectorAll('.num').forEach(n => n.classList.remove('selected'));
        });
    }

    function renderTickets(drawn = []) {
        let list = document.getElementById('activeTicketsList');
        list.innerHTML = activeBets.map(t => {
            let hits = t.nums.filter(n => drawn.includes(n)).length;
            return `<div style="background:#222; padding:8px; margin-bottom:5px; border-radius:5px;">🎫 ${t.bet} ETB | Hits: ${hits}</div>`;
        }).join('');
    }

    let timeLeft = 60, isDrawing = false;
    setInterval(() => {
        if(isDrawing) return;
        timeLeft--;
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById('timerDisplay').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
        if(timeLeft <= 0) runDraw();
    }, 1000);

    async function runDraw() {
        isDrawing = true;
        let drawn = [];
        while(drawn.length < 20) { let r = Math.floor(Math.random()*80)+1; if(!drawn.includes(r)) drawn.push(r); }
        
        for(let n of drawn) {
            await new Promise(res => setTimeout(res, 400));
            document.getElementById('n'+n).classList.add('hit');
            activeBets.forEach(t => { if(t.nums.includes(n)) document.getElementById('n'+n).classList.add('my-hit'); });
            renderTickets(drawn.slice(0, drawn.indexOf(n)+1));
        }

        activeBets.forEach(t => {
            t.nums.forEach(n => { if(!drawn.includes(n)) document.getElementById('n'+n).classList.add('my-miss'); });
        });

        checkWinners(drawn);

        setTimeout(() => {
            document.querySelectorAll('.num').forEach(n => n.classList.remove('hit', 'my-hit', 'my-miss', 'selected'));
            activeBets = []; renderTickets();
            document.getElementById('winOverlay').style.display = 'none';
            isDrawing = false; timeLeft = 60;
        }, 6000);
    }

    // 🔥 ማንም እንዳያሸንፍ የተቆለፈበት (Control Logic)
    function checkWinners(drawn) {
        let totalWin = 0;
        activeBets.forEach(t => {
            let hits = t.nums.filter(n => drawn.includes(n)).length;
            let mult = 0;
            // 7 እና ከዚያ በላይ በትክክል ከመታ ብቻ x2 (ይሄ ደግሞ በጣም ከባድ ነው)
            if (hits >= 7) mult = 2; 
            else mult = 0; 

            if(mult > 0) totalWin += (t.bet * mult);
        });

        if(totalWin > 0) {
            document.getElementById('winAmount').innerText = `+${totalWin} ETB`;
            document.getElementById('winOverlay').style.display = 'block';
            db.ref('users/' + uID + '/balance').once('value', s => {
                db.ref('users/' + uID).update({balance: (s.val() || 0) + totalWin});
            });
        }
    }

    // ⚙️ አድሚን ፓነል (ሰውየው ባይኖርም እንዲሞላለት ተደርጓል)
    function adminAction() {
        let pass = prompt("Admin Password:");
        if (pass === "Dk@2026") {
            let targetID = prompt("የተጠቃሚውን User ID ያስገቡ:");
            if (!targetID) return;
            db.ref('users/' + targetID).once('value').then(s => {
                let cur = s.exists() ? (s.val().balance || 0) : 0;
                let addAmt = parseFloat(prompt("የሚሞላው የብር መጠን:"));
                if (isNaN(addAmt)) return;
                db.ref('users/' + targetID).update({ balance: cur + addAmt })
                  .then(() => alert("ተሞልቷል! Current: " + (cur + addAmt)));
            });
        }
    }

    function showModal(id) { document.getElementById(id).style.display = "block"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }
</script>

<div id="depModal" class="modal"><div class="modal-content">
    <h3>Deposit</h3><p>Telebirr: 0986980130</p>
    <button onclick="closeModal('depModal')" class="btn-main">ዝጋ</button>
</div></div>
<div id="witModal" class="modal"><div class="modal-content">
    <h3>Withdraw</h3><input type="number" id="witAmt" class="input-field" placeholder="Amount">
    <button onclick="closeModal('witModal')" class="btn-main" style="background:#444;">ተመለስ</button>
</div></div>

</body>
</html>
