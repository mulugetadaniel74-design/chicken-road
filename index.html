<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENO ROYAL PRO</title>
    <style>
        :root { --gold: #ffc40f; --dark: #121212; --card: #1e1e1e; --green: #2ecc71; --white: #ffffff; }
        body { background-color: var(--dark); color: var(--white); text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .header { background: var(--card); padding: 15px; border-radius: 15px; border-bottom: 4px solid var(--gold); margin-bottom: 20px; }
        .balance-display { font-size: 24px; font-weight: bold; color: var(--gold); border: 2px solid var(--gold); display: inline-block; padding: 10px 25px; border-radius: 30px; margin: 10px 0; }
        
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; max-width: 450px; margin: 15px auto; }
        .num { background: #333; border: 1px solid #444; padding: 12px 0; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.2s; }
        
        .selected { background: #3498db !important; transform: scale(1.1); box-shadow: 0 0 10px #3498db; }
        
        @keyframes pop {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .winner { background: var(--gold) !important; color: black !important; animation: pop 0.3s ease; }
        .matched { background: var(--green) !important; color: white !important; box-shadow: 0 0 15px var(--green); border: 2px solid white; }

        .bet-box, .withdraw-section { background: var(--card); padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px solid #444; }
        input { background: #000; color: var(--gold); border: 1px solid var(--gold); padding: 10px; width: 80px; text-align: center; border-radius: 5px; font-size: 18px; }
        
        .action-btn { width: 90%; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; margin: 10px 0; transition: 0.3s; }
        .dep-btn { background: #e67e22; color: white; }
        .with-btn { background: #c0392b; color: white; }
        .draw-btn { background: var(--green); color: white; font-size: 20px; }
        .action-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; color:var(--gold);">🎰 KENO ROYAL PRO 🎰</h2>
        <div id="timer-badge" style="background:#e74c3c; padding:5px; border-radius:10px; margin-top:10px;">ቀጣይ Draw: <span id="timer">60</span>s</div>
        <div class="balance-display">💰 <span id="balance">0.00</span> ETB</div>
    </div>

    <div class="bet-box">
        መወራረድ (ሚኒመም 15): <input type="number" id="betAmount" value="15" min="15">
    </div>

    <div class="grid" id="grid"></div>

    <button class="action-btn draw-btn" onclick="draw()">ይጀምር (DRAW)</button>
    <button onclick="requestDeposit()" class="action-btn dep-btn">💳 ብር አስገባ / DEPOSIT</button>

    <div class="withdraw-section">
        <h3>💸 ብር አውጣ (WITHDRAW)</h3>
        <input type="number" id="withAmount" value="300" style="margin-bottom:10px;"><br>
        <button class="action-btn with-btn" onclick="requestWithdraw()">ብር አውጣ</button>
    </div>

    <script>
        let currentBalance = 100.00; // ለሙከራ 100 ብር ተሰጥቷል
        let selected = [];
        const grid = document.getElementById('grid');
        document.getElementById('balance').innerText = currentBalance.toFixed(2);

        // ግሪዱን መፍጠር (1-80)
        for (let i = 1; i <= 80; i++) {
            let d = document.createElement('div');
            d.className = 'num'; d.id = 'n' + i; d.innerText = i;
            d.onclick = function() {
                if (this.classList.contains('selected')) {
                    this.classList.remove('selected');
                    selected = selected.filter(n => n !== i);
                } else {
                    if (selected.length < 10) {
                        this.classList.add('selected');
                        selected.push(i);
                    } else { alert("ቢበዛ 10 ቁጥር ብቻ መምረጥ ይችላሉ!"); }
                }
            };
            grid.appendChild(d);
        }

        function draw() {
            let bet = parseFloat(document.getElementById('betAmount').value);
            if (selected.length === 0) { alert("እባክዎ ቁጥር ይምረጡ!"); return; }
            if (currentBalance < bet) { alert("በቂ ባላንስ የሎትም!"); return; }

            currentBalance -= bet;
            updateBalance();

            // Clear previous
            document.querySelectorAll('.num').forEach(n => n.classList.remove('winner', 'matched'));

            let winners = [];
            while (winners.length < 20) {
                let r = Math.floor(Math.random() * 80) + 1;
                if (!winners.includes(r)) winners.push(r);
            }

            winners.forEach((n, i) => {
                setTimeout(() => {
                    let el = document.getElementById('n' + n);
                    el.classList.add('winner');
                    if (selected.includes(n)) el.classList.add('matched');
                    if (i === 19) checkResult(winners, bet);
                }, i * 100);
            });
        }

        function checkResult(winNums, bet) {
            let matches = selected.filter(n => winNums.includes(n)).length;
            let winAmt = 0;
            if (matches >= 2) winAmt = bet * (matches * 0.5); // ቀላል የክፍያ ስሌት

            if (winAmt > 0) {
                currentBalance += winAmt;
                alert("እንኳን ደስ አለዎት! " + matches + " ቁጥሮች ገጥመው " + winAmt + " ብር አሸንፈዋል!");
            }
            updateBalance();
        }

        function updateBalance() {
            document.getElementById('balance').innerText = currentBalance.toFixed(2);
        }

        function requestDeposit() {
            window.location.href = "tg://resolve?domain=Godis1256&text=ብር ማስገባት እፈልጋለሁ";
        }

        function requestWithdraw() {
            let amt = document.getElementById('withAmount').value;
            if (amt >= 300) {
                window.location.href = `tg://resolve?domain=Godis1256&text=Withdraw_${amt}_ETB`;
            } else { alert("ዝቅተኛው ማውጫ 300 ብር ነው!"); }
        }

        // Timer
        let time = 60;
        setInterval(() => {
            time--;
            document.getElementById('timer').innerText = time;
            if (time <= 0) time = 60;
        }, 1000);
    </script>
</body>
</html>
