<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENO ROYAL - Setgame</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #12191c; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { color: #2eb85c; font-weight: bold; font-size: 22px; }
        .balance { color: #2eb85c; font-weight: bold; font-size: 18px; }
        .deposit-btn { background-color: #2eb85c; color: black; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 20px; text-decoration: none; display: block; text-align: center; }
        .timer-box { background-color: #1c2529; border: 1px solid #c8a42d; color: #c8a42d; width: 100%; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 20px; font-size: 18px; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; background-color: #1c2529; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        .number { width: 30px; height: 35px; background-color: #2c3439; display: flex; align-items: center; justify-content: center; border-radius: 5px; cursor: pointer; font-size: 14px; border: 1px solid #3d4449; }
        .number.selected { background-color: #2eb85c; color: black; border-color: #2eb85c; box-shadow: 0 0 10px #2eb85c; }
        
        /* አዲሱ የውርርድ መቆጣጠሪያ ዲዛይን */
        .bet-selector { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; width: 100%; }
        .controls { display: flex; align-items: center; gap: 20px; background: #1c2529; padding: 10px 25px; border-radius: 50px; border: 1px solid #333; }
        .btn-round { background: #2eb85c; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 24px; cursor: pointer; font-weight: bold; }
        .btn-minus { background: #ff4d4d; }
        #bet-display { font-size: 22px; font-weight: bold; color: #2eb85c; min-width: 100px; text-align: center; }
        .main-action-btn { background-color: #2eb85c; color: black; border: none; width: 100%; padding: 18px; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">KENO ROYAL</div>
        <div class="balance">0.00 ETB</div>
    </div>

    <a href="https://t.me/የአንተ_ቦት_ሊንክ" class="deposit-btn">💰 ዲፖዚት (Deposit)</a>

    <div class="timer-box">
        ⏳ ቀጣይ እጣ በ: <span id="timer">50</span> ሰከንድ
    </div>

    <div class="grid" id="number-grid">
        </div>

    <div class="bet-selector">
        <p style="color: #888; margin-bottom: 10px;">የውርርድ መጠን ይምረጡ (Min 20 ETB)</p>
        <div class="controls">
            <button class="btn-round btn-minus" onclick="changeBet(-10)">-</button>
            <span id="bet-display">20 ETB</span>
            <button class="btn-round" onclick="changeBet(10)">+</button>
        </div>
    </div>

    <button class="main-action-btn" onclick="placeBet()">ውርርድ ተጫወት</button>

    <script>
        // 1. ቁጥሮቹን መፍጠር (1-80)
        const grid = document.getElementById('number-grid');
        for (let i = 1; i <= 80; i++) {
            const numDiv = document.createElement('div');
            numDiv.classList.add('number');
            numDiv.innerText = i;
            numDiv.onclick = function() { this.classList.toggle('selected'); };
            grid.appendChild(numDiv);
        }

        // 2. የውርርድ መጠን መቀየሪያ
        let currentBet = 20;
        function changeBet(amount) {
            currentBet += amount;
            if (currentBet < 20) currentBet = 20;
            document.getElementById('bet-display').innerText = currentBet + " ETB";
        }

        // 3. የሰዓት ቆጣሪ
        let timeLeft = 50;
        const timerSpan = document.getElementById('timer');
        setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                timerSpan.innerText = timeLeft;
            } else {
                timeLeft = 50; // እንደገና ይጀምራል
            }
        }, 1000);

        // 4. ውርርድ በተን ሲነካ
        function placeBet() {
            const selected = document.querySelectorAll('.selected').length;
            if (selected === 0) {
                alert("እባክዎ መጀመሪያ ቁጥር ይምረጡ!");
            } else {
                alert(currentBet + " ብር ውርርድ በ " + selected + " ቁጥሮች ተይዟል። መልካም እድል!");
            }
        }
    </script>
</body>
</html>
