<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANIEL ROYAL KENO - EXCLUSIVE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #0a0a0a; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { background-color: var(--dark); color: white; text-align: center; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .header { background: #1a1a1a; padding: 15px; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .balance-box { border: 2px solid var(--gold); padding: 8px 15px; border-radius: 50px; font-size: 18px; color: var(--gold); font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: #111; padding: 10px; border-radius: 10px; margin: 10px; }
        .num { background: #333; padding: 12px 0; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .selected { background: var(--blue) !important; color: white; }
        .hit { background: var(--gold) !important; color: black; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% {transform: scale(1.1);} 100% {transform: scale(1);} }
        .btn-main { width: 90%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; background: var(--green); color: white; }
        /* ይህ ክፍል አድሚን ፓነሉን በዲፎልት ይደብቀዋል */
        #adminArea { display: none; }
        .admin-btn { background: #333; color: var(--gold); border: 1px solid var(--gold); padding: 5px 10px; border-radius: 5px; font-size: 10px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div style="text-align:left">
        <h3 style="margin:0; color:var(--gold);">DANIEL ROYAL</h3>
        <div style="font-size:11px; color:#888;">ID: <span id="myID" style="color:white;">...</span></div>
        <div id="adminArea">
            <button class="admin-btn" onclick="openAdmin()">ADMIN-PANEL</button>
        </div>
    </div>
    <div class="balance-box">💰 <span id="balance">0.00</span></div>
</div>

<div style="font-size: 3rem; font-weight: bold; color: var(--red); margin: 10px;" id="timerDisplay">01:00</div>
<div class="grid" id="grid"></div>

<div style="margin: 15px 0; display: flex; justify-content: center; align-items: center; gap: 20px;">
    <button onclick="changeBet(-5)" style="width:50px; height:50px; border-radius:50%; border:2px solid var(--gold); background:none; color:var(--gold); font-size:25px;">-</button>
    <input type="number" id="betAmount" value="15" readonly style="width:80px; text-align:center; background:none; border:2px solid var(--gold); color:var(--gold); font-size:20px; border-radius:10px;">
    <button onclick="changeBet(5)" style="width:50px; height:50px; border-radius:50%; border:2px solid var(--gold); background:none; color:var(--gold); font-size:25px;">+</button>
</div>

<button onclick="buyTicket()" class="btn-main">ትኬት ቁረጥ (BUY)</button>

<div id="drawnNumbersList" style="color:var(--gold); margin: 15px; font-weight: bold;">Waiting...</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA", authDomain: "chickenkeno-c41fa.firebaseapp.com", projectId: "chickenkeno-c41fa", databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com", storageBucket: "chickenkeno-c41fa.appspot.com", messagingSenderId: "423384148862", appId: "1:423384148862:web:99e9faebe83982f95be12f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const BOT_TOKEN = "8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw";
    const CHAT_ID = "7313437942"; 
    const DANIEL_ID = "DK-7313"; // ያንተ ቋሚ ID
    const ADMIN_PASS = "9801";

    let uID = localStorage.getItem('keno_user_id') || "DK-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('keno_user_id', uID);
    document.getElementById('myID').innerText = uID;

    // ለአንተ ብቻ ADMIN PANEL እንዲታይ የማድረጊያ ህግ
    if(uID === DANIEL_ID) {
        document.getElementById('adminArea').style.display = 'block';
    }

    db.ref('users/' + uID + '/balance').on('value', s => document.getElementById('balance').innerText = (s.val() || 0).toFixed(2));

    function changeBet(v) {
        let el = document.getElementById('betAmount');
        let val = parseInt(el.value) + v;
        if(val >= 15) el.value = val;
    }

    let selectedNums = [];
    const grid = document.getElementById('grid');
    for(let i=1; i<=80; i++) {
        let d = document.createElement('div'); d.className='num'; d.id='n'+i; d.innerText=i;
        d.onclick=()=>{
            if(d.classList.contains('selected')){ d.classList.remove('selected'); selectedNums = selectedNums.filter(x=>x!=i); }
            else if(selectedNums.length < 10){ d.classList.add('selected'); selectedNums.push(i); }
        };
        grid.appendChild(d);
    }

    async function sendToBot(msg) {
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=HTML`);
    }

    function buyTicket() {
        let amt = parseInt(document.getElementById('betAmount').value);
        if(selectedNums.length < 2) return alert("Select numbers!");
        db.ref('users/' + uID + '/balance').once('value', s => {
            let bal = s.val() || 0;
            if(bal < amt) return alert("No money!");
            db.ref('users/' + uID).update({balance: bal - amt});
            sendToBot(`🎟 <b>ትኬት ተቆርጧል!</b>\nID: ${uID}\nAmount: ${amt} ETB`);
            alert("ትኬት ተቆርጧል!");
            selectedNums = []; document.querySelectorAll('.selected').forEach(n => n.classList.remove('selected'));
        });
    }

    function openAdmin() {
        let p = prompt("Password:");
        if(p === ADMIN_PASS) {
            let target = prompt("User ID:");
            let amount = parseFloat(prompt("Amount:"));
            if(!isNaN(amount)) {
                db.ref('users/' + target + '/balance').once('value', s => {
                    db.ref('users/' + target).update({balance: (s.val()||0) + amount});
                    alert("Done!");
                    sendToBot(`⚙️ <b>ADMIN DEPOSIT</b>\nTo: ${target}\nAmt: ${amount}`);
                });
            }
        }
    }

    // Timer and Draw logic remains the same...
    let timeLeft = 60;
    setInterval(() => {
        timeLeft--;
        document.getElementById('timerDisplay').innerText = `00:${timeLeft < 10 ? '0' + timeLeft : timeLeft}`;
        if(timeLeft <= 0) { timeLeft = 60; /* Draw animation would go here */ }
    }, 1000);
</script>
</body>
</html>
