<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENO ROYAL - RELIABLE EDITION</title>
    <style>
        :root { --gold: #f1c40f; --dark: #121212; --card: #1e1e1e; --white: #ffffff; }
        body { background-color: var(--dark); color: var(--white); text-align: center; font-family: sans-serif; padding: 10px; }
        .header { background: var(--card); padding: 15px; border-radius: 15px; border-bottom: 4px solid var(--gold); }
        .balance-display { font-size: 24px; color: var(--gold); border: 2px solid var(--gold); display: inline-block; padding: 8px 25px; border-radius: 50px; margin: 10px 0; }
        .action-btn { width: 95%; padding: 16px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px auto; display: block; font-size: 18px; border: none; text-transform: uppercase; color: white; }
        .dep-btn { background: #27ae60; }
        .with-btn { background: #c0392b; }
        /* ለኮፒ መልእክት ማሳያ */
        #copyNotice { display: none; background: var(--gold); color: black; padding: 15px; position: fixed; top: 20%; left: 50%; transform: translateX(-50%); width: 80%; border-radius: 10px; z-index: 1000; font-weight: bold; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="copyNotice">
        የዳንኤል ቴሌግራም (@Godis1256) ኮፒ ሆኗል! <br><br>
        እባክዎ ቴሌግራም ላይ ሄደው "Paste" በማድረግ ያናግሩት።
        <br><br>
        <button onclick="document.getElementById('copyNotice').style.display='none'" style="padding:5px 15px;">እሺ</button>
    </div>

    <div class="header">
        <h2>🎰 KENO ROYAL PRO 🎰</h2>
        <div class="balance-display">💰 <span id="balance">0.00</span></div>
    </div>

    <div style="margin: 20px 0;">
        <p style="color:#aaa;">ብር ለማስገባት ወይም ለማውጣት ዳንኤልን ያናግሩት</p>
        <button onclick="copyUsername()" class="action-btn dep-btn">📲 ዳንኤልን አናግር (CONTACT)</button>
    </div>

    <div class="grid" id="grid" style="display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: #000; padding: 10px; border-radius: 10px;"></div>

    <script>
        // ተጫዋቹ በተኑን ሲነካ ስራው ይሄ ነው
        function copyUsername() {
            // ዩዘር ኔሙን ኮፒ ያደርጋል
            const el = document.createElement('textarea');
            el.value = '@Godis1256';
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            // መልእክቱን ያሳያል
            document.getElementById('copyNotice').style.display = 'block';
            
            // ከጥቂት ሰከንድ በኋላ ወደ ቴሌግራም ለመውሰድ ይሞክራል (ካልሰራ ኮፒው አለ)
            setTimeout(() => {
                window.location.href = "tg://resolve?domain=Godis1256";
            }, 1000);
        }

        // ጌሙ እንዲታይ
        const grid = document.getElementById('grid');
        for(let i=1; i<=80; i++) {
            let d = document.createElement('div');
            d.style.padding = "10px 0"; d.style.background = "#333"; d.innerText = i;
            grid.appendChild(d);
        }
    </script>
</body>
</html>
