<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENO ROYAL - @RunChickenRunBot</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #12191c; color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .balance { color: #2eb85c; font-weight: bold; font-size: 18px; }
        
        .action-btns { display: flex; gap: 10px; width: 100%; margin-bottom: 15px; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; font-size: 14px; display: flex; align-items: center; justify-content: center; }
        .dep-btn { background-color: #2eb85c; color: black; }
        .with-btn { background-color: #3d4449; color: white; }

        .timer-box { background: #1c2529; border: 1px solid #c8a42d; color: #c8a42d; width: 100%; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: #1c2529; padding: 8px; border-radius: 8px; }
        .number { width: 32px; height: 32px; background: #2c3439; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 12px; cursor: pointer; border: 1px solid #3d4449; }
        .number.selected { background: #2eb85c; color: black; border-color: #fff; }
        .number.drawn { background: #f1c40f !important; color: black !important; transform: scale(1.1); box-shadow: 0 0 10px #f1c40f; font-weight: bold; }

        .bet-box { width: 100%; margin-top: 20px; text-align: center; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 15px 0; }
        .circle-btn { width: 45px; height: 45px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; color: white; font-weight: bold; }
        #bet-display { font-size: 22px; font-weight: bold; color: #2eb85c; min-width: 90px; }
        .play-btn { width: 100%; padding: 18px; background: #2eb85c; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; color: black; }
    </style>
</head>
<body>

    <div class="header">
        <div style="color: #2eb85c; font-weight: bold; font-size: 20px;">KENO ROYAL</div>
        <div class="balance">0.00 ETB</div>
    </div>

    <div class="action-btns">
        <a href="https://t.me/RunChickenRunBot?start=deposit" class="btn dep-btn">💰 ዲፖዚት (Deposit)</a>
        <a href="#" onclick="withdraw()" class="btn with-btn">💸 ውዝድራው (Withdraw)</a>
    </div>

    <div class="timer-box">⏳ ቀጣይ እጣ በ: <span id="timer">50</span> ሰከንድ</div>

    <div class="grid" id="grid"></div>

    <div class="bet-box">
        <p style="color: #888; font-size: 14px; margin-bottom: 5px;">የውርርድ መጠን ይምረጡ</p>
        <div class="controls">
            <button class="circle-btn" style="background: #ff4d4d;" onclick="changeBet(-10)">-</button>
            <span id="bet-display">20 ETB</span>
            <button class="circle-btn" style="background: #2eb85c;" onclick="changeBet(10)">+</button>
        </div>
        <button class="play-btn" onclick="startDrawManual()">ውርርድ ተጫወት</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        for (let i = 1; i <= 80; i++) {
            const div = document.createElement('div');
            div.className = 'number';
            div.id = 'num-' + i;
            div.innerText = i;
            div.onclick = () => div.classList.toggle('selected');
            grid.appendChild(div);
        }

        let currentBet = 20;
        function changeBet(val) {
            currentBet += val;
            if (currentBet < 20) currentBet = 20;
            document.getElementById('bet-display').innerText = currentBet + " ETB";
        }

        function withdraw() {
            let amount = prompt("ማውጣት የሚፈልጉትን የብር መጠን ያስገቡ (ዝቅተኛ 50):");
            if (amount >= 50) {
                let phone = prompt("የቴሌብር ስልክ ቁጥር ያስገቡ:");
                if (phone) {
                    window.location.href = `https://t.me/RunChickenRunBot?start=withdraw_${amount}_${phone}`;
                }
            } else if (amount != null) {
                alert("ዝቅተኛው የማውጫ መጠን 50 ብር ነው።");
            }
        }

        function startDrawManual() {
            const selected = document.querySelectorAll('.selected').length;
            if (selected === 0) return alert("እባክዎ መጀመሪያ ቁጥር ይምረጡ!");
            runAnimation();
        }

        function runAnimation() {
            // የድሮ ቢጫ ቁጥሮችን አጽዳ
            document.querySelectorAll('.number').forEach(n => n.classList.remove('drawn'));
            
            let count = 0;
            let drawnNumbers = [];
            let drawInterval = setInterval(() => {
                let randomNum;
                do {
                    randomNum = Math.floor(Math.random() * 80) + 1;
                } while (drawnNumbers.includes(randomNum));
                
                drawnNumbers.push(randomNum);
                document.getElementById('num-' + randomNum).classList.add('drawn');
                count++;
                
                if (count >= 20) {
                    clearInterval(drawInterval);
                    checkWinner(drawnNumbers);
                }
            }, 300);
        }

        function checkWinner(drawn) {
            const selectedNodes = document.querySelectorAll('.selected');
            let matchCount = 0;
            selectedNodes.forEach(node => {
                if (drawn.includes(parseInt(node.innerText))) {
                    matchCount++;
                }
            });
            // እዚህ ጋር ውጤቱን ለተጫዋቹ ማሳየት ትችላለህ
        }

        let time = 50;
        setInterval(() => {
            if (time > 0) {
                time--;
            } else {
                time = 50;
                runAnimation();
            }
            document.getElementById('timer').innerText = time;
        }, 1000);
    </script>
</body>
</html>
