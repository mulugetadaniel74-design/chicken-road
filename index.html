<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ethio Keno Pro</title>
    <style>
        body { margin: 0; background: #121417; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; }
        .header { background: #1c1f24; padding: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid #2ecc71; }
        
        /* ቁጥሮቹ የሚወጡበት ሳጥን */
        .draw-panel { background: #1c1f24; margin: 10px; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .draw-title { color: #f1c40f; font-size: 14px; margin-bottom: 10px; text-transform: uppercase; }
        .drawn-numbers { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; min-height: 40px; }
        .drawn-box { background: #f1c40f; color: black; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; animation: pop 0.3s ease-out; }

        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; padding: 10px; max-width: 450px; margin: 0 auto; }
        .num { background: #24292e; padding: 12px 0; border-radius: 4px; font-size: 14px; font-weight: bold; color: #666; border: 1px solid #333; transition: 0.2s; }
        
        /* ተጫዋቹ የመረጠው */
        .num.selected { background: #2ecc71 !important; color: white !important; }
        
        /* እጣው ውስጥ የወጣ ቁጥር (በቦርዱ ላይ) */
        .num.active-draw { background: #ffffff !important; color: black !important; transform: scale(1.1); box-shadow: 0 0 10px white; }
        
        /* የመረጥከውና እጣው ውስጥ የገጠመ (Win) */
        .num.hit { background: #f1c40f !important; color: black !important; box-shadow: 0 0 15px #f1c40f; }

        .footer { background: #1c1f24; padding: 20px; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; border-radius: 20px 20px 0 0; }
        .bet-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 22px; font-weight: bold; background: #2ecc71; color: white; cursor: pointer; box-shadow: 0 5px #27ae60; }
        .bet-btn:disabled { background: #444; box-shadow: none; opacity: 0.6; }

        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; color: #2ecc71;">KENO 80</div>
    <div id="bal" style="font-weight: bold;">1,000.00 ETB</div>
</div>

<div class="draw-panel">
    <div class="draw-title">የወጡ ቁጥሮች (DRAWN)</div>
    <div class="drawn-numbers" id="drawn-list">
        </div>
</div>

<div class="grid" id="keno-grid"></div>

<div style="height: 150px;"></div>

<div class="footer">
    <div style="margin-bottom: 10px; font-weight: bold; color: #888;">ውርርድ: 15.00 ETB</div>
    <button id="play-btn" class="bet-btn" onclick="startDraw()">ውርርድ</button>
</div>

<script>
    let balance = 1000, bet = 15, selected = [];
    const grid = document.getElementById('keno-grid');
    const drawnList = document.getElementById('drawn-list');

    // ቦርዱን መፍጠር
    for(let i=1; i<=80; i++) {
        let n = document.createElement('div');
        n.className = 'num'; n.innerText = i;
        n.onclick = () => {
            if(selected.includes(i)) {
                selected = selected.filter(num => num !== i);
                n.classList.remove('selected');
            } else if(selected.length < 10) {
                selected.push(i);
                n.classList.add('selected');
            }
        };
        grid.appendChild(n);
    }

    function startDraw() {
        if(selected.length === 0) return alert("እባክህ ቁጥር ምረጥ!");
        if(balance < bet) return alert("በቂ ብር የለህም!");

        balance -= bet;
        document.getElementById('bal').innerText = balance.toFixed(2) + " ETB";
        document.getElementById('play-btn').disabled = true;
        
        // ማጽዳት
        drawnList.innerHTML = '';
        document.querySelectorAll('.num').forEach(n => n.classList.remove('active-draw', 'hit'));

        let draw = [], count = 0, hits = 0;
        
        let interval = setInterval(() => {
            let r;
            do { r = Math.floor(Math.random() * 80) + 1; } while(draw.includes(r));
            draw.push(r);

            // ከላይ ባለው ሳጥን ውስጥ ቁጥሩን ማሳየት
            let box = document.createElement('div');
            box.className = 'drawn-box';
            box.innerText = r;
            drawnList.appendChild(box);

            // በቦርዱ ላይ ቁጥሩን ምልክት ማድረግ
            let el = grid.children[r-1];
            if(selected.includes(r)) {
                el.classList.add('hit');
                hits++;
            } else {
                el.classList.add('active-draw');
            }

            count++;
            if(count >= 20) {
                clearInterval(interval);
                setTimeout(() => {
                    if(hits > 0) {
                        let win = bet * (hits * 3.5);
                        balance += win;
                        alert(`እንኳን ደስ አለህ! ${hits} ቁጥሮች ገጥመዋል! ${win.toFixed(2)} ETB አሸነፍክ!`);
                    } else {
                        alert("ምንም አልገጠመም። እንደገና ሞክር!");
                    }
                    document.getElementById('bal').innerText = balance.toFixed(2) + " ETB";
                    document.getElementById('play-btn').disabled = false;
                }, 500);
            }
        }, 500); // በየ ግማሽ ሰከንዱ አንድ ቁጥር ይወጣል
    }
</script>
</body>
</html>
