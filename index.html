<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setgame - KENO</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #12191c; color: white; text-align: center; padding: 10px; }
        .header { display: flex; justify-content: space-between; padding: 10px; color: #4caf50; font-weight: bold; }
        .deposit-btn { background-color: #2eb85c; color: black; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .timer-box { background: #1c2529; color: #ffc107; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: #1c2529; padding: 10px; border-radius: 8px; }
        .number { background: #2a3539; padding: 12px 0; border-radius: 4px; font-size: 13px; color: #888; cursor: pointer; }
        .selected { background: #2eb85c !important; color: white; }
        .footer-btn { background: #333; color: #777; border: none; width: 100%; padding: 18px; border-radius: 15px; margin-top: 20px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><span>KENO ROYAL</span><span>0.00 ETB</span></div>
    <button class="deposit-btn" onclick="location.href='https://t.me/RunChickenRunBot?start=Deposit'">💰 ዲፖዚት (Deposit)</button>
    <div class="timer-box">⏳ ቀጣይ እጣ በ: <span id="timer">60</span> ሰከንድ</div>
    <div class="grid" id="kenoGrid"></div>
    <button class="footer-btn" id="playBtn">ውርርድ (15 ETB)</button>
    <div style="margin-top:15px;"><a href="javascript:void(0)" onclick="askWithdraw()" style="color:#e53935; text-decoration:none; font-weight:bold;">💸 ብር ለማውጣት (Withdraw)</a></div>

    <script>
        let selected = [];
        let timeLeft = 60;
        const grid = document.getElementById('kenoGrid');
        for (let i = 1; i <= 80; i++) {
            let div = document.createElement('div');
            div.className = 'number';
            div.innerText = i;
            div.onclick = () => {
                if (selected.includes(i)) { selected = selected.filter(n => n !== i); div.classList.remove('selected'); }
                else if (selected.length < 10) { selected.push(i); div.classList.add('selected'); }
            };
            grid.appendChild(div);
        }
        setInterval(() => { timeLeft--; document.getElementById('timer').innerText = timeLeft; if (timeLeft <= 0) timeLeft = 60; }, 1000);
        function askWithdraw() {
            let amt = prompt("የሚወጣው ብር መጠን?");
            if (amt && confirm("የጠየቁት " + amt + " ETB ነው። እርግጠኛ ነዎት?")) {
                window.location.href = "https://t.me/RunChickenRunBot?start=Withdraw_" + amt;
            }
        }
    </script>
</body>
</html>
