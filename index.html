<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keno Royal - በዳንኤል</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 10px; }
        .container { background: #2c2c2c; padding: 20px; border-radius: 15px; max-width: 450px; margin: auto; box-shadow: 0 0 20px rgba(211, 47, 47, 0.4); }
        h1 { color: #ff4444; margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(8, 1 row); gap: 5px; margin: 20px 0; background: #333; padding: 10px; border-radius: 10px; }
        .number { width: 40px; height: 40px; background: #444; display: flex; align-items: center; justify-content: center; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .number:hover { background: #666; }
        .selected { background: #ff4444 !important; color: white; transform: scale(1.1); }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        .btn-play { background: #ff4444; color: white; padding: 15px; border: none; width: 90%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .btn-play:hover { background: #cc0000; }
        #status { margin-top: 15px; color: #ffbb33; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎰 KENO ROYAL</h1>
    <p>ከ 1 - 80 ያሉ 10 ቁጥሮችን ይምረጡ</p>
    
    <div id="kenoGrid" class="grid">
        </div>

    <div id="status">የተመረጡ ቁጥሮች፡ 0/10</div>

    <input type="number" id="betAmount" placeholder="የመወራረጃ ብር (ለምሳሌ፡ 20)">
    <button class="btn-play" onclick="playKeno()">አሁኑኑ ይጫወቱ!</button>
</div>

<script>
    let selectedNumbers = [];
    const grid = document.getElementById('kenoGrid');
    const status = document.getElementById('status');

    // 80 ቁጥሮችን መፍጠር
    for (let i = 1; i <= 80; i++) {
        let numDiv = document.createElement('div');
        numDiv.className = 'number';
        numDiv.innerText = i;
        numDiv.onclick = function() {
            if (selectedNumbers.includes(i)) {
                selectedNumbers = selectedNumbers.filter(n => n !== i);
                numDiv.classList.remove('selected');
            } else if (selectedNumbers.length < 10) {
                selectedNumbers.push(i);
                numDiv.classList.add('selected');
            }
            status.innerText = `የተመረጡ ቁጥሮች፡ ${selectedNumbers.length}/10`;
        };
        grid.appendChild(numDiv);
    }

    function playKeno() {
        let bet = document.getElementById('betAmount').value;
        if (selectedNumbers.length < 1) {
            alert("እባክዎ ቢያንስ አንድ ቁጥር ይምረጡ!");
            return;
        }
        if (!bet || bet < 5) {
            alert("ዝቅተኛ መወራረጃ 5 ብር ነው!");
            return;
        }
        
        // ወደ ቦቱ የሚላክ መረጃ
        let info = `Keno_Bet:${bet}_Numbers:${selectedNumbers.join(',')}`;
        window.location.href = "https://t.me/RunChickenRunBot?start=" + info;
    }
</script>

</body>
</html>
