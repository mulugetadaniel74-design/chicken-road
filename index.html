<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHICKEN KENO ROYAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #121212; --card: #1e1e1e; --green: #2ecc71; --white: #ffffff; }
        body { background-color: var(--dark); color: var(--white); text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        .header { background: var(--card); padding: 15px; border-bottom: 4px solid var(--gold); }
        .balance-container { border: 2px solid var(--gold); display: inline-block; padding: 10px 25px; border-radius: 15px; margin: 10px 0; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; max-width: 450px; margin: 15px auto; padding: 10px; }
        .num { background: #2c2c2c; border: 1px solid #444; padding: 12px 0; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .selected { background: #3498db !important; color: white; }
        .hit { background: var(--gold) !important; color: black; animation: flash 0.5s; }
        @keyframes flash { from { opacity: 0.5; } to { opacity: 1; } }
        .action-btn { width: 90%; max-width: 400px; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; margin: 5px; }
        .draw-btn { background: var(--green); color: white; width: 65%; }
        .admin-btn { background: #e67e22; color: white; width: 25%; font-size: 14px; }
        .deposit-btn { background: #3498db; color: white; }
        .withdraw-btn { background: #e74c3c; color: white; }
        input { background: #000; color: var(--gold); border: 2px solid var(--gold); padding: 10px; width: 80px; text-align: center; border-radius: 8px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; color:var(--gold);">🎰 CHICKEN KENO</h2>
    <div style="font-size:12px; color:#888;">መለያ: <span id="adminBtn">...</span></div>
    <div class="balance-container">💰 <span id="balance">0.00</span> ETB</div>
    <div id="status" style="color:var(--green);">ቁጥሮችን ይምረጡ (Min 15 ETB)</div>
    <div id="timer" style="color:var(--gold); font-size: 14px;">ቀጣይ ዙር: <span id="seconds">60</span>s</div>
</div>

<div style="margin: 10px;">ወራጅ: <input type="number" id="betAmount" value="15"></div>
<div class="grid" id="grid"></div>

<div style="display: flex; justify-content: center; align-items: center;">
    <button class="action-btn draw-btn" id="drawBtn" onclick="manualDraw()">ይጀምር (DRAW)</button>
    <button class="action-btn admin-btn" onclick="adminAddMoney()">ADD 💰</button>
</div>

<button class="action-btn deposit-btn" onclick="showDepositInfo()">ገንዘብ አስገባ (Deposit)</button>
<button class="action-btn withdraw-btn" onclick="requestWithdraw()">ገንዘብ አውጣ (Withdraw)</button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA",
        authDomain: "chickenkeno-c41fa.firebaseapp.com",
        projectId: "chickenkeno-c41fa",
        databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com",
        storageBucket: "chickenkeno-c41fa.appspot.com",
        messagingSenderId: "423384148862",
        appId: "1:423384148862:web:99e9faebe83982f95be12f"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let userID = localStorage.getItem('keno_user_id');
    let currentBalance = 0;
    let selected = [];
    let timeLeft = 60;

    if (!userID) {
        userID = "USER-" + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('keno_user_id', userID);
        database.ref('users/' + userID).set({ balance: 0 });
    }
    document.getElementById('adminBtn').innerText = userID;

    database.ref('users/' + userID + '/balance').on('value', (snap) => {
        currentBalance = snap.val() || 0;
        document.getElementById('balance').innerText = currentBalance.toFixed(2);
    });

    const grid = document.getElementById('grid');
    for (let i = 1; i <= 80; i++) {
        let d = document.createElement('div');
        d.className = 'num'; d.id = 'num-' + i; d.innerText = i;
        d.onclick = function() {
            if (this.classList.contains('selected')) {
                this.classList.remove('selected');
                selected = selected.filter(n => n !== i);
            } else if (selected.length < 10) {
                this.classList.add('selected');
                selected.push(i);
            }
        };
        grid.appendChild(d);
    }

    function adminAddMoney() {
        let pass = prompt("አድሚን ፓስወርድ:");
        if (pass === "1234") {
            let target = prompt("የተጠቃሚ ID (e.g. USER-4173):");
            let amt = parseFloat(prompt("የሚጨመር ብር:"));
            database.ref('users/' + target).once('value', (s) => {
                if(s.exists()){
                    let cur = s.val().balance || 0;
                    database.ref('users/' + target).update({ balance: cur + amt });
                    alert("ተሳክቷል!");
                } else { alert("User አልተገኘም!"); }
            });
        }
    }

    function showDepositInfo() {
        alert("💰 Telebirr: 0986980130\nAbyssinia: 153682704\nDaniel Mulugeta\nScreenshot ለ @Godis1256 ይላኩ።");
    }

    function requestWithdraw() {
        let amt = parseFloat(prompt("የሚወጣ ብር (Min 300):"));
        if (amt >= 300 && currentBalance >= amt) {
            const token = "8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw";
            const adminId = "7313437942";
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${adminId}&text=${encodeURIComponent("🚨 Withdraw: " + userID + " Amt: " + amt)}`);
            database.ref('users/' + userID).update({ balance: currentBalance - amt });
            alert("ጥያቄው ተልኳል!");
        } else { alert("ስህተት!"); }
    }

    function manualDraw() {
        if (selected.length === 0) { alert("እባክዎ ቁጥር ይምረጡ!"); return; }
        startDraw();
    }

    function startDraw() {
        let bet = parseFloat(document.getElementById('betAmount').value);
        if (currentBalance < bet) { document.getElementById('status').innerText = "በቂ ብር የለም!"; return; }
        
        database.ref('users/' + userID).update({ balance: currentBalance - bet });
        document.querySelectorAll('.num').forEach(n => n.classList.remove('hit'));
        document.getElementById('drawBtn').disabled = true;

        let drawn = []; let hits = 0; let count = 0;
        let interval = setInterval(() => {
            let r; do { r = Math.floor(Math.random() * 80) + 1; } while (drawn.includes(r));
            drawn.push(r);
            document.getElementById('num-' + r).classList.add('hit');
            if (selected.includes(r)) hits++;
            count++;
            if (count === 20) {
                clearInterval(interval);
                document.getElementById('drawBtn').disabled = false;
                let win = hits >= 3 ? bet * (hits - 1.5) : 0;
                if (win > 0) database.ref('users/' + userID).update({ balance: currentBalance + win });
                document.getElementById('status').innerText = `Hits: ${hits} | Win: ${win.toFixed(2)} ETB`;
                timeLeft = 60; // ቆጣሪውን አድስ
            }
        }, 200);
    }

    // የ1 ደቂቃ ቆጣሪ
    setInterval(() => {
        timeLeft--;
        document.getElementById('seconds').innerText = timeLeft;
        if (timeLeft <= 0) {
            if (selected.length > 0) {
                startDraw();
            } else {
                timeLeft = 60;
                document.getElementById('status').innerText = "ቁጥር ስላልመረጡ ጨዋታው አልተጀመረም";
            }
        }
    }, 1000);
</script>
</body>
</html>
