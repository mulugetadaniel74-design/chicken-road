<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENO ROYAL - BLACK & WHITE</title>
    <style>
        :root { --main: #ffffff; --bg: #000000; --card: #1a1a1a; --border: #333333; }
        body { background-color: var(--bg); color: var(--main); text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        
        .header { border-bottom: 2px solid var(--main); padding: 15px; margin-bottom: 10px; }
        .balance-display { font-size: 22px; font-weight: bold; margin: 10px 0; border: 1px solid var(--main); display: inline-block; padding: 5px 20px; border-radius: 50px; }
        .timer-box { background: var(--main); color: var(--bg); padding: 5px 15px; border-radius: 5px; font-weight: bold; font-size: 18px; margin: 10px; display: inline-block; }

        .bet-input-box { background: var(--card); padding: 15px; border-radius: 10px; margin: 10px auto; width: 90%; border: 1px solid var(--border); }
        input { background: #000; color: #fff; border: 1px solid var(--main); padding: 8px; width: 80px; text-align: center; font-size: 16px; border-radius: 5px; }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 95%; margin: 10px auto; }
        .stat { border: 1px solid var(--border); padding: 10px; border-radius: 8px; }

        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-width: 450px; margin: 10px auto; padding: 10px; background: #000; }
        .num { border: 1px solid var(--border); padding: 12px 0; cursor: pointer; font-weight: bold; transition: 0.2s; color: #888; }
        .selected { background: #444 !important; color: #fff !important; border-color: #fff; }
        .winner { background: #fff !important; color: #000 !important; transform: scale(1.1); box-shadow: 0 0 10px #fff; }

        .action-btn { width: 95%; padding: 15px; border: 1px solid var(--main); border-radius: 8px; cursor: pointer; font-weight: bold; margin: 10px auto; display: block; font-size: 16px; text-decoration: none; transition: 0.3s; }
        .dep-btn { background: var(--main); color: var(--bg); }
        .with-btn { background: var(--bg); color: var(--main); }

        .withdraw-section { border: 1px dashed var(--border); padding: 15px; margin: 20px auto; width: 90%; border-radius: 10px; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; }
        .result-msg { border: 2px solid #fff; padding: 30px; border-radius: 15px; background: #000; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">KENO ROYAL PRO</h2>
        <div class="balance-display">💰 <span id="balance">0.00</span> ብር</div>
        <br>
        <div class="timer-box">DRAW: <span id="timer">60</span>s</div>
    </div>

    <div class="bet-input-box">
        መቆራጫ (ሚኒመም 15): <input type="number" id="betAmount" value="15" min="15" oninput="updateStats()">
    </div>

    <div class="stats">
        <div class="stat">የተመረጠ: <span id="count">0</span>/5</div>
        <div class="stat">ሊያሸንፉ የሚችሉት: <br> <span id="potentialWin" style="font-size:18px; color:white;">0.00</span></div>
    </div>

    <div class="grid" id="grid"></div>

    <a href="https://t.me/Godis1256" target="_blank" class="action-btn dep-btn">💳 ብር አስገባ (DEPOSIT)</a>

    <div class="withdraw-section">
        <h3>💸 ብር አውጣ (WITHDRAW)</h3>
        <p style="font-size:12px; color:#666;">ከ 300 - 1000 ብር ብቻ</p>
        <input type="number" id="withAmount" placeholder="መጠን..." style="width:150px; margin-bottom:10px;">
        <button class="action-btn with-btn" onclick="requestWithdraw()">ብር አውጣ</button>
    </div>

    <div id="overlay" class="overlay">
        <div class="result-msg">
            <h1 id="resTitle"></h1>
            <p id="resAmt" style="font-size:24px;"></p>
            <button onclick="document.getElementById('overlay').style.display='none'" style="padding:10px 30px; cursor:pointer;">እሺ</button>
        </div>
    </div>

    <script>
        let currentBalance = 0.00;
        let selected = [];
        const odds = {0:0, 1:3, 2:10, 3:25, 4:50, 5:100};
        const grid = document.getElementById('grid');

        for(let i=1; i<=80; i++) {
            let d = document.createElement('div');
            d.className = 'num'; d.id = 'n'+i; d.innerText = i;
            d.onclick = function() {
                if(this.classList.contains('selected')) {
                    this.classList.remove('selected');
                    selected = selected.filter(n => n !== i);
                } else if(selected.length < 5) {
                    this.classList.add('selected');
                    selected.push(i);
                } else { alert("ቢበዛ 5 ቁጥር!"); }
                updateStats();
            };
            grid.appendChild(d);
        }

        function updateStats() {
            let b = parseFloat(document.getElementById('betAmount').value) || 0;
            let o = odds[selected.length];
            document.getElementById('count').innerText = selected.length;
            document.getElementById('potentialWin').innerText = (o * b).toFixed(2) + " ብር";
        }

        function requestWithdraw() {
            let amt = document.getElementById('withAmount').value;
            if(amt < 300 || amt > 1000) {
                alert("እባክዎ ከ 300 እስከ 1000 ብር መካከል ያስገቡ!");
            } else {
                let msg = encodeURIComponent("ሰላም ዳንኤል፣ እኔ ከኬኖ ሮያል " + amt + " ብር ማውጣት እፈልጋለሁ።");
                window.open("https://t.me/Godis1256?text=" + msg, "_blank");
            }
        }

        let time = 60;
        setInterval(() => {
            time--;
            document.getElementById('timer').innerText = time;
            if(time <= 0) { draw(); time = 60; }
        }, 1000);

        function draw() {
            let bet = parseFloat(document.getElementById('betAmount').value);
            if(selected.length > 0) {
                 if(currentBalance < bet) { 
                     alert("በቂ ካፒታል የለዎትም! እባክዎ ብር ያስገቡ።"); 
                     return; 
                 }
                 currentBalance -= bet;
                 document.getElementById('balance').innerText = currentBalance.toFixed(2);
            }

            document.querySelectorAll('.num').forEach(n => n.classList.remove('winner'));
            let winners = [];
            while(winners.length < 20) {
                let r = Math.floor(Math.random()*80)+1;
                if(!winners.includes(r)) winners.push(r);
            }

            winners.forEach((n, i) => {
                setTimeout(() => { 
                    document.getElementById('n'+n).classList.add('winner'); 
                    if(i === 19) checkResult(winners, bet);
                }, i * 100);
            });
        }

        function checkResult(winNums, bet) {
            let matches = selected.filter(n => winNums.includes(n)).length;
            let winAmt = odds[matches] * bet;
            if(winAmt > 0) {
                currentBalance += winAmt;
                document.getElementById('resTitle').innerText = "አሸነፉ!";
                document.getElementById('resAmt').innerText = "+" + winAmt.toFixed(2) + " ብር";
                document.getElementById('overlay').style.display = 'flex';
            }
            document.getElementById('balance').innerText = currentBalance.toFixed(2);
        }
    </script>
</body>
</html>
