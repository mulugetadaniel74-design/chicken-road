<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENO ROYAL PRO</title>
    <style>
        body { background-color: #121212; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        .header { background: #1e1e1e; padding: 10px; border-radius: 10px; border-bottom: 3px solid #f1c40f; margin-bottom: 10px; }
        .timer { background: #c0392b; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 20px; display: inline-block; margin: 10px; }
        .bet-box { background: #2c3e50; padding: 10px; border-radius: 10px; margin: 10px auto; width: 90%; }
        input { width: 60px; padding: 5px; text-align: center; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; max-width: 400px; margin: 10px auto; background: #000; padding: 5px; border-radius: 10px; }
        .num { background: #333; padding: 12px 0; border-radius: 4px; cursor: pointer; font-size: 13px; border: 1px solid #444; }
        .selected { background: #3498db !important; border: 1px solid white; }
        .winner { background: #f1c40f !important; color: black !important; font-weight: bold; transform: scale(1.1); box-shadow: 0 0 10px #f1c40f; }
        .history { background: #1a1a1a; padding: 10px; margin-top: 15px; border-radius: 10px; text-align: left; font-size: 12px; height: 100px; overflow-y: auto; }
        .btn { width: 95%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; display: block; margin: 10px auto; text-decoration: none; }
        .dep-btn { background: #e67e22; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; color:#f1c40f;">🎰 KENO ROYAL PRO</h2>
        <div class="timer">ቀጣይ: <span id="timer">60</span>s</div>
    </div>

    <div class="bet-box">
        መቆራጫ: <input type="number" id="bet" value="15" oninput="update()"> ብር | 
        ኦድ: <span id="odd" style="color:#f1c40f">0.0</span> | 
        ያሸንፋሉ: <span id="win" style="color:#27ae60">0</span>
    </div>

    <div class="grid" id="grid"></div>

    <a href="https://t.me/Godis1256" class="btn dep-btn">💳 ብር አስገባ (Deposit)</a>

    <div class="history">
        <strong>የመጨረሻ ዙሮች፡</strong>
        <div id="logs">ገና አልተጀመረም...</div>
    </div>

    <script>
        let selected = [];
        const odds = {0:0, 1:3, 2:10, 3:25, 4:50, 5:100};
        const grid = document.getElementById('grid');

        // ቁጥሮችን መፍጠር
        for(let i=1; i<=80; i++) {
            let d = document.createElement('div');
            d.className = 'num'; d.id = 'n'+i; d.innerText = i;
            d.onclick = function() {
                if(this.classList.contains('selected')) {
                    this.classList.remove('selected');
                    selected = selected.filter(n => n !== i);
                } else if(selected.length < 5) {
                    this.classList.add('selected');
                    selected.push(i);
                } else { alert("ቢበዛ 5 ቁጥር!"); }
                update();
            };
            grid.appendChild(d);
        }

        function update() {
            let b = document.getElementById('bet').value;
            let o = odds[selected.length];
            document.getElementById('odd').innerText = o.toFixed(1);
            document.getElementById('win').innerText = (o * b).toFixed(0);
        }

        let time = 60;
        setInterval(() => {
            time--;
            document.getElementById('timer').innerText = time;
            if(time <= 0) { draw(); time = 60; }
        }, 1000);

        function draw() {
            document.querySelectorAll('.num').forEach(n => n.classList.remove('winner'));
            let winners = [];
            while(winners.length < 20) {
                let r = Math.floor(Math.random()*80)+1;
                if(!winners.includes(r)) winners.push(r);
            }
            winners.forEach((n, i) => {
                setTimeout(() => { document.getElementById('n'+n).classList.add('winner'); }, i * 100);
            });
            let log = `<div>[${new Date().toLocaleTimeString()}] የወጡ፡ ${winners.slice(0,5).join(',')}...</div>`;
            document.getElementById('logs').innerHTML = log + document.getElementById('logs').innerHTML;
        }
    </script>
</body>
</html>
