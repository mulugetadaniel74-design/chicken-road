<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHICKEN KENO ROYAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffc40f; --dark: #121212; --card: #1e1e1e; --green: #2ecc71; --white: #ffffff; }
        body { background-color: var(--dark); color: var(--white); text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        .header { background: var(--card); padding: 15px; border-radius: 0 0 25px 25px; border-bottom: 4px solid var(--gold); }
        .balance-container { border: 2px solid var(--gold); display: inline-block; padding: 10px 25px; border-radius: 15px; margin: 15px 0; }
        .balance-display { font-size: 24px; font-weight: bold; color: var(--gold); }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; max-width: 450px; margin: 15px auto; padding: 10px; }
        .num { background: #2c2c2c; border: 1px solid #444; padding: 12px 0; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .selected { background: #3498db !important; color: white; }
        .hit { background: var(--gold) !important; color: black; }
        .action-btn { width: 90%; max-width: 400px; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; margin: 5px; transition: 0.3s; }
        .draw-btn { background: var(--green); color: white; }
        .withdraw-btn { background: #e74c3c; color: white; }
        .deposit-btn { background: #3498db; color: white; }
        input { background: #000; color: var(--gold); border: 2px solid var(--gold); padding: 10px; width: 100px; text-align: center; border-radius: 8px; font-size: 18px; }
        .admin-section { font-size: 12px; color: #888; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; color:var(--gold);">🎰 CHICKEN KENO</h2>
    <div class="admin-section" onclick="adminAddMoney()">መለያ: <span id="adminBtn">መጫኛ...</span> (Admin)</div>
    <div class="balance-container">
        💰 <span id="balance" class="balance-display">0.00</span> ETB
    </div>
    <div id="status" style="color:var(--green); font-weight:bold;">ቀጣይ ዙር በየ 1 ደቂቃው ይወጣል</div>
</div>

<div style="margin: 15px;">
    ወራጅ (Min 15): <input type="number" id="betAmount" value="15" min="15">
</div>

<div class="grid" id="grid"></div>

<button class="action-btn draw-btn" id="drawBtn" onclick="startDraw()">ይጀምር (DRAW)</button>
<br>
<button class="action-btn deposit-btn" onclick="showDepositInfo()">ገንዘብ አስገባ (Deposit)</button>
<button class="action-btn withdraw-btn" onclick="requestWithdraw()">ገንዘብ አውጣ (Withdraw)</button>

<script>
    // 1. Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBM9vbTCQT39mjHMWN5Yk8f7aEXVMZWXUA",
        authDomain: "chickenkeno-c41fa.firebaseapp.com",
        projectId: "chickenkeno-c41fa",
        databaseURL: "https://chickenkeno-c41fa-default-rtdb.firebaseio.com",
        storageBucket: "chickenkeno-c41fa.appspot.com",
        messagingSenderId: "423384148862",
        appId: "1:423384148862:web:99e9faebe83982f95be12f"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let userID = localStorage.getItem('keno_user_id');
    let currentBalance = 0;
    let selected = [];

    // 2. User Setup (ወዲያውኑ ዳታቤዝ ላይ እንዲመዘገብ)
    if (!userID) {
        userID = "USER-" + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('keno_user_id', userID);
        database.ref('users/' + userID).set({ balance: 0 });
    }
    document.getElementById('adminBtn').innerText = userID;

    database.ref('users/' + userID + '/balance').on('value', (snap) => {
        currentBalance = snap.val() || 0;
        document.getElementById('balance').innerText = currentBalance.toFixed(2);
    });

    // 3. Grid Creation
    const grid = document.getElementById('grid');
    for (let i = 1; i <= 80; i++) {
        let d = document.createElement('div');
        d.className = 'num'; d.id = 'num-' + i; d.innerText = i;
        d.onclick = function() {
            if (this.classList.contains('selected')) {
                this.classList.remove('selected');
                selected = selected.filter(n => n !== i);
            } else if (selected.length < 10) {
                this.classList.add('selected');
                selected.push(i);
            }
        };
        grid.appendChild(d);
    }

    // 4. ብር መጨመሪያ (Admin Function)
    function adminAddMoney() {
        let pass = prompt("አድሚን ፓስወርድ ያስገቡ:");
        if (pass === "1234") {
            let target = prompt("ብር የሚጨመርለት User ID (ለምሳሌ: USER-4173):");
            let amount = parseFloat(prompt("የሚጨመረው ብር መጠን:"));
            database.ref('users/' + target).once('value', (s) => {
                if(s.exists()){
                    let cur = s.val().balance || 0;
                    database.ref('users/' + target).update({ balance: cur + amount });
                    alert("ተሳክቷል!");
                } else { alert("ተጠቃሚው አልተገኘም!"); }
            });
        }
    }

    // 5. Deposit & Withdraw
    function showDepositInfo() {
        alert("💰 በቴሌብር: 0986980130 ወይም በአቢሲኒያ: 153682704 ብር ያስገቡና ለ @Godis1256 ይላኩ።");
    }

    function requestWithdraw() {
        let amt = parseFloat(prompt("የሚወጣ ብር (Min 300):"));
        if (amt >= 300 && currentBalance >= amt) {
            const token = "8398999747:AAGS7-Hc9sjBzBs7vu_Mjj8uiONpwfhxLgw";
            const adminId = "7313437942";
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${adminId}&text=${encodeURIComponent("🚨 Withdraw: " + userID + " Amount: " + amt)}`);
            database.ref('users/' + userID).update({ balance: currentBalance - amt });
            alert("ጥያቄው ተልኳል!");
        } else { alert("ስህተት!"); }
    }

    // 6. Game Logic & Auto-Draw (በየ 1 ደቂቃው)
    function startDraw() {
        let bet = parseFloat(document.getElementById('betAmount').value);
        if (bet < 15) { alert("ዝቅተኛ ወራጅ 15 ነው!"); return; }
        if (currentBalance < bet) { alert("በቂ ብር የለዎትም!"); return; }

        database.ref('users/' + userID).update({ balance: currentBalance - bet });
        
        // የድሮ ሂቶችን አጽዳ
        document.querySelectorAll('.num').forEach(n => n.classList.remove('hit'));

        let drawn = []; let hits = 0; let count = 0;
        let interval = setInterval(() => {
            let r; do { r = Math.floor(Math.random() * 80) + 1; } while (drawn.includes(r));
            drawn.push(r);
            document.getElementById('num-' + r).classList.add('hit');
            if (selected.includes(r)) hits++;
            count++;
            if (count === 20) {
                clearInterval(interval);
                let win = hits >= 3 ? bet * (hits - 1.5) : 0;
                if (win > 0) database.ref('users/' + userID).update({ balance: currentBalance + win });
                document.getElementById('status').innerText = `Hits: ${hits} | Win: ${win.toFixed(2)} ETB`;
            }
        }, 150);
    }

    // በየ 1 ደቂቃው (60,000ms) ራሱ እንዲጫወት
    setInterval(() => {
        if (selected.length > 0) {
            startDraw();
        }
    }, 60000);

</script>
</body>
</html>
