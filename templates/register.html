<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - KENO ROYAL</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #12191c; color: white; text-align: center; padding: 50px 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #1c2529; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #2eb85c; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; }
        a { color: #4caf50; text-decoration: none; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <h2>አዲስ አካውንት ይክፈቱ</h2>
    <form action="/register" method="POST">
        <input type="text" name="username" placeholder="ሙሉ ስም (Username)" required>
        <input type="text" name="phone" placeholder="የስልክ ቁጥር" required>
        <input type="password" name="password" placeholder="ሚስጥር ቃል (Password)" required>
        <button type="submit">ተመዝገብ</button>
    </form>
    <a href="/login">አካውንት አለዎት? ይግቡ</a>
</body>
</html>
